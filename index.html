        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px">
          <div class="stat teal" style="padding:10px;text-align:center"><div class="stat-label">Completion</div><div class="stat-val" style="font-size:18px">${p.completionRate}%</div></div>
          <div class="stat red" style="padding:10px;text-align:center"><div class="stat-label">Missed</div><div class="stat-val" style="font-size:18px">${p.missedTasks}</div></div>
          <div class="stat amber" style="padding:10px;text-align:center"><div class="stat-label">Streak</div><div class="stat-val" style="font-size:18px">${p.streak>0?'🔥'+p.streak+'d':'—'}</div></div>
        </div>
        ${p.achievements?.length?`<div style="margin-top:10px;display:flex;flex-wrap:wrap;gap:6px;align-items:center"><span style="font-size:11px;color:var(--text3)">Achievements:</span>${p.achievements.map(id=>{const a=ACHIEVEMENTS.find(x=>x.id===id);return a?`<span title="${a.name}" style="font-size:18px">${a.icon}</span>`:''}).join('')}</div>`:''}
      </div>

      <!-- TASKS -->
      <div class="player-section">
        <div class="player-section-title">✅ My Tasks ${myTasks.length?`<span style="font-size:11px;color:var(--text3);font-weight:400;text-transform:none">${myTasks.filter(t=>t.status==='active').length} active</span>`:''}</div>
        ${myTasks.length
          ? myTasks.slice(0,8).map(t=>`
            <div style="display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border)">
              <span class="badge ${t.type}" style="font-size:10px;padding:1px 6px">${t.type}</span>
              <span style="flex:1;font-size:12px;color:${t.status==='done'?'var(--text3)':'var(--text)'}${t.status==='done'?';text-decoration:line-through':''}">${t.name}</span>
              <span style="font-size:11px;font-weight:700;color:var(--amber)">+${t.xpValue}</span>
              ${t.status==='done'?'<span style="color:var(--green);font-size:11px">✓</span>':t.locked?'<span style="font-size:11px;color:var(--text3)">🔒</span>':''}
            </div>`).join('')
          : '<div style="color:var(--text3);font-size:12px">No tasks assigned.</div>'}
      </div>

      <!-- PRIVATE NOTES -->
      <div class="player-section">
        <div class="player-section-title">🔐 Private Notes</div>
        ${notesUnlocked
          ? (() => {
              // Always read from state directly — never from a stale closure variable
              const freshNotes = Array.isArray(p.privateNotes) ? p.privateNotes : [];
              if (freshNotes.length) {
                return freshNotes.map(n=>`<div class="note-item" style="margin-bottom:4px"><span class="note-text">${n.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</span></div>`).join('')
                  + `<div style="margin-top:8px"><button class="btn sm primary" style="font-size:11px" onclick="openModal('playerNotes',${p.id})">✏ Manage Notes</button></div>`;
              } else {
                return `<div style="color:var(--text3);font-size:12px">No notes yet. <button class="btn sm" style="font-size:11px;margin-left:4px" onclick="openModal('playerNotes',${p.id})">Add Note</button></div>`;
              }
            })()
          : hasPw
            ? `<div style="background:rgba(124,111,255,0.08);border:1px solid rgba(124,111,255,0.2);border-radius:var(--r);padding:10px;font-size:12px;color:var(--text3);text-align:center">🔒 Password protected — <button class="btn sm" style="font-size:11px;margin-left:4px" onclick="openModal('playerNotes',${p.id})">Unlock Notes</button></div>`
            : `<div style="color:var(--text3);font-size:12px">No password set — <button class="btn sm" style="font-size:11px;margin-left:4px" onclick="openModal('playerNotes',${p.id})">View Notes</button></div>`}
      </div>

      <!-- IMPORTANT LINKS -->
      ${links.length?`
      <div class="player-section">
        <div class="player-section-title">🔗 Important Links</div>
        ${links.map(l=>`
          <div class="link-item" style="margin-bottom:4px">
            <span class="link-icon">${l.icon||'🔗'}</span>
            <div style="flex:1;min-width:0"><div class="link-label">${l.label.replace(/</g,'&lt;')}</div></div>
            <a class="link-open" href="${l.url.replace(/"/g,'&quot;')}" target="_blank" rel="noopener noreferrer">↗ Open</a>
          </div>`).join('')}
      </div>`:''}

      <!-- ROLES -->
      ${roles.length?`
      <div class="player-section">
        <div class="player-section-title">🎭 Environment Roles</div>
        <div style="display:flex;flex-wrap:wrap;gap:6px">
          ${roles.map(r=>`<span class="role-label-pill" title="${(r.desc||'').replace(/"/g,'&quot;')}">${r.label.replace(/</g,'&lt;')}</span>`).join('')}
        </div>
      </div>`:''}

      <div class="form-actions">
        <button class="btn" onclick="closeModal()">Close</button>
        <button class="btn primary" onclick="closeModal();setTimeout(()=>openModal('playerDetail',${p.id}),50)">Full Profile</button>
      </div>`;
  }

  bd.appendChild(m);
  return bd;
}

// ========== CHANGE SYSTEM PASSWORD ==========
// Called from the Change System Password modal.
// All validation happens client-side first; final authority is auth.changePassword().
let _spSubmitting = false; // guard against repeated submissions
async function submitChangeSystemPassword() {
  // Guard: owner only
  if (!auth.isOwner()) { closeModal(); return; }
  // Guard: no double-submit
  if (_spSubmitting) return;

  const currentInput  = document.getElementById('sp-current');
  const newInput      = document.getElementById('sp-new');
  const confirmInput  = document.getElementById('sp-confirm');
  const msgEl         = document.getElementById('sp-msg');
  const submitBtn     = document.getElementById('sp-submit');
  if (!currentInput || !newInput || !confirmInput || !msgEl) return;

  const currentPw = currentInput.value;
  const newPw     = newInput.value;
  const confirmPw = confirmInput.value;

  // Clear previous message
  msgEl.textContent = '';
  msgEl.style.color = 'var(--red)';

  // ── Client-side validation (generic messages only) ──
  if (!currentPw || !newPw || !confirmPw) {
    msgEl.textContent = 'Unable to update password. Please try again.';
    return;
  }
  if (newPw.length < 8 || !/[a-zA-Z]/.test(newPw) || !/[0-9]/.test(newPw)) {
    msgEl.textContent = 'Unable to update password. Please try again.';
    return;
  }
  if (newPw !== confirmPw) {
    msgEl.textContent = 'Unable to update password. Please try again.';
    return;
  }
  // Prevent submitting when button is still disabled (safety net)
  if (submitBtn && submitBtn.disabled) {
    msgEl.textContent = 'Please correct the errors above before submitting.';
    return;
  }

  // Lock submit to prevent double-firing
  _spSubmitting = true;
  if (submitBtn) {
    submitBtn.disabled = true;
    submitBtn.style.opacity = '0.45';
    submitBtn.style.cursor = 'not-allowed';
    submitBtn.textContent = 'Updating…';
  }

  try {
    const result = await auth.changePassword(currentPw, newPw);

    if (result.ok) {
      // ── SUCCESS PATH ──
      // 1. Immediately close the modal so it NEVER stays open
      closeModal();
      // 2. Clear the inline validator reference so there are no lingering DOM refs
      window._spValidate = null;
      // 3. Show success feedback
      showToast('✅ Password updated successfully');
      // 4. After brief pause, invalidate session and return to entry screen
      setTimeout(() => {
        _spSubmitting = false;
        playerAuth.clear();
        document.body.classList.remove('player-readonly-mode');
        Entry.show('entry');
      }, 1800);
    } else {
      // ── FAILURE PATH — always re-enable form so user can retry ──
      _spSubmitting = false;
      if (submitBtn) {
        submitBtn.disabled = false;
        submitBtn.style.opacity = '1';
        submitBtn.style.cursor = 'pointer';
        submitBtn.textContent = 'Update Password';
      }
      // Always use generic message — never leak specifics
      msgEl.textContent = result.msg || 'Unable to update password. Please try again.';
      currentInput.value = '';    // force re-entry of current password
      currentInput.focus();
      // Re-run validation to update button state after clearing current field
      if (typeof window._spValidate === 'function') window._spValidate();
    }
  } catch (e) {
    console.error('[PW CHANGE] Error:', e);
    _spSubmitting = false;
    if (submitBtn) {
      submitBtn.disabled = false;
      submitBtn.style.opacity = '1';
      submitBtn.style.cursor = 'pointer';
      submitBtn.textContent = 'Update Password';
    }
    msgEl.textContent = 'Unable to update password. Please try again.';
  }
}

// ========== INIT ==========
computeTeamXP();

// ── Boot loader helpers ──
function _bootMsg(msg) {
  const el = document.getElementById('boot-msg');
  if (el) el.textContent = msg;
}
function _bootDone() {
  const bs = document.getElementById('boot-screen');
  if (bs) { bs.style.transition = 'opacity .3s'; bs.style.opacity = '0'; setTimeout(() => bs?.remove(), 320); }
}

// Boot sequence (fully async):
//  1. Hash the system password (Web Crypto API)
//  2. Load data — from Firestore if configured, localStorage otherwise
//  3. Show the correct screen
(async () => {
  try {
    _bootMsg('Initialising security…');
    await _initPasswordHash();
  } catch(e) { console.error('[INIT] Password hash init failed:', e); }

  try {
    // Use typeof guard here too — same reason as in DB.init()
    const sdkReady = typeof firebase !== 'undefined' && !window._firebaseSDKFailed;
    const cfgReady = DB.isConfigured;
    if (!sdkReady) {
      // SDK failed to load (CSP block, ad-blocker, or no network)
      // App will run fully in local/offline mode — no data loss, all features work
      console.warn('[INIT] Firebase SDK unavailable — running in offline (localStorage) mode.');
      _bootMsg('Offline mode — loading local data…');
    } else if (!cfgReady) {
      _bootMsg('Loading local data…');
    } else {
      _bootMsg('Connecting to Firebase…');
    }
    await DB.init();
    computeTeamXP();
  } catch(e) { console.error('[INIT] DB init failed:', e); }

  _bootMsg('Ready');
  _bootDone();

  if (sessionStorage.getItem('lag_role') === 'owner') {
    Entry.show('owner-app');
  } else {
    Entry.show('entry');
  }
})();

// Live event timer refresh
setInterval(()=>{
  const hasActive=state.activeEvents.some(e=>e.endsAt>Date.now());
  if(hasActive) render();
}, 5000);
</script>
