<script>
// ========== SECURE AUTH ==========
// Password hashing via Web Crypto API (SHA-256 with pepper).
// Passwords are NEVER stored or logged in plain text.
// The "stored" value is a hex SHA-256 digest: sha256(pepper + password).
// On first run the default password hash is derived from 'Mario0060'.

const _PEPPER = 'lag_sys_v1_'; // Static pepper — combines with password before hashing

async function _hashPassword(plaintext) {
  const encoded = new TextEncoder().encode(_PEPPER + plaintext);
  const hashBuf = await crypto.subtle.digest('SHA-256', encoded);
  return Array.from(new Uint8Array(hashBuf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

// Rate-limiter: max 5 attempts per 30s window (per-session, in-memory only)
const _rateLimiter = {
  _attempts: [],
  _max: 5,
  _windowMs: 30000,
  canAttempt() {
    const now = Date.now();
    this._attempts = this._attempts.filter(t => now - t < this._windowMs);
    return this._attempts.length < this._max;
  },
  record() { this._attempts.push(Date.now()); },
  remainingMs() {
    if (!this._attempts.length) return 0;
    const now = Date.now();
    const oldest = this._attempts.filter(t => now - t < this._windowMs)[0];
    return oldest ? Math.max(0, this._windowMs - (now - oldest)) : 0;
  }
};

// Audit log (in-memory; owner-only; passwords never logged)
const _auditLog = [];
function _auditRecord(action, ownerId = 'owner') {
  _auditLog.push({ timestamp: new Date().toISOString(), ownerId, action });
  // Keep last 100 entries only
  if (_auditLog.length > 100) _auditLog.shift();
}

// Persistent password store: localStorage key holds the hex hash
const _PW_STORE_KEY = 'lag_sys_ph';
let _ownerPasswordHash = null; // resolved async on init

async function _initPasswordHash() {
  const stored = localStorage.getItem(_PW_STORE_KEY);
  if (stored && /^[0-9a-f]{64}$/.test(stored)) {
    _ownerPasswordHash = stored;
  } else {
    // First run: hash the default password and persist it
    _ownerPasswordHash = await _hashPassword('Mario0060');
    localStorage.setItem(_PW_STORE_KEY, _ownerPasswordHash);
  }
}

const auth = {
  role: 'player',
  init() { const s = sessionStorage.getItem('lag_role'); if (s) this.role = s; },
  setRole(r) { this.role = r; sessionStorage.setItem('lag_role', r); },
  isOwner() { return this.role === 'owner'; },
  isLeader() { return this.role === 'owner'; },

  // Async password check with rate limiting
  async checkPassword(pw) {
    if (!_rateLimiter.canAttempt()) {
      const secs = Math.ceil(_rateLimiter.remainingMs() / 1000);
      return { ok: false, rateLimited: true, waitSecs: secs };
    }
    _rateLimiter.record();
    const hash = await _hashPassword(pw);
    if (hash === _ownerPasswordHash) {
      this.setRole('owner');
      _auditRecord('LOGIN_SUCCESS');
      return { ok: true, role: 'owner' };
    }
    _auditRecord('LOGIN_FAILURE');
    return { ok: false, rateLimited: false };
  },

  // Change system password — requires current password verification
  async changePassword(currentPw, newPw) {
    if (!this.isOwner()) return { ok: false, msg: 'Access denied.' };
    if (!_rateLimiter.canAttempt()) {
      const secs = Math.ceil(_rateLimiter.remainingMs() / 1000);
      return { ok: false, msg: `Too many attempts. Try again in ${secs}s.` };
    }
    _rateLimiter.record();

    // Verify current password
    const currentHash = await _hashPassword(currentPw);
    if (currentHash !== _ownerPasswordHash) {
      _auditRecord('PASSWORD_CHANGE_FAILED');
      return { ok: false, msg: 'Unable to update password. Please try again.' };
    }

    // Validate new password: min 8 chars, must contain letters AND numbers
    if (newPw.length < 8) return { ok: false, msg: 'Unable to update password. Please try again.' };
    if (!/[a-zA-Z]/.test(newPw) || !/[0-9]/.test(newPw)) return { ok: false, msg: 'Unable to update password. Please try again.' };

    // Hash and store new password
    const newHash = await _hashPassword(newPw);
    _ownerPasswordHash = newHash;
    localStorage.setItem(_PW_STORE_KEY, newHash);

    // Invalidate all sessions: clear role and force re-login
    _auditRecord('PASSWORD_CHANGE');
    this.setRole('player');
    sessionStorage.removeItem('lag_role');

    return { ok: true };
  }
};
auth.init();

// Initialise password hash (async) — must complete before first login attempt
_initPasswordHash().catch(e => console.error('[AUTH] Hash init failed:', e));

// ========== STATE MACHINE ==========
// States: 'entry' | 'player-login' | 'owner-login' | 'player-app' | 'owner-app'
// Rules:
//   - Only ONE screen is display:flex at a time
//   - All screens start as display:none in HTML
//   - Every transition goes through Entry.show() — no direct DOM elsewhere
//
// Screen ID map:
//   entry          → #entry-screen
//   player-login   → #player-login-screen
//   owner-login    → #owner-login-screen
//   player-app     → #app  (player mode)
//   owner-app      → #app  (owner mode)

const SCREENS = {
  'entry':        'entry-screen',
  'player-login': 'player-login-screen',
  'owner-login':  'owner-login-screen',
  'player-app':   'app',
  'owner-app':    'app',
};

const Entry = {
  _state: null,

  // ── Core transition ──
  show(state) {
    try {
      // Hide all managed screens
      const seen = new Set();
      Object.values(SCREENS).forEach(id => {
        if (seen.has(id)) return;
        seen.add(id);
        const el = document.getElementById(id);
        if (el) { el.style.display = 'none'; el.style.pointerEvents = 'none'; }
      });

      const targetId = SCREENS[state];
      if (!targetId) { console.error('[Entry] Unknown state:', state); this.show('entry'); return; }

      const target = document.getElementById(targetId);
      if (!target) { console.error('[Entry] Missing element:', targetId); return; }

      // #app uses flex layout via .app class; entry/login screens use flex centering
      target.style.display = (targetId === 'app') ? '' : 'flex';
      target.style.pointerEvents = '';

      this._state = state;

      // State-specific setup
      if (state === 'player-login') this._setupPlayerLogin();
      if (state === 'player-app' || state === 'owner-app') this._finalizeApp(state);

    } catch (e) {
      // Fallback: if anything explodes, always show entry screen
      console.error('[Entry] show() error, falling back to entry:', e);
      const entry = document.getElementById('entry-screen');
      if (entry) { entry.style.display = 'flex'; entry.style.pointerEvents = ''; }
      this._state = 'entry';
    }
  },

  // ── Populate env + player selects on player login screen ──
  _setupPlayerLogin() {
    const envSel = document.getElementById('lp-env-select');
    const pwInput = document.getElementById('lp-player-pw');
    const errEl = document.getElementById('lp-player-err');
    if (envSel) {
      envSel.innerHTML = state.categories.map((c, i) =>
        `<option value="${i}">${c.name}${c.status === 'closed' ? ' (closed)' : ''}</option>`
      ).join('');
      this.onEnvChange(); // populate player list for first env
    }
    if (pwInput) pwInput.value = '';
    if (errEl) errEl.textContent = '';
    // Focus env select
    setTimeout(() => envSel?.focus(), 60);
  },

  // ── Repopulate player select when env changes ──
  onEnvChange() {
    const envSel = document.getElementById('lp-env-select');
    const playerSel = document.getElementById('lp-player-select');
    if (!envSel || !playerSel) return;
    const envIndex = parseInt(envSel.value);
    const cat = state.categories[envIndex];
    if (!cat) return;
    const players = catPlayers(cat.id);
    playerSel.innerHTML = players.length
      ? players.map(p => `<option value="${p.id}">${p.name}</option>`).join('')
      : '<option value="">No players in this environment</option>';
  },

  // ── Submit player login ──
  submitPlayer() {
    try {
      const envSel    = document.getElementById('lp-env-select');
      const playerSel = document.getElementById('lp-player-select');
      const pwInput   = document.getElementById('lp-player-pw');
      const errEl     = document.getElementById('lp-player-err');

      if (!envSel || !playerSel || !pwInput) return;
      if (errEl) errEl.textContent = '';

      const envIndex = parseInt(envSel.value);
      const playerId = parseInt(playerSel.value);
      const attempt  = pwInput.value;

      const cat = state.categories[envIndex];
      const p   = state.players.find(x => x.id === playerId);

      if (!cat || !p) {
        if (errEl) errEl.textContent = 'Please select a valid environment and name.';
        return;
      }

      // ── Environment Password validation (independent of Player Password / Notes) ──
      // envAccess.validate: true when attempt matches environmentPassword, or both are blank.
      if (envAccess.validate(cat.id, attempt)) {
        playerAuth.unlock(playerId);      // establishes player identity for this session
        auth.setRole('player');
        envAccess.unlock(cat.id);
        state.currentCat = envIndex;
        this.show('player-app');
      } else {
        if (errEl) errEl.textContent = 'Incorrect environment password. Try again.';
        pwInput.focus();
        pwInput.select();
      }
    } catch (e) {
      console.error('[Entry] submitPlayer error:', e);
      const errEl = document.getElementById('lp-player-err');
      if (errEl) errEl.textContent = 'An error occurred. Please try again.';
    }
  },

  // ── Submit owner login (async — uses secure hash check) ──
  async submitOwner() {
    try {
      const pwInput = document.getElementById('lp-owner-pw');
      const errEl   = document.getElementById('lp-owner-err');
      const submitBtn = document.querySelector('#owner-login-screen .lp-submit-owner');

      if (!pwInput) return;
      if (errEl) errEl.textContent = '';
      if (submitBtn) { submitBtn.disabled = true; submitBtn.textContent = 'Verifying…'; }

      const result = await auth.checkPassword(pwInput.value);

      if (submitBtn) { submitBtn.disabled = false; submitBtn.textContent = 'Authenticate →'; }

      if (result.rateLimited) {
        if (errEl) errEl.textContent = `Too many attempts. Try again in ${result.waitSecs}s.`;
        return;
      }
      if (result.ok) {
        this.show('owner-app');
      } else {
        if (errEl) errEl.textContent = 'Unable to authenticate. Please try again.';
        pwInput.focus();
        pwInput.select();
      }
    } catch (e) {
      console.error('[Entry] submitOwner error:', e);
      const errEl = document.getElementById('lp-owner-err');
      if (errEl) errEl.textContent = 'An error occurred. Please try again.';
      const submitBtn = document.querySelector('#owner-login-screen .lp-submit-owner');
      if (submitBtn) { submitBtn.disabled = false; submitBtn.textContent = 'Authenticate →'; }
    }
  },

  // ── Finalize app state ──
  _finalizeApp(state_) {
    try {
      showToast(state_ === 'owner-app' ? '⚡ Owner access granted' : '◉ Welcome!');
      render();
    } catch (e) {
      console.error('[Entry] _finalizeApp error:', e);
      // App render failed — go back to entry so user isn't stuck on blank screen
      this.show('entry');
    }
  },
};

// ── Legacy aliases — used by app code (logout, render topbar, etc.) ──
window.openLoginModal = () => Entry.show('entry');
window.logout = () => {
  auth.setRole('player');
  playerAuth.clear();
  sessionStorage.removeItem('lag_role');
  document.body.classList.remove('player-readonly-mode');
  Entry.show('entry');
  showToast('Logged out');
};

// ========== PLAYER AUTH STATE ==========
// Runtime-only. Never persisted. Cleared on every page load.
const playerAuth = {
  _unlockedPlayerId: null,
  _pendingEnvIndex: null,

  unlock(playerId) { this._unlockedPlayerId = playerId; },
  clear() { this._unlockedPlayerId = null; this._pendingEnvIndex = null; },

  isUnlocked(playerId) {
    if (auth.isOwner()) return true;
    return this._unlockedPlayerId === playerId;
  },

  validate(playerId, attempt) {
    const p = state.players.find(x => x.id === playerId);
    if (!p) return false;
    if (!p.playerPassword || p.playerPassword.trim() === '') return true;
    return attempt === p.playerPassword;
  }
};

function isPlayerUnlocked(playerId) { return playerAuth.isUnlocked(playerId); }

// ========== ENVIRONMENT ACCESS GATE ==========
// Runtime-only Map. Never written to localStorage or sessionStorage.
// Cleared on every page load — no caching, no bypass.
const envAccess = {
  _unlocked: new Map(), // catId (number) -> true

  // canEnter(catId) — original signature (owner/env-password check)
  // canEnter(playerId, envId) — extended signature per spec
  // Both forms are supported; internally resolves to catId lookup.
  canEnter(catIdOrPlayerId, envId) {
    let catId = catIdOrPlayerId;
    // Detect two-argument form: canEnter(playerId, envId)
    if (envId !== undefined) {
      catId = envId;
    }
    const cat = state.categories.find(c => c.id === catId);
    if (!cat) return false;
    if (auth.isOwner()) return true;
    if (!cat.environmentPassword || cat.environmentPassword.trim() === '') return true;
    // After player login, their env is pre-unlocked via envAccess.unlock(catId)
    return this._unlocked.get(catId) === true;
  },

  unlock(catId) {
    this._unlocked.set(catId, true);
  },

  validate(catId, attempt) {
    const cat = state.categories.find(c => c.id === catId);
    if (!cat || typeof attempt !== 'string') return false;
    return attempt === cat.environmentPassword;
  }
};

// ========== LEVEL SYSTEM ==========
const LEVEL_THRESHOLDS = [0,100,250,500,900,1400,2100,3000,4200,6000];
const LEVEL_NAMES = ['Recruit','Scout','Warrior','Champion','Elite','Master','Legend','Mythic','Godlike','Transcendent'];
const LEVEL_CLASSES = ['lv1','lv1','lv2','lv3','lv4','lv5','lv5','lv6','lv7','lv7'];

function getLevel(xp) {
  let lv=1;
  for(let i=LEVEL_THRESHOLDS.length-1;i>=0;i--){ if(xp>=LEVEL_THRESHOLDS[i]){ lv=i+1; break; } }
  return Math.min(lv, LEVEL_THRESHOLDS.length);
}
function getLevelInfo(xp) {
  const lv = getLevel(xp);
  const idx = lv-1;
  const curThresh = LEVEL_THRESHOLDS[idx]||0;
  const nextThresh = LEVEL_THRESHOLDS[idx+1];
  const progress = nextThresh ? Math.round(((xp-curThresh)/(nextThresh-curThresh))*100) : 100;
  return { level:lv, name:LEVEL_NAMES[idx]||'Legend', progress:Math.min(100,Math.max(0,progress)), nextXP:nextThresh||null, cls:LEVEL_CLASSES[idx]||'lv7' };
}

function getTeamLevel(totalXP) { return Math.max(1, Math.floor(Math.log2(totalXP/50+1))+1); }

// ========== ACHIEVEMENT ENGINE ==========
const ACHIEVEMENTS = [
  {id:'first_step',icon:'🥾',name:'First Step',desc:'Complete your first task',xp:10,check:(p,log)=>log.filter(l=>l.playerId===p.id&&l.status==='done').length>=1},
  {id:'on_a_roll',icon:'🎯',name:'On a Roll',desc:'Complete 5 tasks',xp:25,check:(p,log)=>log.filter(l=>l.playerId===p.id&&l.status==='done').length>=5},
  {id:'beast_mode',icon:'💪',name:'Beast Mode',desc:'Reach 500 XP',xp:50,check:(p)=>p.xp>=500},
  {id:'thousand',icon:'⚡',name:'Power Surge',desc:'Reach 1000 XP',xp:100,check:(p)=>p.xp>=1000},
  {id:'streak3',icon:'🔥',name:'Ignited',desc:'Maintain 3-day streak',xp:30,check:(p)=>p.streak>=3},
  {id:'streak7',icon:'🌋',name:'Unstoppable',desc:'7-day streak',xp:75,check:(p)=>p.streak>=7},
  {id:'no_miss',icon:'🎖',name:'Flawless',desc:'0 missed tasks',xp:40,check:(p)=>p.xp>=50&&p.missedTasks===0},
  {id:'comeback',icon:'💫',name:'Comeback Kid',desc:'Complete a task after missing one',xp:20,check:(p,log)=>{const logs=log.filter(l=>l.playerId===p.id);const missIdx=logs.findIndex(l=>l.status==='missed');return missIdx!==-1&&logs.slice(missIdx+1).some(l=>l.status==='done')}},
  {id:'champion',icon:'🏆',name:'Champion',desc:'Reach rank #1 in your mission',xp:80,check:(p,log,state)=>{const cat=state.categories.find(c=>state.teams.find(t=>t.id===p.teamId)?.catId===c.id);if(!cat)return false;const ranked=[...state.players.filter(x=>state.teams.find(t=>t.id===x.teamId)?.catId===cat.id)].sort((a,b)=>b.xp-a.xp);return ranked[0]?.id===p.id}},
  {id:'lv5',icon:'🌟',name:'Elite Warrior',desc:'Reach Level 5',xp:60,check:(p)=>getLevel(p.xp)>=5},
];

function checkAchievements(player) {
  if(!player.achievements) player.achievements = [];
  const newUnlocks = [];
  ACHIEVEMENTS.forEach(ach => {
    if(!player.achievements.includes(ach.id)) {
      if(ach.check(player, state.activityLog, state)) {
        player.achievements.push(ach.id);
        newUnlocks.push(ach);
      }
    }
  });
  return newUnlocks;
}

// ========== STATE ==========
const AVATAR_COLORS = ['#7c6fff','#00d4aa','#ffb830','#ff4d6a','#4dff91','#4da6ff','#ff7caa','#a0ff7c'];

const state = {
  currentView: 'dashboard',
  currentCat: 0,
  modal: null,
  toast: null,
  toastTimer: null,
  tab: 'teams',
  activeEvents: [], // {id, type, name, icon, desc, multiplier, endsAt}
  challenges: [],   // {id, catId, type, aId, bId, xpGoal, startXpA, startXpB, createdAt}
  tasksLocked: false,
  activePlayerId: null, // Set to a player id to scope task visibility for that player (player mode)

  // ── GLOBAL ENVIRONMENT DATA — shared across ALL players, ALL environments ──
  environment: {
    rules: [],  // [{ id, text }]   — global rules visible to every player
    links: [],  // [{ id, label, url, icon }]  — global links visible to every player
  },

  // Environments replace categories — schema: { id, name, status, environmentPassword, teams, players, tasks, roles, importantLinks }
  // teams/players/tasks remain flat arrays keyed by catId for compatibility
  categories: [],
  teams: [],
  players: [],
  tasks: [],
  activityLog: [],

  // ══════════════════════════════════════════
  // PER-PLAYER TASK COMPLETIONS — new model
  // Each entry: { taskId, playerId, status, completedAt, xpEarned }
  // status: 'pending' | 'done' | 'missed'
  // Unique constraint: one entry per (taskId, playerId)
  // Task.status is now deprecated — all completion state lives here
  // ══════════════════════════════════════════
  taskCompletions: [],
};

// ========== HELPERS ==========
function computeTeamXP() {
  state.teams.forEach(t => {
    const ps = state.players.filter(p=>p.teamId===t.id);
    t.totalXP = ps.reduce((sum,p)=>sum+p.xp,0);
    t.avgPerf = Math.round(ps.reduce((sum,p)=>sum+p.completionRate,0)/(ps.length||1));
  });
}

// ── PER-PLAYER TASK COMPLETION HELPERS ──
// Get one player's completion record for a task (or a synthetic pending if not found)
function getPlayerCompletion(taskId, playerId) {
  return state.taskCompletions.find(c => c.taskId === taskId && c.playerId === playerId)
    || { taskId, playerId, status: 'pending', completedAt: null, xpEarned: 0 };
}

// Get or create a mutable completion record (upserts into taskCompletions)
function upsertCompletion(taskId, playerId, updates) {
  let record = state.taskCompletions.find(c => c.taskId === taskId && c.playerId === playerId);
  if (!record) {
    record = { taskId, playerId, status: 'pending', completedAt: null, xpEarned: 0 };
    state.taskCompletions.push(record);
  }
  Object.assign(record, updates);
  return record;
}

// Summary for owner view: { done, missed, pending, total, players: [{player, status, completedAt}] }
function getTaskCompletionSummary(task) {
  // Determine which players this task is assigned to
  let assignedPlayers = [];
  const catId = task.catId;
  if (task.targetScope === 'all' || task.assignedTo === 'all') {
    assignedPlayers = catPlayers(catId);
  } else if (task.targetScope === 'team') {
    assignedPlayers = teamPlayers(task.targetTeamId);
  } else if (task.targetScope === 'player' || typeof task.assignedTo === 'number') {
    const pid = task.targetPlayerId || task.assignedTo;
    const p = state.players.find(x => x.id === pid);
    if (p) assignedPlayers = [p];
    else {
      // might be a team id for legacy 'team' type
      const t = state.teams.find(t => t.id === pid);
      if (t) assignedPlayers = teamPlayers(t.id);
    }
  } else if (task.assignedTo === 'all-teams') {
    assignedPlayers = catTeams(catId).flatMap(t => teamPlayers(t.id));
  }

  const players = assignedPlayers.map(p => {
    const c = getPlayerCompletion(task.id, p.id);
    return { player: p, status: c.status, completedAt: c.completedAt, xpEarned: c.xpEarned };
  });

  return {
    total: players.length,
    done: players.filter(x => x.status === 'done').length,
    missed: players.filter(x => x.status === 'missed').length,
    pending: players.filter(x => x.status === 'pending').length,
    players,
  };
}

// Ensure completion rows exist for all players assigned to a task (called when tasks are created/assigned)
function initCompletionsForTask(task) {
  const summary = getTaskCompletionSummary(task);
  summary.players.forEach(({ player }) => {
    if (!state.taskCompletions.find(c => c.taskId === task.id && c.playerId === player.id)) {
      state.taskCompletions.push({ taskId: task.id, playerId: player.id, status: 'pending', completedAt: null, xpEarned: 0 });
    }
  });
}
function catTeams(catId) { return state.teams.filter(t=>t.catId===catId); }
function teamPlayers(teamId) { return state.players.filter(p=>p.teamId===teamId); }
function catPlayers(catId) { return catTeams(catId).flatMap(t=>teamPlayers(t.id)); }
function catTasks(catId) { return state.tasks.filter(t=>t.catId===catId); }

// ── DATE VISIBILITY CHECK ──
// A task with a taskDate is only visible in Player View on that exact date
// (or any future date if it's recurring). Owner sees all tasks regardless.
function isTaskVisibleOnDate(task) {
  // No date set → always visible (legacy/seed tasks)
  if (!task.taskDate) return true;
  const today = new Date().toISOString().split('T')[0];
  if (task.recurring || task.repeatDaily) {
    // Recurring: visible from taskDate onwards (today >= taskDate)
    return today >= task.taskDate;
  }
  // One-time: only visible exactly on taskDate
  return today === task.taskDate;
}

// ── RECURRING TASK HELPER ──
// Returns true if task should be visible today based on its recurrence settings.
// Non-recurring tasks always pass. Recurring tasks pass only if today's day is in recurringDays.
// Edge cases: recurring=true but no recurringDays → hide task (invalid config).
function isTaskActiveToday(task) {
  // Non-recurring: always show (existing behavior preserved)
  if (!task.recurring) return true;
  // Recurring: validate recurringDays exists and is non-empty
  if (!Array.isArray(task.recurringDays) || task.recurringDays.length === 0) return false;
  // Check if today (0=Sun … 6=Sat) is in the configured days
  const todayDow = new Date().getDay();
  return task.recurringDays.includes(todayDow);
}

// ── TASK VISIBILITY FILTER ──
// Owner sees all tasks for the environment (unfiltered).
// Player sees ONLY tasks that match their scope:
//
// NEW schema (targetScope field):
//   targetScope === 'all'    → visible to every player
//   targetScope === 'team'   → visible only if player.teamId === task.targetTeamId
//   targetScope === 'player' → visible only if player.id === task.targetPlayerId
//
// LEGACY schema (type + assignedTo, backward-compatible with seed data):
//   type 'general'  (assignedTo:'all')   → visible to all
//   type 'team-all'                      → visible to all team members
//   type 'team'     (assignedTo: teamId) → visible only to that team
//   type 'special'  (assignedTo: playerId) → visible only to that player
//
// Cross-environment leakage is prevented by the catId guard.
function visibleTasksFor(catId, playerId) {
  // Owner: full unfiltered view
  if (auth.isOwner()) return catTasks(catId);

  const player = state.players.find(p => p.id === playerId);
  // No identified player → show only all-player tasks
  if (!player) return catTasks(catId).filter(t => {
    if (t.catId !== catId) return false;
    if (!isTaskVisibleOnDate(t)) return false; // date filter
    if (!isTaskActiveToday(t)) return false; // respect recurring days even for anonymous view
    if (t.targetScope) return t.targetScope === 'all';
    return t.type === 'general' || t.type === 'team-all';
  });

  return catTasks(catId).filter(task => {
    // Strict environment boundary — defence in depth
    if (task.catId !== catId) return false;

    // ── DATE FILTER: only show task if today matches assigned date (player view only) ──
    if (!isTaskVisibleOnDate(task)) return false;

    // ── RECURRING FILTER: hide task if today is not in its configured days ──
    // (Only applied in player view; owners see all tasks regardless of day)
    if (!isTaskActiveToday(task)) return false;

    // ── NEW schema: targetScope field takes priority ──
    if (task.targetScope) {
      if (task.targetScope === 'all') return true;
      if (task.targetScope === 'team') return player.teamId === task.targetTeamId;
      if (task.targetScope === 'player') return player.id === task.targetPlayerId;
      return false; // unknown scope — deny
    }

    // ── LEGACY schema: type + assignedTo ──
    if (task.type === 'general') {
      return task.assignedTo === 'all';
    }
    if (task.type === 'team') {
      return task.assignedTo === player.teamId;
    }
    if (task.type === 'team-all') {
      return !!player.teamId;
    }
    if (task.type === 'special') {
      return task.assignedTo === player.id;
    }
    // Unknown type — deny
    return false;
  });
}
function rankedPlayers(catId) { return [...catPlayers(catId)].sort((a,b)=>b.xp-a.xp); }
function playerTeam(playerId) { const p=state.players.find(x=>x.id===playerId); return p?state.teams.find(t=>t.id===p.teamId):null; }
function getPlayerInitials(name) { return name.split(' ').map(n=>n[0]).join('').slice(0,2).toUpperCase(); }
function getAvatarColor(id) { return AVATAR_COLORS[(id-1)%AVATAR_COLORS.length]; }
// Returns an inline HTML string for a player avatar: image if avatarUrl set, else colored initials
function renderAvatarHtml(p, size=40, extraStyle='') {
  const color = getAvatarColor(p.id);
  const base = `width:${size}px;height:${size}px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:${Math.round(size*0.38)}px;flex-shrink:0;overflow:hidden;${extraStyle}`;
  if (p.avatarUrl) {
    return `<div style="${base}border:2px solid ${color}44"><img src="${p.avatarUrl}" style="width:100%;height:100%;object-fit:cover"></div>`;
  }
  return `<div style="${base}background:${color}22;color:${color};border:2px solid ${color}44">${getPlayerInitials(p.name)}</div>`;
}
function getActiveMultiplier() { const e=state.activeEvents.find(e=>e.multiplier&&e.endsAt>Date.now()); return e?e.multiplier:1; }
function el(tag,cls='',text='') { const e=document.createElement(tag); if(cls) e.className=cls; if(text) e.textContent=text; return e; }
function html(cls,markup) { const e=el('div',cls); e.innerHTML=markup; return e; }
function fmtTime(ms) { const s=Math.ceil(ms/1000); const m=Math.floor(s/60); const ss=s%60; return m>0?m+'m '+ss+'s':ss+'s'; }

// ═══════════════════════════════════════════════════════════════════════════
// PERSISTENCE LAYER — v21 Hardened Firebase Architecture
// ─────────────────────────────────────────────────────────────────────────
//
// MODE DECISION (explicit, never silent):
//   "firebase" — Firestore is the single source of truth.
//                All devices share game/lag in real-time.
//   "local"    — localStorage only (no Firebase credentials present,
//                or connection failed after retry exhaustion).
//
// INITIALISATION FLOW:
//   1. Validate config shape (all 6 required fields present, no placeholders)
//   2. Guard against duplicate firebase.initializeApp() calls
//   3. Get Firestore instance and resolve game/lag document reference
//   4. Verify the connection is live with a real read (not just SDK init)
//   5. Seed Firestore from localStorage on first-ever run
//   6. Attach onSnapshot listener (tears down any previous listener first)
//   7. Log mode clearly — "[DB MODE] firebase" or "[DB MODE] local"
//
// WRITE SAFETY:
//   • Every Firestore write is awaited inside save() with a 10s timeout
//   • On write failure: up to 2 automatic retries with 1s back-off
//   • After retry exhaustion: falls through to _saveLocal() as offline cache
//   • _lastWriteAt debounce window: 1500ms (prevents echo re-renders)
//
// REAL-TIME SYNC:
//   • onSnapshot is only attached after a verified live read
//   • Duplicate listeners are prevented via _unsubscribe teardown
//   • Own-write echoes are suppressed via _lastWriteAt guard
//   • Errors inside the snapshot callback are caught and logged
//
// DOCUMENT SIZE GUARD:
//   • activityLog is capped at 200 entries before every write
//   • taskCompletions is capped at 1000 entries before every write
//   (Firestore hard limit is 1 MiB per document)
// ─────────────────────────────────────────────────────────────────────────

const DB = (() => {
  // ── Constants ─────────────────────────────────────────────────────────────
  const LOCAL_KEY          = 'lag_data';
  const FB_COLLECTION      = 'game';
  const FB_DOCUMENT        = 'lag';
  const FB_DOC_PATH        = `${FB_COLLECTION}/${FB_DOCUMENT}`;
  const WRITE_TIMEOUT_MS   = 10_000;   // max ms to wait for a Firestore write
  const WRITE_RETRY_MAX    = 2;        // retries after first failure
  const WRITE_RETRY_DELAY  = 1_000;    // ms between retries
  const ECHO_DEBOUNCE_MS   = 1_500;    // ignore own-write echoes within this window
  const LOG_PRE            = '[DB]';   // console log prefix

  // Keys that travel to/from the monolithic game/lag Firestore document.
  // NOTE: 'players' is intentionally excluded — players have their own
  // Firestore collection (players/{id}) managed by _attachPlayersListener().
  const SNAP_KEYS = [
    'teams', 'categories', 'tasks',
    'activityLog', 'activeEvents', 'challenges',
    'environment', 'taskCompletions',
  ];

  // ── Private state ──────────────────────────────────────────────────────────
  let _app                = null;   // firebase.app instance
  let _db                 = null;   // Firestore instance
  let _ref                = null;   // DocumentReference  game/lag
  let _unsubscribe        = null;   // onSnapshot teardown handle (game/lag doc)
  let _playersCol         = null;   // CollectionReference  players/
  let _unsubscribePlayers = null;   // onSnapshot teardown handle (players collection)
  let _mode               = null;   // "firebase" | "local" | null (not yet initialised)
  let _lastWriteAt        = 0;      // epoch ms of our most recent write (echo guard)
  let _initDone           = false;  // guards against double-init

  // ── Config validation ──────────────────────────────────────────────────────
  // Validates all 6 required fields exist, are non-empty strings,
  // and have not been left as REPLACE_* placeholder values.
  function _validateConfig() {
    const required = ['apiKey','authDomain','projectId','storageBucket','messagingSenderId','appId'];
    for (const key of required) {
      const val = FIREBASE_CONFIG[key];
      if (!val || typeof val !== 'string' || val.startsWith('REPLACE_') || val.trim() === '') {
        console.warn(`${LOG_PRE} Config field "${key}" is missing or is a placeholder.`);
        return false;

    return true;

  // ── Snapshot builder (state → plain object for Firestore) ─────────────────
  function _buildSnap() {
    const s = {};
    SNAP_KEYS.forEach(k => { s[k] = state[k]; });
    // Document size guard — trim before every write
    if (Array.isArray(s.activityLog) && s.activityLog.length > 200) {
      s.activityLog = s.activityLog.slice(-200);
    }
    if (Array.isArray(s.taskCompletions) && s.taskCompletions.length > 1000) {
      s.taskCompletions = s.taskCompletions.slice(-1000);
    }
    s._updatedAt = Date.now();
    return s;
  }

  // ── Snapshot applier (Firestore data → in-memory state) ───────────────────
  // NOTE: snap.players is intentionally NOT handled here.
  // Players are synced via _attachPlayersListener() (players/ collection).
  function _applySnap(snap) {
    if (!snap || typeof snap !== 'object') return;
    if (snap.teams)        state.teams        = snap.teams;
    if (snap.categories)   state.categories   = snap.categories.map(c => ({ environmentPassword:'', roles:[], importantLinks:[], ...c }));
    if (snap.tasks)        state.tasks        = snap.tasks.map(t => ({ locked:false, taskDate:'', taskLink:'', recurring:false, recurringDays:[], ...t }));
    if (snap.activityLog)  state.activityLog  = snap.activityLog;
    if (snap.activeEvents) state.activeEvents = snap.activeEvents;
    if (snap.challenges)   state.challenges   = snap.challenges;
    if (snap.environment) {
      state.environment.rules = Array.isArray(snap.environment.rules) ? snap.environment.rules : [];
      state.environment.links = Array.isArray(snap.environment.links) ? snap.environment.links : [];
    }
    if (snap.taskCompletions) state.taskCompletions = snap.taskCompletions;
  }

  // ── Promise-wrapped write with timeout ────────────────────────────────────
  function _writeWithTimeout(ref, data) {
    return new Promise((resolve, reject) => {

        () => reject(new Error('Firestore write timed out after ' + WRITE_TIMEOUT_MS + 'ms')),
        WRITE_TIMEOUT_MS
      );
      ref.set(data)
        .then(() => { clearTimeout(timer); resolve(); })
        .catch(err => { clearTimeout(timer); reject(err); });
    });
  }

  // ── Write with automatic retry ────────────────────────────────────────────
  async function _writeWithRetry(data, attempt = 1) {
    try {
      await _writeWithTimeout(_ref, data);
      console.log(`${LOG_PRE} Write OK${attempt > 1 ? ' (attempt ' + attempt + ')' : ''}`);
    } catch (err) {
      if (attempt <= WRITE_RETRY_MAX) {
        console.warn(`${LOG_PRE} Write attempt ${attempt} failed — retrying in ${WRITE_RETRY_DELAY}ms:`, err.message);
        await new Promise(r => setTimeout(r, WRITE_RETRY_DELAY));

  // ── Attach real-time listener ──────────────────────────────────────────────
  function _attachListener() {
    if (_unsubscribe) {

      (docSnapshot) => {

      (listenerErr) => {

        _unsubscribe = null;

            console.log(`${LOG_PRE} Re-attaching onSnapshot listener after error`);

  // ═══════════════════════════════════════════════════════════════════════════
  // PLAYERS COLLECTION — real-time sync via players/{id} documents
  // ─────────────────────────────────────────────────────────────────────────
  // Each player is stored as its own Firestore document: players/{player.id}
  // This avoids the 1 MiB single-document limit and enables per-player writes.
  //
  // STEP A — READ: _attachPlayersListener() opens an onSnapshot on the whole
  //   collection, applies each document to state.players, and logs to console.
  // STEP B — RENDER: after state.players is populated, render() is called.
  // STEP C/D — WRITE: savePlayer(p) does a set() on players/{p.id}.
  // STEP E — DELETE: deletePlayerDoc(id) removes players/{id}.
  // ═══════════════════════════════════════════════════════════════════════════

  // Normalize a single Firestore player document into a safe player object
  function _applyPlayerDoc(docData) {
    return {
      achievements:   [],
      playerPassword: '',
      privateNotes:   [],
      avatarUrl:      '',
      ...docData,
    };
  }

  // STEP A + B: Attach real-time listener on the players/ collection
  function _attachPlayersListener() {

      try { _unsubscribePlayers(); } catch(e) {}

    }

    console.log(`${LOG_PRE} [Players] Attaching onSnapshot listener → players/`);

    _unsubscribePlayers = _playersCol.onSnapshot(
      (querySnapshot) => {

          querySnapshot.forEach(doc => {
            players.push(_applyPlayerDoc(doc.data()));
          });

          // STEP B: Apply to state and render
          state.players = players;
          try { computeTeamXP(); } catch(e) {}
          try { render(); } catch(e) {}
        } catch (err) {
          console.error(`${LOG_PRE} [Players] onSnapshot callback error:`, err);
        }
      },
      (err) => {
        console.error(`${LOG_PRE} [Players] Listener error (re-attaching in 5s):`, err);
        _unsubscribePlayers = null;
        setTimeout(() => {
          if (_mode === 'firebase' && _playersCol) {
            console.log(`${LOG_PRE} [Players] Re-attaching listener after error`);
            _attachPlayersListener();
          }
        }, 5_000);
      }
    );

    console.log(`${LOG_PRE} [Players] ✅ Real-time sync active → players/`);
  }

  // ═══════════════════════════════════════════════════════════════════════════
  // PUBLIC API
  // ═══════════════════════════════════════════════════════════════════════════
  return {

    async init() {
      if (_initDone) {
        console.warn(`${LOG_PRE} init() called more than once — skipping duplicate`);
        return;
      }

      // Step 1: Config validation

      } catch (fsErr) {

      } catch (refErr) {

        this._loadLocal();

      // Step 5: Connection verification with real read
      let docSnapshot;
      try {
        console.log(`${LOG_PRE} Verifying connection with live read…`);

        console.log(`${LOG_PRE} Connection verified ✓ (document ${docSnapshot.exists ? 'found' : 'will be created'})`);
      } catch (readErr) {

        this._loadLocal();

      }

      // Step 6: Mode confirmed

      console.log(`${LOG_PRE} ✅ [DB MODE] firebase — project: ${FIREBASE_CONFIG.projectId}`);

      try {
        if (docSnapshot.exists) {

        } else {

          } catch(e) { console.warn(`${LOG_PRE} localStorage seed read failed:`, e.message); }
          try {
            await _ref.set(_buildSnap());
            console.log(`${LOG_PRE} Firestore document created ✓`);
          } catch(e) { console.error(`${LOG_PRE} Initial seed write failed (non-fatal):`, e); }
        }
      } catch (applyErr) {
        console.error(`${LOG_PRE} Applying initial snapshot failed:`, applyErr);
      }

      // Step 8: Attach real-time listener on the monolithic game/lag document
      try {
        _attachListener();
      } catch (listenerErr) {
        console.error(`${LOG_PRE} onSnapshot attach failed:`, listenerErr);
      }

      // Step 9: Resolve players/ collection reference and attach player listener
      try {
        _playersCol = _db.collection('players');
        console.log(`${LOG_PRE} [Players] Collection reference resolved → players/`);
        _attachPlayersListener();
      } catch (playersErr) {
        console.error(`${LOG_PRE} [Players] Failed to attach players listener:`, playersErr);
      }
    },

    async save() {
      // Always write local cache first (offline resilience, both modes)
      this._saveLocal();

      if (_mode === 'firebase' && _ref) {
        const snap = _buildSnap();
        _lastWriteAt = Date.now();
        try {
          await _writeWithRetry(snap);
        } catch (writeErr) {
          console.error(`${LOG_PRE} save() — all Firestore retries exhausted. Preserved in localStorage:`, writeErr.message);
        }
      }
    },

    _saveLocal() {
      try {
        const snap = {};
        SNAP_KEYS.forEach(k => { snap[k] = state[k]; });
        localStorage.setItem(LOCAL_KEY, JSON.stringify(snap));
      } catch(e) {
        console.warn(`${LOG_PRE} localStorage write failed:`, e.message);
      }
    },

    _loadLocal() {
      try {
        const raw = localStorage.getItem(LOCAL_KEY);
        if (!raw) { console.log(`${LOG_PRE} localStorage: no existing data — starting fresh`); return; }
        _applySnap(JSON.parse(raw));
        console.log(`${LOG_PRE} localStorage: data loaded ✓`);
      } catch(e) {
        console.error(`${LOG_PRE} localStorage read/parse failed:`, e.message);
      }
    },

    // ── STEP C/D: Write one player document to players/{player.id} ─────────────
    // Covers CREATE (new player) and UPDATE (edit player, award XP, etc.)
    // Falls back to saveState() (localStorage) when not in firebase mode.
    async savePlayer(p) {
      if (_mode === 'firebase' && _playersCol) {

        } catch (err) {
          console.error(`${LOG_PRE} [Players] savePlayer failed for id:${p.id}:`, err.message);
          // Fallback: persist via the monolithic save so data is not lost
          this._saveLocal();
        }
      } else {

        this._saveLocal();
      }
    },

    // ── STEP E: Delete one player document from players/{id} ─────────────────
    async deletePlayerDoc(playerId) {
      if (_mode === 'firebase' && _playersCol) {
        try {
          await _playersCol.doc(String(playerId)).delete();
          console.log(`${LOG_PRE} [Players] deletePlayerDoc OK — id:${playerId}`);
        } catch (err) {
          console.error(`${LOG_PRE} [Players] deletePlayerDoc failed for id:${playerId}:`, err.message);
        }
      }
      // In local mode the player is already removed from state.players;
      // _saveLocal() called by the caller via saveState() covers it.
    },

    get isFirebaseMode() { return _mode === 'firebase'; },
    get isConfigured()   { return _validateConfig(); },
    get mode()           { return _mode; },
    get syncActive()     { return _unsubscribe !== null; },
    get playersReady()   { return _unsubscribePlayers !== null; },
  };
})();

// ========== FLOATING XP ==========
function showFloatingXP(amount, x, y) {
  const e=document.createElement('div'); e.className='xp-float';
  e.textContent=(amount>0?'+':'')+amount+' XP';
  if(amount<0) e.style.color='var(--red)';
  e.style.left=(x||window.innerWidth/2)+'px'; e.style.top=(y||window.innerHeight/2)+'px';
  document.body.appendChild(e);
  setTimeout(()=>e.remove(),1200);
}

// ========== LEVEL UP ==========
function showLevelUp(level, name) {
  const ov=document.createElement('div'); ov.className='levelup-overlay';
  ov.innerHTML=`<div class="levelup-card"><div class="levelup-label">⬆ Level Up!</div><div class="levelup-num">${level}</div><div style="font-size:18px;font-weight:800;color:var(--purple);margin:4px 0">${name}</div><div class="levelup-sub">New powers unlocked</div></div>`;
  document.body.appendChild(ov);
  setTimeout(()=>ov.remove(),2200);
}

// ========== ACHIEVEMENT POPUP ==========
function showAchievementPopup(ach) {
  const el2=document.createElement('div'); el2.className='achievement-popup';
  el2.innerHTML=`<div class="achieve-icon">${ach.icon}</div><div><div class="achieve-title">🏅 Achievement Unlocked!</div><div class="achieve-name">${ach.name}</div><div class="achieve-desc">${ach.desc}</div></div>`;
  document.body.appendChild(el2);
  setTimeout(()=>{ el2.style.transition='opacity .4s,transform .4s'; el2.style.opacity='0'; el2.style.transform='translateX(40px)'; setTimeout(()=>el2.remove(),400); },3000);
}

// ========== TOAST ==========
function showToast(msg) {
  state.toast=msg; saveState();
  if(state.toastTimer) clearTimeout(state.toastTimer);
  state.toastTimer=setTimeout(()=>{ state.toast=null; render(); },2800);
}

// ========== EVENT SYSTEM ==========
const EVENT_TEMPLATES = {
  doubleXP:  { name:'Double XP', icon:'⚡', desc:'All XP rewards doubled!', multiplier:2, color:'var(--amber)', duration:300000 },
  finalHour: { name:'Final Hour', icon:'⏱', desc:'Sprint! Last 60 minutes boost.', multiplier:1.5, color:'var(--blue)', duration:60000 },
  suddenDeath:{ name:'Sudden Death', icon:'💀', desc:'Missed tasks cost 2× penalty!', multiplier:1, penalty:2, color:'var(--red)', duration:180000 },
  teamWar:   { name:'Team War', icon:'⚔', desc:'Teams compete for 5× XP bonus!', multiplier:5, color:'var(--purple)', duration:600000 },
};

window.launchEvent = (type) => {
  const tmpl = EVENT_TEMPLATES[type];
  if(!tmpl) return;
  // Remove existing same type
  state.activeEvents = state.activeEvents.filter(e=>e.type!==type);
  state.activeEvents.push({ id:Date.now(), type, ...tmpl, endsAt:Date.now()+tmpl.duration });
  if(type==='doubleXP'||type==='teamWar') document.body.classList.add('double-xp-active');
  showToast(`🚀 ${tmpl.name} activated!`);
  render();
  // Auto-expire
  setTimeout(()=>{
    state.activeEvents=state.activeEvents.filter(e=>e.type!==type);
    document.body.classList.remove('double-xp-active');
    render();
  }, tmpl.duration);
};

window.dismissEvent = (id) => {
  state.activeEvents=state.activeEvents.filter(e=>e.id!==id);
  render();
};

// ========== CHALLENGE SYSTEM ==========
window.createChallenge = (type, aId, bId, xpGoal) => {
  const catId=state.categories[state.currentCat]?.id;
  const a=type==='pvp'?state.players.find(p=>p.id===aId):state.teams.find(t=>t.id===aId);
  const b=type==='pvp'?state.players.find(p=>p.id===bId):state.teams.find(t=>t.id===bId);
  if(!a||!b) return;
  state.challenges.push({ id:Date.now(), catId, type, aId, bId, xpGoal:xpGoal||200, startXpA:a.xp||a.totalXP||0, startXpB:b.xp||b.totalXP||0, createdAt:new Date().toLocaleTimeString() });
  showToast(`⚔ Challenge started: ${a.name} vs ${b.name}!`);
  closeModal();
  render();
};

// ========== ACTIONS ==========
// navigate() is defined below in the SAFE VIEW CONTROLLER block — do not define it here
window.setCat = i => {
  const cat = state.categories[i];
  if (!cat) return;
  // Owner bypasses all environment gating
  if (auth.isOwner()) {
    state.currentCat = i; state.tab = 'teams'; render(); return;
  }
  // If environment has no password, enter freely
  if (!cat.environmentPassword || cat.environmentPassword.trim() === '') {
    state.currentCat = i; state.tab = 'teams'; render(); return;
  }
  // Already unlocked this session → enter
  if (envAccess.canEnter(cat.id)) {
    state.currentCat = i; state.tab = 'teams'; render(); return;
  }
  // Password required — show gate modal without changing currentCat
  state.modal = { type: 'envPasswordGate', data: i };
  render();
};
window.setTab = t => { state.tab=t; render(); };
window.openModal = (type,data=null) => { state.modal={type,data}; render(); };
window.closeModal = () => {
  // Clean up password-change modal globals if they exist
  if (typeof window._spValidate === 'function') window._spValidate = null;
  if (typeof window._spSubmitting !== 'undefined') window._spSubmitting = false;
  state.modal = null;
  render();
};
window.updateAssignOptions = () => {
  const scope = document.getElementById('m-type')?.value;
  const row = document.getElementById('assign-row');
  const sel = document.getElementById('m-assign');
  if (!row || !sel) return;

  if (scope === 'all') {
    // ALL PLAYERS — no assignment needed
    row.style.display = 'none';
  } else if (scope === 'team') {
    // TEAM BASED — show team options only
    row.style.display = 'block';
    const catId = state.categories[state.currentCat]?.id;
    const teams = catTeams(catId);
    sel.innerHTML = teams.map(t => `<option value="t:${t.id}">${t.name}</option>`).join('');
    document.querySelector('#assign-row label') && (document.querySelector('#assign-row label').textContent = 'Assign to Team');
  } else if (scope === 'player') {
    // SPECIFIC PLAYER — show player options only
    row.style.display = 'block';
    const catId = state.categories[state.currentCat]?.id;
    const players = catPlayers(catId);
    sel.innerHTML = players.map(p => `<option value="p:${p.id}">${p.name}</option>`).join('');
    document.querySelector('#assign-row label') && (document.querySelector('#assign-row label').textContent = 'Assign to Player');
  } else {
    row.style.display = 'none';
  }
};

window.submitEnvPasswordGate = (catIndex) => {
  const cat = state.categories[catIndex];
  if (!cat) { closeModal(); return; }
  const attempt = document.getElementById('env-pw-input')?.value ?? '';
  if (envAccess.validate(cat.id, attempt)) {
    envAccess.unlock(cat.id);
    state.currentCat = catIndex;
    state.tab = 'teams';
    closeModal();
    showToast('● Environment unlocked');
  } else {
    const errEl = document.getElementById('env-pw-err');
    if (errEl) {
      errEl.textContent = 'Incorrect password. Access denied.';
      errEl.style.display = 'block';
    }
    const inp = document.getElementById('env-pw-input');
    if (inp) inp.value = '';
  }
};

window.submitAddCat = () => {
  const name=document.getElementById('m-name')?.value?.trim();
  const dur=document.getElementById('m-dur')?.value?.trim();
  const envPw=document.getElementById('m-env-pw')?.value?.trim()||'';
  if(!name) return;
  const id=Math.max(...state.categories.map(c=>c.id),0)+1;
  state.categories.push({id,name,duration:dur||'30 days',status:'active',environmentPassword:envPw,roles:[],importantLinks:[]});
  state.currentCat=state.categories.length-1;
  saveState(); closeModal(); showToast(`Mission "${name}" created!${envPw?' 🔒 Password protected.':''}`);
};

window.submitEnvPassword = (catIdx, remove) => {
  const cat = state.categories[catIdx];
  if(!cat) return;
  if(remove) {
    cat.environmentPassword = '';
    saveState(); closeModal(); showToast(`🔓 Password removed from "${cat.name}"`);
    render(); return;
  }
  const newPw = document.getElementById('m-new-env-pw')?.value || '';
  const confirm = document.getElementById('m-confirm-env-pw')?.value || '';
  const errEl = document.getElementById('m-env-pw-err');
  if(newPw && newPw !== confirm) {
    if(errEl) errEl.textContent = '⚠ Passwords do not match.';
    return;
  }
  cat.environmentPassword = newPw.trim();
  saveState(); closeModal();
  showToast(newPw ? `🔒 Password set for "${cat.name}"` : `🔓 Password removed from "${cat.name}"`);
  render();
};

window.submitAddTeam = (catId) => {
  const name=document.getElementById('m-name')?.value?.trim();

window.submitAddPlayer = () => {
  const name=document.getElementById('m-name')?.value?.trim();
  const teamId=parseInt(document.getElementById('m-team')?.value);
  if(!name||!teamId) return;
  const id=Math.max(...state.players.map(p=>p.id),0)+1;
  const newPlayer={id,teamId,name,xp:0,streak:0,completionRate:0,missedTasks:0,achievements:[],playerPassword:'',privateNotes:[],avatarUrl:''};
  // STEP C: write to Firestore players/ collection (or localStorage in local mode)
  // The onSnapshot listener will push the new doc back into state.players and re-render.
  // In local mode we mutate state directly and save.

    DB.savePlayer(newPlayer);
  } else {
    state.players.push(newPlayer);
    saveState();
  }

window.submitAddTask = (catId) => {
  const name=document.getElementById('m-tname')?.value?.trim();
  const scope=document.getElementById('m-type')?.value;  // 'all' | 'team' | 'player'
  const xpValue=parseInt(document.getElementById('m-xp')?.value)||20;
  const daily=document.getElementById('m-daily')?.checked;

  // ── DATE field (required) ──
  const taskDate = document.getElementById('m-task-date')?.value?.trim();
  if (!taskDate) {
    const el2 = document.getElementById('m-task-date');
    if (el2) { el2.style.borderColor = 'var(--red)'; el2.focus(); }
    return;
  }

  // ── LINK field (optional) ──
  let taskLink = document.getElementById('m-task-link')?.value?.trim() || '';
  if (taskLink && !taskLink.startsWith('http')) taskLink = 'https://' + taskLink;

  // ── RECURRING fields (new — safe to read; undefined if not present) ──
  const recurringChecked = document.getElementById('m-recurring')?.checked || false;
  let recurringDays = [];
  if (recurringChecked) {
    // Collect checked day values (0–6)
    document.querySelectorAll('.m-rday:checked').forEach(cb => recurringDays.push(parseInt(cb.value)));
    // Validate: at least one day required when recurring is enabled
    if (recurringDays.length === 0) {
      const errEl = document.getElementById('m-rday-err');
      if (errEl) errEl.style.display = 'block';
      return; // abort — do not save
    }
  }

  if(!name) return;

  // Map targetScope → internal type + assignedTo (for markTask XP distribution compat)
  // Also store explicit targetScope/targetTeamId/targetPlayerId for strict filtering
  let type, assignedTo, targetScope, targetTeamId = null, targetPlayerId = null;

  if (scope === 'all') {
    // ALL PLAYERS
    targetScope = 'all';
    type = 'general';
    assignedTo = 'all';
  } else if (scope === 'team') {
    // TEAM BASED
    targetScope = 'team';
    type = 'team';
    const v = document.getElementById('m-assign')?.value;
    if (v?.startsWith('t:')) {
      targetTeamId = parseInt(v.slice(2));
      assignedTo = targetTeamId;
    } else {
      return; // no team selected — abort
    }
  } else if (scope === 'player') {
    // SPECIFIC PLAYER
    targetScope = 'player';
    type = 'special';
    const v = document.getElementById('m-assign')?.value;
    if (v?.startsWith('p:')) {
      targetPlayerId = parseInt(v.slice(2));
      assignedTo = targetPlayerId;
    } else {
      return; // no player selected — abort
    }
  } else {
    return; // unknown scope — abort
  }

  const id=Math.max(...state.tasks.map(t=>t.id),0)+1;
  const newTask = {id, catId, type, name, assignedTo, xpValue, repeatDaily:daily, status:'active', locked:false,
    targetScope, targetTeamId, targetPlayerId,
    // ── DATE field (new) — task only appears on/after this date in Player View ──
    taskDate: taskDate,
    // ── LINK field (new) — clickable link shown in Player View ──
    taskLink: taskLink || '',
    // ── RECURRING fields (new; default false/[] for non-recurring tasks) ──
    recurring: recurringChecked,
    recurringDays: recurringChecked ? recurringDays : []
  };
  state.tasks.push(newTask);
  initCompletionsForTask(newTask);
  saveState(); closeModal(); showToast(`Task "${name}" assigned! +${xpValue} XP`);
};

// ── markTask: now sets status per player, not on the task itself ──
// Called from owner view. playerId can be passed explicitly (per-player control)
// or omitted to mark ALL assigned players (bulk action).
window.markTask = (taskId, status, rowEl, specificPlayerId) => {
  const task = state.tasks.find(t => t.id === taskId);
  if (!task || task.locked || state.tasksLocked) return;
  if (rowEl) rowEl.classList.add(status === 'done' ? 'task-done-flash' : 'task-missed-flash');

  const mult = getActiveMultiplier();
  const baseXP = status === 'done' ? task.xpValue : status === 'late' ? Math.round(task.xpValue * 0.6) : 0;
  const xp = status === 'done' ? Math.round(baseXP * mult) : baseXP;

  // Determine target players
  let targetPlayers = [];
  if (specificPlayerId) {
    const p = state.players.find(p => p.id === specificPlayerId);
    if (p) targetPlayers = [p];
  } else {
    // Bulk: all assigned players (existing behavior)
    if (task.assignedTo === 'all') {
      const catId = state.categories[state.currentCat]?.id;
      targetPlayers = catPlayers(catId);
    } else if (task.assignedTo === 'all-teams') {
      const catId = state.categories[state.currentCat]?.id;
      targetPlayers = catTeams(catId).flatMap(t => teamPlayers(t.id));
    } else if (typeof task.assignedTo === 'number') {
      const p = state.players.find(p => p.id === task.assignedTo);
      const t = state.teams.find(t => t.id === task.assignedTo);
      if (p) targetPlayers = [p];
      else if (t) targetPlayers = teamPlayers(t.id);
    }
    // New scope model
    if (task.targetScope === 'all') {
      const catId = state.categories[state.currentCat]?.id;
      targetPlayers = catPlayers(catId);
    } else if (task.targetScope === 'team') {
      targetPlayers = teamPlayers(task.targetTeamId);
    } else if (task.targetScope === 'player') {
      const p = state.players.find(p => p.id === task.targetPlayerId);
      if (p) targetPlayers = [p];
    }
  }

  targetPlayers.forEach(p => {
    // ── Write per-player completion ──
    const now = 'Today ' + new Date().toLocaleTimeString('en', { hour: '2-digit', minute: '2-digit' });
    upsertCompletion(task.id, p.id, {
      status,
      completedAt: status === 'done' || status === 'late' ? now : null,
      xpEarned: xp,
    });

    // ── XP + stats side effects (only on first done/missed, not repeated) ──
    const alreadyLogged = state.activityLog.some(l => l.taskId === task.id && l.playerId === p.id && l.date.startsWith('Today'));
    if (!alreadyLogged) {
      const prevLevel = getLevel(p.xp);
      p.xp = Math.max(0, p.xp + xp);
      if (status === 'done' || status === 'late') p.streak++;
      else if (status === 'missed') { p.missedTasks++; p.streak = 0; }
      const total = state.activityLog.filter(l => l.playerId === p.id).length + 1;
      const done = state.activityLog.filter(l => l.playerId === p.id && l.status === 'done').length + (status === 'done' ? 1 : 0);
      p.completionRate = Math.round((done / total) * 100);
      const logId = Math.max(...state.activityLog.map(l => l.id), 0) + 1;
      state.activityLog.push({ id: logId, playerId: p.id, taskId: task.id, date: now, status, xpEarned: xp });
      const newLevel = getLevel(p.xp);
      if (newLevel > prevLevel) {
        const info = getLevelInfo(p.xp);
        setTimeout(() => showLevelUp(newLevel, info.name), 400);
      }
      const newAch = checkAchievements(p);
      newAch.forEach((ach, i) => setTimeout(() => showAchievementPopup(ach), (i + 1) * 500));
      // STEP D: persist this player's XP/streak/completionRate to Firestore players/
      DB.savePlayer(p);
    }
  });

  // Legacy: only mark task.status done if ALL assigned players are done (for backward compat display)
  const summary = getTaskCompletionSummary(task);
  if (summary.total > 0 && summary.done === summary.total && !task.repeatDaily) {
    task.status = 'done';
  } else {
    task.status = 'active'; // keep active while any player is pending/missed
  }

  const suffix = mult > 1 ? ` (${mult}× boost!)` : '';
  if (status === 'done' && xp > 0) showFloatingXP(xp, window.innerWidth / 2, window.innerHeight - 100);
  const label = specificPlayerId
    ? `${targetPlayers[0]?.name || 'Player'} marked ${status}`
    : status === 'done' ? `✓ Task done! +${xp} XP each${suffix}` : '✗ Task marked missed';
  showToast(label);
  saveState();
  render();
};

window.awardXP = (playerId, amount, evt) => {
  const p=state.players.find(x=>x.id===playerId);
  if(!p) return;
  const prevLevel=getLevel(p.xp);
  p.xp=Math.max(0,p.xp+amount);
  const newLevel=getLevel(p.xp);
  if(newLevel>prevLevel) { const info=getLevelInfo(p.xp); setTimeout(()=>showLevelUp(newLevel,info.name),200); }
  if(evt) showFloatingXP(amount,evt.clientX,evt.clientY);
  else showFloatingXP(amount,window.innerWidth/2,window.innerHeight/2);
  showToast(amount>0?`+${amount} XP awarded to ${p.name}!`:`${amount} XP from ${p.name}`);
  // STEP D: persist XP change to Firestore players/ (was never saved before)
  DB.savePlayer(p);
  render();
  setTimeout(()=>openModal('playerDetail',playerId),50);
};

window.awardTeamBonus = (teamId, evt) => {
  if (!auth.isOwner()) return;
  const players=teamPlayers(teamId);
  const bonus=30;
  players.forEach(p=>{ p.xp+=bonus; p.streak++; });
  const team=state.teams.find(t=>t.id===teamId);
  if(evt) showFloatingXP(bonus,evt.clientX,evt.clientY);
  showToast('🏆 Team Bonus! '+(team?.name||'')+' +'+bonus+' XP each!');
  // STEP D: persist XP change for every player in the team
  players.forEach(p => DB.savePlayer(p));
  render();
};

// ========== PRIVATE NOTES ==========
// Runtime-only unlocked set — never persisted.
const notesAccess = {
  _unlocked: new Set(), // player ids whose notes are unlocked this session
  isUnlocked(playerId) {
    if (auth.isOwner()) return true;
    // Notes access is independent of environment/player session — check only the notes gate.
    return this._unlocked.has(playerId);
  },
  unlock(playerId) { this._unlocked.add(playerId); },
  validate(playerId, attempt) {
    const p = state.players.find(x => x.id === playerId);
    if (!p) return false;
    return attempt === p.playerPassword;
  }
};

window.openNotesModal = (playerId) => {
  state.modal = { type: 'playerNotes', data: playerId };
  render();
};

window.submitNotesPassword = (playerId) => {
  const attempt = document.getElementById('notes-pw-input')?.value ?? '';
  const p = state.players.find(x => x.id === playerId);
  if (!p) { closeModal(); return; }
  // Notes access is independent — no player session required, only the notes password.
  if (!p.playerPassword || p.playerPassword.trim() === '') {
    // No password set — grant access freely
    notesAccess.unlock(playerId);
    state.modal = { type: 'playerNotes', data: playerId };
    render(); return;
  }
  if (notesAccess.validate(playerId, attempt)) {
    notesAccess.unlock(playerId);
    state.modal = { type: 'playerNotes', data: playerId };
    render();
  } else {
    const errEl = document.getElementById('notes-pw-err');
    if (errEl) { errEl.textContent = 'Incorrect password.'; errEl.style.display = 'block'; }
    const inp = document.getElementById('notes-pw-input');
    if (inp) inp.value = '';
  }
};

window.submitAddNote = (playerId) => {
  // Owner can add notes to any player; notes-unlocked player can add notes to themselves
  if (!auth.isOwner() && !notesAccess.isUnlocked(playerId)) return;
  const text = document.getElementById('note-input')?.value?.trim();
  if (!text) return;
  const p = state.players.find(x => x.id === playerId);
  if (!p) return;
  if (!Array.isArray(p.privateNotes)) p.privateNotes = [];
  p.privateNotes.push(text);
  // STEP D: persist note addition to Firestore players/
  DB.savePlayer(p);
  saveState();
  // Keep modal open and re-render so the new note appears immediately.
  // The modal re-renders with fresh data from state — no stale reads.
  state.modal = { type: 'playerNotes', data: playerId };
  render();
  // Re-focus the textarea after the re-render so the player can add another note
  // without having to click again.
  setTimeout(() => document.getElementById('note-input')?.focus(), 40);
};

window.editNote = (playerId, noteIdx) => {
  // Owner can edit any player's notes; notes-unlocked player can edit their own
  if (!auth.isOwner() && !notesAccess.isUnlocked(playerId)) return;
  const p = state.players.find(x => x.id === playerId);
  if (!p || !Array.isArray(p.privateNotes) || p.privateNotes[noteIdx] === undefined) return;
  const newText = prompt('Edit note:', p.privateNotes[noteIdx]);
  if (newText === null) return;
  const trimmed = newText.trim();
  if (!trimmed) return;
  p.privateNotes[noteIdx] = trimmed;
  // STEP D: persist note edit to Firestore players/
  DB.savePlayer(p);
  saveState();
  state.modal = { type: 'playerNotes', data: playerId };
  render();
};

window.deleteNote = (playerId, noteIdx) => {
  // Owner can delete any player's notes; notes-unlocked player can delete their own
  if (!auth.isOwner() && !notesAccess.isUnlocked(playerId)) return;
  const p = state.players.find(x => x.id === playerId);
  if (!p || !Array.isArray(p.privateNotes)) return;
  p.privateNotes.splice(noteIdx, 1);
  // STEP D: persist note deletion to Firestore players/
  DB.savePlayer(p);
  saveState();
  state.modal = { type: 'playerNotes', data: playerId };
  render();
};

window.submitSetPlayerPassword = (playerId) => {
  if (!auth.isOwner()) return;
  const pw = document.getElementById('player-pw-input')?.value ?? '';
  const p = state.players.find(x => x.id === playerId);
  if (!p) return;
  p.playerPassword = pw.trim();
  // STEP D: persist password change to Firestore players/
  DB.savePlayer(p);
  saveState();
  showToast(pw.trim() ? `🔐 Password set for ${p.name}` : `🔓 Password removed for ${p.name}`);
  state.modal = { type: 'playerNotes', data: playerId };
  render();

// ========== EDIT MODAL SYSTEM ==========
window.showEditModal = (opts) => {
  // opts: { title, fields:[{label,id,type,value,options}], onSave }
  const bd = document.createElement('div');
  bd.className = 'modal-backdrop';
  bd.style.zIndex = '9000';
  const m = document.createElement('div');
  m.className = 'modal';
  m.style.maxWidth = '420px';
  const fieldsHtml = opts.fields.map(f => {
    if (f.type === 'select') {
      return `<div class="form-row"><label>${f.label}</label><select id="ef-${f.id}">${(f.options||[]).map(o=>`<option value="${o.value}" ${o.value==f.value?'selected':''}>${o.label}</option>`).join('')}</select></div>`;
    }
    if (f.type === 'textarea') {
      return `<div class="form-row"><label>${f.label}</label><textarea id="ef-${f.id}" rows="3">${(f.value||'').replace(/</g,'&lt;')}</textarea></div>`;
    }
    return `<div class="form-row"><label>${f.label}</label><input type="${f.type||'text'}" id="ef-${f.id}" value="${(f.value||'').replace(/"/g,'&quot;')}" placeholder="${f.placeholder||''}"></div>`;
  }).join('');
  m.innerHTML = `<div class="modal-title">✏️ ${opts.title}</div><button class="modal-close" onclick="this.closest('.modal-backdrop').remove()">×</button>${fieldsHtml}<div class="form-actions"><button class="btn" onclick="this.closest('.modal-backdrop').remove()">Cancel</button><button class="btn primary" id="ef-save">Save Changes</button></div>`;
  bd.appendChild(m);
  document.body.appendChild(bd);
  bd.onclick = (e) => { if (e.target === bd) bd.remove(); };
  m.querySelector('#ef-save').onclick = () => {
    const vals = {};
    opts.fields.forEach(f => {
      const el2 = m.querySelector(`#ef-${f.id}`);
      if (el2) vals[f.id] = el2.value;
    });
    const err = opts.onSave(vals);
    if (!err) bd.remove();
  };
};

window.openAvatarUpload = (playerId) => {
  // Only owner or the unlocked player themselves may update their avatar
  if (!auth.isOwner() && !isPlayerUnlocked(playerId)) return;
  const p = state.players.find(x => x.id === playerId);
  if (!p) return;

  // Snapshot the currently open in-app modal so we can restore it after save/remove.
  // The avatar overlay lives on document.body outside #app, so render() wipes the in-app
  // modal. We store it on the overlay element so saveAvatar/removeAvatar can re-open it.
  const parentModal = state.modal ? { ...state.modal } : null;

  // Build an overlay for file selection + preview
  const bd = document.createElement('div');
  bd.className = 'modal-backdrop';
  bd.style.zIndex = '9100';
  bd.onclick = (e) => { if (e.target === bd) bd.remove(); };
  // Store the parent modal context on the element itself
  bd._parentModal = parentModal;

  bd.innerHTML = `
    <div class="modal" style="max-width:360px">
      <div class="modal-title">🖼 Update Avatar — ${p.name}</div>
      <button class="modal-close" onclick="this.closest('.modal-backdrop').remove()">×</button>
      <div style="text-align:center;margin-bottom:16px">
        <div id="av-preview" data-avatar-id="${p.id}" style="width:80px;height:80px;border-radius:50%;margin:0 auto 10px;overflow:hidden;border:2px solid var(--border2);background:${getAvatarColor(p.id)}22;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:800;color:${getAvatarColor(p.id)}">
          ${p.avatarUrl ? `<img src="${p.avatarUrl}" style="width:100%;height:100%;object-fit:cover">` : getPlayerInitials(p.name)}
        </div>
        <div style="font-size:11px;color:var(--text3);margin-bottom:8px">JPG, PNG or GIF · max ~2 MB</div>
        <label style="cursor:pointer">
          <span class="btn sm primary">📁 Choose Image</span>
          <input type="file" accept="image/*" style="display:none" id="av-file-input" onchange="previewAvatar(this, ${playerId})">
        </label>
      </div>
      ${p.avatarUrl ? `<div style="text-align:center;margin-bottom:12px"><button class="btn sm danger" onclick="removeAvatar(${playerId},this.closest('.modal-backdrop'));this.closest('.modal-backdrop').remove()">🗑 Remove Avatar</button></div>` : ''}
      <div class="form-actions">
        <button class="btn" onclick="this.closest('.modal-backdrop').remove()">Cancel</button>
        <button class="btn primary" id="av-save-btn" onclick="saveAvatar(${playerId},this.closest('.modal-backdrop'));this.closest('.modal-backdrop').remove()">Save Avatar</button>
      </div>
    </div>`;
  document.body.appendChild(bd);
};

// Temporary store for the base64 data URL while user is in the upload dialog
window._pendingAvatarData = {};

window.previewAvatar = (input, playerId) => {
  const file = input.files?.[0];
  if (!file) return;
  if (file.size > 2 * 1024 * 1024) {
    showToast('⚠ Image too large (max ~2 MB)'); return;
  }
  const reader = new FileReader();
  reader.onload = (e) => {
    const dataUrl = e.target.result;
    window._pendingAvatarData[playerId] = dataUrl;
    const preview = document.getElementById('av-preview');
    if (preview) {
      preview.innerHTML = `<img src="${dataUrl}" style="width:100%;height:100%;object-fit:cover">`;
    }
  };
  reader.readAsDataURL(file);
};

window.saveAvatar = (playerId, overlayEl) => {
  if (!auth.isOwner() && !isPlayerUnlocked(playerId)) return;
  const dataUrl = window._pendingAvatarData[playerId];
  if (!dataUrl) return; // nothing selected yet
  const p = state.players.find(x => x.id === playerId);
  if (!p) return;
  p.avatarUrl = dataUrl;
  delete window._pendingAvatarData[playerId];
  // STEP D: persist avatarUrl change to Firestore players/
  DB.savePlayer(p);
  saveState();
  showToast('🖼 Avatar updated!');
  // Restore the modal that was open when the avatar overlay was launched so the user
  // returns to playerDetail / playerDashboard with the updated avatar visible.
  const parentModal = overlayEl?._parentModal ?? null;
  if (parentModal) state.modal = parentModal;
  // Full re-render paints the updated avatarUrl everywhere (leaderboard, profile grid, modals).
  render();
  // Also patch any avatar placeholders still in the live DOM (e.g. standalone overlays that
  // survived the re-render because they live on document.body outside #app).
  document.querySelectorAll(`[data-avatar-id="${playerId}"]`).forEach(el2 => {
    el2.innerHTML = `<img src="${dataUrl}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`;
  });
};

window.removeAvatar = (playerId, overlayEl) => {
  if (!auth.isOwner() && !isPlayerUnlocked(playerId)) return;
  const p = state.players.find(x => x.id === playerId);
  if (!p) return;
  p.avatarUrl = '';
  delete window._pendingAvatarData[playerId];
  // STEP D: persist avatarUrl removal to Firestore players/
  DB.savePlayer(p);
  saveState();
  showToast('🗑 Avatar removed');
  const parentModal = overlayEl?._parentModal ?? null;
  if (parentModal) state.modal = parentModal;
  render();
};

      <div id="et-rdays-row" style="display:${isRecurring?'block':'none'};margin-bottom:12px">
        <div style="font-size:11px;color:var(--text3);margin-bottom:6px;font-weight:600;letter-spacing:.06em">Select days (at least one):</div>
        <div style="display:flex;flex-wrap:wrap;gap:6px">${dayCheckboxes}</div>
        <div id="et-rday-err" style="color:var(--red);font-size:11px;margin-top:4px;display:none">⚠ Select at least one day</div>
      </div>
      <div class="form-actions">
        <button class="btn" onclick="this.closest('.modal-backdrop').remove()">Cancel</button>
        <button class="btn primary" id="et-save">Save Changes</button>
      </div>
    </div>`;
  document.body.appendChild(bd);

  bd.querySelector('#et-save').onclick = () => {
    const nameVal = bd.querySelector('#et-name')?.value?.trim();
    const xpVal   = parseInt(bd.querySelector('#et-xp')?.value);
    const recurringVal = bd.querySelector('#et-recurring')?.checked || false;

    if (!nameVal) return;
    if (isNaN(xpVal) || xpVal < 1) return;

    // Collect days if recurring is enabled
    let recurringDaysVal = [];
    if (recurringVal) {
      bd.querySelectorAll('.et-rday:checked').forEach(cb => recurringDaysVal.push(parseInt(cb.value)));
      if (recurringDaysVal.length === 0) {
        const errEl = bd.querySelector('#et-rday-err');
        if (errEl) errEl.style.display = 'block';
        return; // abort — at least one day required
      }
    }

    // Apply changes (only touching the fields we manage)
    task.name = nameVal;
    task.xpValue = xpVal;
    task.recurring = recurringVal;
    // If recurrence is disabled → clear recurringDays (Task 4 spec)
    task.recurringDays = recurringVal ? recurringDaysVal : [];

    saveState(); showToast('✏️ Task updated'); bd.remove(); render();
  };
};

// ========== SAFE VIEW CONTROLLER ==========
// Centralized registry of all valid views. Navigation to any view not in this
// list automatically falls back to 'dashboard'. Each view has a guaranteed
// render function that is individually try-caught so one broken view never
// crashes the whole app.
const VIEW_REGISTRY = {
  dashboard:   { label: 'Dashboard',   render: (c) => renderDashboard(c) },
  leaderboard: { label: 'Leaderboard', render: (c) => renderLeaderboard(c) },
  activity:    { label: 'Activity',    render: (c) => renderActivity(c) },
  profile:     { label: 'Profile',     render: (c) => renderProfile(c) },
  settings:    { label: 'Settings',    render: (c) => renderSettings(c) },
};

const VALID_VIEWS = Object.keys(VIEW_REGISTRY);

// Safe navigation: validates target, falls back to 'dashboard' if invalid
window.navigate = function(v) {
  const target = VALID_VIEWS.includes(v) ? v : 'dashboard';
  if (!VALID_VIEWS.includes(v)) {
    console.warn(`[NAV] Invalid view "${v}" → falling back to "dashboard"`);
  }
  console.log(`[NAV] ${state.currentView} → ${target}`);
  state.currentView = target;
  render();
};

// [MOBILE] Open sidebar drawer
window.openMobileDrawer = function() {
  const drawer = document.getElementById('mobile-sidebar-drawer');
  const panel = document.getElementById('mob-drawer-content');
  if (!drawer || !panel) return;

  // Clone sidebar content into drawer
  try {
    const sidebarEl = renderSidebar();
    panel.innerHTML = `
      <div class="mob-drawer-handle">
        <span class="mob-drawer-title">Environments</span>
        <button class="mob-drawer-close" onclick="closeMobileDrawer()" aria-label="Close drawer">×</button>
      </div>`;
    // Move sidebar children into drawer
    Array.from(sidebarEl.children).forEach(child => panel.appendChild(child.cloneNode(true)));

    panel.querySelectorAll('.cat-item').forEach(item => {
      const orig = item.getAttribute('onclick') || '';
      item.setAttribute('onclick', orig + ';closeMobileDrawer()');

  } catch(e) {
    panel.innerHTML += '<div style="padding:12px;color:var(--text3);font-size:12px">Unable to load environments.</div>';
