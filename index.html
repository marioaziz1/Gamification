<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>LIFE AS GAME — v22</title>
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://www.gstatic.com https://apis.google.com; connect-src 'self' https://*.googleapis.com https://*.firebaseio.com https://*.cloudfunctions.net wss://*.firebaseio.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:;">
<script>window._firebaseSDKFailed = false;</script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js" onerror="window._firebaseSDKFailed=true;"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js" onerror="window._firebaseSDKFailed=true;"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07090f;--bg2:#0d1120;--bg3:#131829;--bg4:#1a2035;
  --border:#1e2a48;--border2:#2e3f6a;
  --text:#e8ecf4;--text2:#8b95b0;--text3:#5a6480;
  --purple:#7c6fff;--purple2:#5b4fcf;--purple3:#1a1540;
  --teal:#00d4aa;--teal2:#009e7e;--teal3:#001e1a;
  --amber:#ffb830;--amber2:#d4900a;--amber3:#261800;
  --red:#ff4d6a;--red2:#cc2a45;--red3:#250010;
  --green:#4dff91;--green2:#22cc66;--green3:#002514;
  --blue:#4da6ff;--blue2:#2280d4;--blue3:#000e25;
  --gold:#ffd700;
  --r:8px;--r2:14px;
}
html{overflow-x:hidden}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;font-size:14px;line-height:1.5;min-height:100vh;overflow-x:hidden}
.sr-only{position:absolute;left:-9999px}
#entry-screen{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:var(--bg);z-index:100;padding:12px}
.entry-box{width:100%;max-width:360px;background:rgba(13,17,32,0.97);border:1px solid var(--border2);border-radius:16px;padding:32px 24px 24px;display:flex;flex-direction:column;align-items:center}
.entry-logo{font-size:26px;font-weight:900;color:#fff;letter-spacing:.12em;text-transform:uppercase;margin-bottom:6px}
.entry-logo span{color:var(--teal)}
.entry-tagline{font-size:11px;letter-spacing:.25em;color:var(--text3);text-transform:uppercase;margin-bottom:24px}
.entry-btns{display:flex;flex-direction:column;gap:10px;width:100%}
.entry-btn{width:100%;padding:12px 16px;border-radius:10px;border:1px solid;font-size:13px;font-weight:700;cursor:pointer;letter-spacing:.04em;transition:.15s;display:flex;align-items:center;gap:10px}
.entry-btn:hover{transform:translateY(-1px)}
.entry-btn-player{background:rgba(0,212,170,0.08);border-color:var(--teal2);color:var(--teal)}
.entry-btn-player:hover{box-shadow:0 0 16px rgba(0,212,170,0.25)}
.entry-btn-admin{background:rgba(124,111,255,0.08);border-color:var(--purple2);color:var(--purple)}
.entry-btn-admin:hover{box-shadow:0 0 16px rgba(124,111,255,0.25)}
.entry-btn-owner{background:rgba(255,184,48,0.08);border-color:var(--amber2);color:var(--amber)}
.entry-btn-owner:hover{box-shadow:0 0 16px rgba(255,184,48,0.25)}
.entry-btn-icon{font-size:18px;flex-shrink:0}
.entry-btn-label{flex:1;text-align:left}
.entry-btn-sub{font-size:10px;font-weight:400;opacity:.6;display:block;margin-top:1px}
.login-panel{width:100%;max-width:380px;background:rgba(13,17,32,0.97);border:1px solid var(--border2);border-radius:16px;padding:26px 22px;max-height:92vh;overflow-y:auto}
.lp-back{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--text3);cursor:pointer;background:none;border:none;padding:0;margin-bottom:18px;transition:.15s}
.lp-back:hover{color:var(--text)}
.lp-icon{font-size:22px;margin-bottom:8px}
.lp-title{font-size:19px;font-weight:800;color:#fff;margin-bottom:4px}
.lp-sub{font-size:12px;color:var(--text3);margin-bottom:18px}
.lp-label{font-size:11px;color:var(--text3);font-weight:600;letter-spacing:.08em;margin-bottom:6px;display:block;text-transform:uppercase}
.lp-input{width:100%;background:rgba(255,255,255,0.05);border:1px solid var(--border2);color:var(--text);padding:10px 12px;border-radius:8px;font-size:13px;outline:none;transition:.15s;margin-bottom:12px}
.lp-input:focus{border-color:var(--teal);box-shadow:0 0 0 2px rgba(0,212,170,0.15)}
.lp-input.owner:focus{border-color:var(--amber);box-shadow:0 0 0 2px rgba(255,184,48,0.15)}
.lp-input.admin:focus{border-color:var(--purple);box-shadow:0 0 0 2px rgba(124,111,255,0.15)}
.lp-select{width:100%;background:rgba(255,255,255,0.05);border:1px solid var(--border2);color:var(--text);padding:10px 12px;border-radius:8px;font-size:13px;outline:none;margin-bottom:12px;cursor:pointer}
.lp-select option{background:var(--bg2)}
.lp-submit{width:100%;padding:11px;border-radius:8px;border:none;font-size:14px;font-weight:700;cursor:pointer;letter-spacing:.05em;transition:.15s}
.lp-submit-player{background:var(--teal2);color:#fff}
.lp-submit-player:hover{box-shadow:0 0 16px rgba(0,212,170,0.35)}
.lp-submit-admin{background:var(--purple2);color:#fff}
.lp-submit-admin:hover{box-shadow:0 0 16px rgba(124,111,255,0.35)}
.lp-submit-owner{background:var(--amber2);color:#000}
.lp-submit-owner:hover{box-shadow:0 0 16px rgba(255,184,48,0.35)}
.lp-err{color:var(--red);font-size:12px;min-height:16px;margin-bottom:8px}
.app{display:flex;flex-direction:column;min-height:100vh}
.main{display:flex;flex:1;gap:0;min-height:0}
.sidebar{width:210px;background:rgba(7,9,15,0.9);border-right:1px solid var(--border);padding:14px;flex-shrink:0;overflow-y:auto}
.sidebar::-webkit-scrollbar{width:4px}
.sidebar::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.sidebar-label{font-size:10px;font-weight:700;color:var(--text3);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px;padding:0 4px}
.sidebar-section{margin-bottom:18px}
.cat-item{padding:7px 10px;border-radius:var(--r);cursor:pointer;margin-bottom:2px;border:1px solid transparent;transition:.15s;display:flex;align-items:center;gap:8px}
.cat-item:hover{background:rgba(124,111,255,0.08);border-color:rgba(124,111,255,0.2)}
.cat-item.active{background:rgba(124,111,255,0.12);border-color:rgba(124,111,255,0.3);box-shadow:inset 3px 0 0 var(--purple)}
.cat-dot{width:6px;height:6px;border-radius:50%;background:var(--teal);flex-shrink:0;box-shadow:0 0 6px var(--teal)}
.cat-dot.closed{background:var(--text3);box-shadow:none}
.cat-name{font-size:13px;color:var(--text)}
.cat-status{font-size:10px;color:var(--text3);margin-left:auto}
.content{flex:1;padding:16px;overflow:auto;overflow-x:hidden;padding-bottom:80px}
.topbar{background:rgba(7,9,15,0.95);border-bottom:1px solid var(--border);padding:0 14px;display:flex;align-items:center;gap:10px;height:52px;position:sticky;top:0;z-index:100;backdrop-filter:blur(12px);overflow:hidden}
.topbar::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--purple),var(--teal),transparent);opacity:.5}
.logo{font-size:12px;font-weight:900;color:#fff;letter-spacing:.1em;display:flex;align-items:center;gap:7px;text-transform:uppercase;flex-shrink:0}
.logo-mark{width:24px;height:24px;border-radius:6px;background:linear-gradient(135deg,var(--purple2),var(--teal2));display:flex;align-items:center;justify-content:center;font-size:12px;box-shadow:0 0 10px rgba(124,111,255,0.4)}
.logo-text span{color:var(--teal)}
.nav{display:flex;gap:1px;margin-left:auto;overflow-x:auto;scrollbar-width:none;min-width:0;flex-shrink:1}
.nav::-webkit-scrollbar{display:none}
.nav-btn{background:none;border:none;color:var(--text2);padding:5px 10px;border-radius:var(--r);cursor:pointer;font-size:11px;transition:.15s;white-space:nowrap;min-height:34px;display:inline-flex;align-items:center}
.nav-btn:hover{background:rgba(124,111,255,0.1);color:var(--text)}
.nav-btn.active{background:rgba(124,111,255,0.15);color:var(--purple);box-shadow:inset 0 -2px 0 var(--purple)}
.role-badge{padding:2px 7px;border-radius:20px;font-size:10px;font-weight:700;flex-shrink:0;display:inline-flex;align-items:center;gap:4px}
.role-badge.owner{background:rgba(255,184,48,0.15);color:var(--amber);border:1px solid var(--amber2)}
.role-badge.admin{background:rgba(124,111,255,0.15);color:var(--purple);border:1px solid var(--purple2)}
.role-badge.player{background:rgba(0,212,170,0.15);color:var(--teal);border:1px solid var(--teal2)}
.card{background:rgba(13,17,32,0.8);border:1px solid var(--border);border-radius:var(--r2);padding:14px;transition:.2s;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(124,111,255,0.3),transparent);opacity:0;transition:.2s}
.card:hover{border-color:rgba(124,111,255,0.4)}
.card:hover::before{opacity:1}
.card-title{font-size:11px;font-weight:700;color:var(--text3);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.stat{background:rgba(19,24,41,0.8);border:1px solid var(--border);border-radius:var(--r);padding:11px 13px;transition:.2s}
.stat:hover{transform:translateY(-2px)}
.stat-label{font-size:11px;color:var(--text3);margin-bottom:4px}
.stat-val{font-size:22px;font-weight:800;color:var(--text)}
.stat-sub{font-size:11px;color:var(--text3);margin-top:2px}
.stat.purple .stat-val{color:var(--purple);text-shadow:0 0 12px rgba(124,111,255,0.4)}
.stat.teal .stat-val{color:var(--teal)}
.stat.amber .stat-val{color:var(--amber)}
.stat.red .stat-val{color:var(--red)}
.stat.green .stat-val{color:var(--green)}
.stat.blue .stat-val{color:var(--blue)}
.grid2{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px;margin-bottom:14px}
.grid3{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:14px}
.grid4{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:8px;margin-bottom:12px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:6px 13px;border-radius:var(--r);border:1px solid var(--border2);background:rgba(26,32,53,0.8);color:var(--text);font-size:12px;cursor:pointer;transition:.15s;font-weight:500}
.btn:hover{background:rgba(46,63,106,0.8);border-color:rgba(124,111,255,0.5)}
.btn:active{transform:scale(0.96)}
.btn.primary{background:linear-gradient(135deg,var(--purple2),rgba(124,111,255,0.8));border-color:var(--purple);color:#fff}
.btn.primary:hover{box-shadow:0 0 16px rgba(124,111,255,0.4)}
.btn.danger{background:rgba(53,0,16,0.8);border-color:var(--red2);color:var(--red)}
.btn.danger:hover{background:var(--red2);color:#fff}
.btn.success{background:rgba(0,53,26,0.8);border-color:var(--green2);color:var(--green)}
.btn.success:hover{background:var(--green2);color:#000}
.btn.warn{background:rgba(38,24,0,0.8);border-color:var(--amber2);color:var(--amber)}
.btn.warn:hover{background:var(--amber2);color:#000}
.btn.teal{background:rgba(0,35,28,0.8);border-color:var(--teal2);color:var(--teal)}
.btn.sm{padding:4px 9px;font-size:11px}
.btn.locked{opacity:.5;cursor:not-allowed;pointer-events:none}
.badge{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:20px;font-size:10px;font-weight:600}
.badge.done{background:rgba(0,53,26,0.8);color:var(--green);border:1px solid rgba(34,204,102,0.4)}
.badge.missed{background:rgba(53,0,16,0.8);color:var(--red);border:1px solid rgba(255,77,106,0.35)}
.badge.active{background:rgba(19,24,41,0.8);color:var(--blue);border:1px solid var(--blue2)}
.badge.in-progress{background:rgba(26,32,53,0.8);color:var(--purple);border:1px solid var(--purple2)}
.badge.event{background:rgba(38,24,0,0.8);color:var(--amber);border:1px solid var(--amber2)}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px}
.section-title{font-size:15px;font-weight:800;color:var(--text);display:flex;align-items:center;gap:8px}
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,0.75);backdrop-filter:blur(4px);z-index:1000;display:flex;align-items:center;justify-content:center;padding:14px}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:14px;padding:22px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto;position:relative}
.modal-title{font-size:17px;font-weight:800;color:var(--text);margin-bottom:16px;padding-right:30px}
.modal-close{position:absolute;top:14px;right:14px;background:none;border:none;color:var(--text3);font-size:19px;cursor:pointer;width:26px;height:26px;display:flex;align-items:center;justify-content:center;border-radius:6px;transition:.15s}
.modal-close:hover{background:rgba(255,255,255,0.08);color:var(--text)}
.form-row{margin-bottom:10px}
.form-row label{display:block;font-size:11px;color:var(--text3);font-weight:600;letter-spacing:.08em;margin-bottom:5px;text-transform:uppercase}
.form-row input,.form-row select,.form-row textarea{width:100%;background:rgba(255,255,255,0.05);border:1px solid var(--border2);color:var(--text);padding:8px 11px;border-radius:7px;font-size:13px;outline:none;transition:.15s;font-family:inherit}
.form-row input:focus,.form-row select:focus,.form-row textarea:focus{border-color:var(--purple);box-shadow:0 0 0 2px rgba(124,111,255,0.12)}
.form-row select option{background:var(--bg2)}
.form-row textarea{resize:vertical;min-height:70px}
.form-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:14px;flex-wrap:wrap}
#toast{position:fixed;bottom:72px;left:50%;transform:translateX(-50%) translateY(20px);background:rgba(19,24,41,0.97);border:1px solid var(--border2);border-radius:10px;padding:9px 18px;font-size:13px;font-weight:600;color:var(--text);box-shadow:0 8px 28px rgba(0,0,0,0.5);z-index:9999;opacity:0;transition:opacity .25s,transform .25s;pointer-events:none;white-space:nowrap;max-width:90vw;text-align:center}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.level-badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700;border:1px solid}
.level-badge.lv1{color:#8b95b0;border-color:rgba(139,149,176,0.4);background:rgba(139,149,176,0.08)}
.level-badge.lv2{color:#4da6ff;border-color:rgba(77,166,255,0.4);background:rgba(77,166,255,0.08)}
.level-badge.lv3{color:#7c6fff;border-color:rgba(124,111,255,0.4);background:rgba(124,111,255,0.1)}
.level-badge.lv4{color:#00d4aa;border-color:rgba(0,212,170,0.4);background:rgba(0,212,170,0.08)}
.level-badge.lv5{color:#ffb830;border-color:rgba(255,184,48,0.4);background:rgba(255,184,48,0.1)}
.level-badge.lv6{color:#ff4d6a;border-color:rgba(255,77,106,0.4);background:rgba(255,77,106,0.1)}
.level-badge.lv7{color:#ffd700;border-color:rgba(255,215,0,0.5);background:rgba(255,215,0,0.1);animation:goldPulse 2s ease infinite}
.xp-bar-wrap{margin:8px 0}
.xp-bar-label{display:flex;justify-content:space-between;font-size:11px;color:var(--text3);margin-bottom:4px}
.xp-bar-track{height:8px;border-radius:4px;background:rgba(255,255,255,0.06);overflow:hidden}
.xp-bar-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--purple2),var(--teal));transition:width .6s cubic-bezier(.34,1.2,.64,1)}
.progress-wrap{margin:6px 0}
.progress-label{display:flex;justify-content:space-between;font-size:11px;color:var(--text3);margin-bottom:3px}
.progress-track{height:5px;border-radius:3px;background:rgba(255,255,255,0.06);overflow:hidden}
.progress-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--blue2),var(--purple));transition:width .5s ease}
.player-hero{background:linear-gradient(135deg,rgba(19,24,41,0.95),rgba(13,17,32,0.98));border:1px solid var(--border2);border-radius:14px;padding:18px;margin-bottom:14px;position:relative;overflow:hidden}
.player-hero::before{content:'';position:absolute;top:0;right:0;width:220px;height:180px;background:radial-gradient(ellipse at 100% 0%,rgba(124,111,255,0.12),transparent 70%);pointer-events:none}
.player-hero-top{display:flex;align-items:center;gap:14px;margin-bottom:12px;flex-wrap:wrap}
.player-avatar{width:58px;height:58px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:20px;flex-shrink:0;position:relative}
.player-avatar::after{content:'';position:absolute;inset:-2px;border-radius:50%;border:2px solid transparent;background:linear-gradient(135deg,var(--purple),var(--teal)) border-box;-webkit-mask:linear-gradient(#fff 0 0) padding-box,linear-gradient(#fff 0 0);-webkit-mask-composite:destination-out;mask-composite:exclude}
.player-name-big{font-size:20px;font-weight:900;color:#fff;line-height:1.1}
.player-hero-badges{display:flex;flex-wrap:wrap;gap:5px;margin-top:5px;align-items:center}
.streak-badge{background:rgba(255,184,48,0.12);border:1px solid rgba(255,184,48,0.3);border-radius:20px;padding:2px 9px;font-size:11px;font-weight:700;color:var(--amber)}
.rank-badge{background:rgba(124,111,255,0.12);border:1px solid rgba(124,111,255,0.3);border-radius:20px;padding:2px 9px;font-size:11px;font-weight:700;color:var(--purple)}
.quest-card{background:rgba(19,24,41,0.9);border:1px solid var(--border);border-radius:11px;padding:14px;margin-bottom:9px;transition:.2s;position:relative}
.quest-card:hover{border-color:rgba(124,111,255,0.4)}
.quest-card.in-progress{border-color:rgba(77,166,255,0.3)}
.quest-card.missed-card{border-color:rgba(255,77,106,0.3);background:rgba(37,0,16,0.4)}
.quest-card.completed-card{border-color:rgba(34,204,102,0.2);background:rgba(0,37,20,0.25);opacity:.75}
.quest-card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:7px;gap:8px}
.quest-title{font-size:14px;font-weight:700;color:var(--text);flex:1}
.quest-desc{font-size:12px;color:var(--text3);margin-bottom:8px;line-height:1.5}
.quest-meta{display:flex;flex-wrap:wrap;gap:7px;align-items:center;font-size:11px;color:var(--text3);margin-bottom:8px}
.quest-xp-badge{background:rgba(124,111,255,0.12);border:1px solid rgba(124,111,255,0.3);border-radius:20px;padding:2px 7px;font-size:11px;font-weight:700;color:var(--purple)}
.quest-actions{display:flex;gap:7px;flex-wrap:wrap;margin-top:8px}
.adjust-hint{font-size:11px;color:var(--amber);display:flex;align-items:center;gap:4px;margin-top:5px;padding:5px 9px;background:rgba(38,24,0,0.5);border-radius:6px;border:1px solid rgba(255,184,48,0.2)}
.player-section-label{font-size:11px;font-weight:800;color:var(--text3);letter-spacing:2px;text-transform:uppercase;margin:18px 0 9px;display:flex;align-items:center;gap:8px}
.player-section-label::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--border),transparent)}
.stat-orbs{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.stat-orb{background:rgba(19,24,41,0.8);border:1px solid var(--border);border-radius:10px;padding:11px 8px;text-align:center;transition:.2s}
.stat-orb:hover{transform:translateY(-2px)}
.stat-orb-icon{font-size:15px;display:block;margin-bottom:3px}
.stat-orb-val{font-size:17px;font-weight:800;color:var(--text);line-height:1}
.stat-orb-label{font-size:9px;color:var(--text3);margin-top:3px;letter-spacing:.05em;text-transform:uppercase}
.stat-orb.teal-orb .stat-orb-val{color:var(--teal)}
.stat-orb.amber-orb .stat-orb-val{color:var(--amber)}
.stat-orb.purple-orb .stat-orb-val{color:var(--purple)}
.ach-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:7px;margin-bottom:8px}
.ach-card{background:rgba(19,24,41,0.9);border-radius:9px;padding:11px;text-align:center;transition:.2s}
.ach-card.common{border:1px solid rgba(139,149,176,0.3)}
.ach-card.rare{border:1px solid rgba(77,166,255,0.4);box-shadow:0 0 7px rgba(77,166,255,0.1)}
.ach-card.epic{border:1px solid rgba(124,111,255,0.5);box-shadow:0 0 10px rgba(124,111,255,0.15)}

  award(pid,amt,src,srcId=0){

    if(!Array.isArray(p.xpHistory))p.xpHistory=[];
    p.xpHistory.push({amount:final,source:src,sourceId:srcId,timestamp:new Date().toISOString()});

window.showConfirm=(opts)=>{const bd=document.createElement('div');bd.className='modal-backdrop';bd.style.zIndex='9000';const m=document.createElement('div');m.className='confirm-modal';m.innerHTML=`<div class="confirm-icon">${opts.icon||'⚠️'}</div><div class="confirm-title">${opts.title}</div><div class="confirm-body">${opts.body}</div><div class="confirm-actions"><button class="btn" onclick="this.closest('.modal-backdrop').remove()">Cancel</button><button class="btn ${opts.confirmClass||'danger'}" id="conf-ok">${opts.confirmLabel||'Confirm'}</button></div>`;bd.appendChild(m);document.body.appendChild(bd);bd.querySelector('#conf-ok').onclick=()=>{bd.remove();opts.onConfirm()};bd.onclick=e=>{if(e.target===bd)bd.remove()}};
window.showEditModal=(opts)=>{const bd=document.createElement('div');bd.className='modal-backdrop';bd.style.zIndex='9000';const m=document.createElement('div');m.className='modal';m.style.maxWidth='420px';const fh=opts.fields.map(f=>{if(f.type==='select')return `<div class="form-row"><label>${f.label}</label><select id="ef-${f.id}">${(f.options||[]).map(o=>`<option value="${o.value}"${o.value==f.value?' selected':''}>${o.label}</option>`).join('')}</select></div>`;if(f.type==='textarea')return `<div class="form-row"><label>${f.label}</label><textarea id="ef-${f.id}" rows="3">${(f.value||'').replace(/</g,'&lt;')}</textarea></div>`;if(f.type==='checkbox')return `<div class="form-row" style="display:flex;align-items:center;gap:8px"><input type="checkbox" id="ef-${f.id}" ${f.value?'checked':''}><label for="ef-${f.id}">${f.label}</label></div>`;return `<div class="form-row"><label>${f.label}</label><input type="${f.type||'text'}" id="ef-${f.id}" value="${(f.value||'').replace(/"/g,'&quot;')}" placeholder="${f.placeholder||''}"></div>`}).join('');m.innerHTML=`<div class="modal-title">✏️ ${opts.title}</div><button class="modal-close" onclick="this.closest('.modal-backdrop').remove()">×</button>${fh}<div class="form-actions"><button class="btn" onclick="this.closest('.modal-backdrop').remove()">Cancel</button><button class="btn primary" id="ef-save">Save</button></div>`;bd.appendChild(m);document.body.appendChild(bd);bd.onclick=e=>{if(e.target===bd)bd.remove()};m.querySelector('#ef-save').onclick=()=>{const v={};opts.fields.forEach(f=>{const el=m.querySelector(`#ef-${f.id}`);if(el)v[f.id]=f.type==='checkbox'?el.checked:el.value});const err=opts.onSave(v);if(!err)bd.remove();else showToast('⚠ '+err)}};

// ═══════════════════════════════ LAYER 4 — ENTRY ═══════════════════════════════
const SCREENS={'entry':'entry-screen','player-login':'player-login-screen','admin-login':'admin-login-screen','owner-login':'owner-login-screen','player-app':'app','admin-app':'app','owner-app':'app'};
const Entry={
  _state:null,
  show(s){
    const seen=new Set();
    Object.values(SCREENS).forEach(id=>{if(seen.has(id))return;seen.add(id);const el=document.getElementById(id);if(el){el.style.display='none';el.style.pointerEvents='none'}});
    const tid=SCREENS[s];if(!tid){this.show('entry');return}
    const t=document.getElementById(tid);if(!t)return;
    t.style.display=(tid==='app')?'':'flex';t.style.pointerEvents='';
    this._state=s;
    if(s==='player-login')this._setupPL();
    if(s==='player-app'||s==='admin-app'||s==='owner-app'){state.tab=(s==='owner-app'||s==='admin-app')?'overview':'dashboard';Engine.tick();render();renderMobileNav();showToast(s==='owner-app'?'⚡ Champion access':s==='admin-app'?'🛡 Commander access':'◉ Welcome back, Warrior!')}
  },
  _setupPL(){
    const es=document.getElementById('lp-env-select'),err=document.getElementById('lp-player-err'),pw=document.getElementById('lp-player-pw');
    if(es){es.innerHTML=state.categories.filter(c=>c.status!=='closed').map(c=>`<option value="${c.id}">${c.name}</option>`).join('');if(!es.innerHTML)es.innerHTML=state.categories.map(c=>`<option value="${c.id}">${c.name}${c.status==='closed'?' (closed)':''}</option>`).join('');this.onEnvChange()}
    if(pw)pw.value='';if(err)err.textContent='';
    setTimeout(()=>es?.focus(),60);
  },
  onEnvChange(){
    const es=document.getElementById('lp-env-select'),ps=document.getElementById('lp-player-select');if(!es||!ps)return;
    const id=parseInt(es.value),pls=catPlayers(id);
    ps.innerHTML=pls.length?pls.map(p=>`<option value="${p.id}">${p.name}</option>`):'<option value="">No warriors</option>';
  },
  submitPlayer(){
    const es=document.getElementById('lp-env-select'),ps=document.getElementById('lp-player-select'),pw=document.getElementById('lp-player-pw'),err=document.getElementById('lp-player-err');
    if(!es||!ps||!pw)return;if(err)err.textContent='';
    const cid=parseInt(es.value),pid=parseInt(ps.value);
    const cat=state.categories.find(c=>c.id===cid),player=state.players.find(p=>p.id===pid);
    if(!cat||!player){if(err)err.textContent='Select a valid realm and warrior.';return}
    if(playerAuth.validate(cid,pw.value)){playerAuth.unlock(pid);auth.setRole('player');state.currentCat=state.categories.findIndex(c=>c.id===cid);this.show('player-app')}
    else{if(err)err.textContent='Incorrect realm password.';pw.focus();pw.select()}
  },
  async submitAdmin(){
    const u=document.getElementById('lp-admin-user'),p=document.getElementById('lp-admin-pw'),err=document.getElementById('lp-admin-err'),btn=document.querySelector('#admin-login-screen .lp-submit-admin');
    if(!u||!p)return;if(err)err.textContent='';if(btn){btn.disabled=true;btn.textContent='Verifying…'}
    const r=await auth.checkAdminPassword(u.value.trim(),p.value);
    if(btn){btn.disabled=false;btn.textContent='Access Command →'}
    if(r.rateLimited){if(err)err.textContent=`Rate limited. Wait ${r.waitSecs}s`;return}
    if(r.ok){const ids=auth.getAdminEnvIds();if(ids.length>0){const i=state.categories.findIndex(c=>c.id===ids[0]);if(i>=0)state.currentCat=i}this.show('admin-app')}
    else{if(err)err.textContent='Invalid credentials.';p.focus();p.select()}
  },
  async submitOwner(){
    const pw=document.getElementById('lp-owner-pw'),err=document.getElementById('lp-owner-err'),btn=document.querySelector('#owner-login-screen .lp-submit-owner');
    if(!pw)return;if(err)err.textContent='';if(btn){btn.disabled=true;btn.textContent='Verifying…'}
    const r=await auth.checkOwnerPassword(pw.value);
    if(btn){btn.disabled=false;btn.textContent='Authenticate →'}
    if(r.rateLimited){if(err)err.textContent=`Too many attempts. Wait ${r.waitSecs}s`;return}
    if(r.ok)this.show('owner-app');else{if(err)err.textContent='Authentication failed.';pw.focus();pw.select()}
  }
};
window.Entry=Entry;
window.openLoginModal=()=>Entry.show('entry');

function renderMobileNav(){

  }else{nav.innerHTML=`<button class="mob-nav-btn ${state.tab==='dashboard'?'active':''}" onclick="navigate('dashboard')"><span class="mob-nav-icon">🏠</span><span>Home</span></button><button class="mob-nav-btn ${state.tab==='leaderboard'?'active':''}" onclick="navigate('leaderboard')"><span class="mob-nav-icon">🏆</span><span>Board</span></button>`}

  p.innerHTML=`<div class="mob-drawer-handle"><span class="mob-drawer-title">Realms</span><button class="mob-drawer-close" onclick="closeMobileDrawer()">×</button></div>${state.categories.map((c,i)=>`<div class="cat-item ${i===state.currentCat?'active':''}" onclick="state.currentCat=${i};closeMobileDrawer();render()"><span class="cat-dot ${c.status==='closed'?'closed':''}"></span><span class="cat-name">${c.name}</span></div>`).join('')}`;
  dr.classList.add('open');document.body.style.overflow='hidden';
};

// ═══════════════════════════════ MAIN RENDER ═══════════════════════════════
function render(){
  const app=document.getElementById('app');if(!app)return;
  try{Team.syncAll();app.innerHTML='';
    if(auth.isOwner())renderOwnerApp(app);
    else if(auth.isAdmin())renderAdminApp(app);
    else renderPlayerApp(app);
    renderModal();
  }catch(e){console.error('[RENDER]',e);app.innerHTML=`<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:10px;padding:20px"><div style="font-size:28px">⚠️</div><div style="color:var(--text2)">Render error</div><pre style="font-size:10px;color:var(--red);background:rgba(255,77,106,0.1);padding:10px;border-radius:6px;overflow:auto;max-width:90vw">${String(e).replace(/</g,'&lt;')}</pre><button class="btn primary" onclick="navigate('dashboard')">Reset</button></div>`}
}

// ═══════════════════════════════ PLAYER RENDER ═══════════════════════════════
function renderPlayerApp(app){
  const pid=playerAuth._id,p=state.players.find(x=>x.id===pid);
  if(!p){app.innerHTML='<div style="padding:40px;text-align:center;color:var(--text3)">Session expired. <a href="#" onclick="logout()" style="color:var(--teal)">Log in again</a></div>';return}
  const team=playerTeam(pid),info=getLevelInfo(p.xp);
  const catId=team?team.catId:null,cat=catId?state.categories.find(c=>c.id===catId):null;
  const rankPos=catId?rankedPlayers(catId).findIndex(x=>x.id===pid)+1:0;
  const allInsts=state.taskInstances.filter(i=>i.player_id===pid);
  const activeInsts=allInsts.filter(i=>i.status==='active'||i.status==='in_progress');
  const missedInsts=allInsts.filter(i=>i.status==='missed'&&!i.skipped);
  const doneInsts=allInsts.filter(i=>i.status==='completed').slice(-20);
  const myChalls=state.challenges.filter(c=>c.status==='active'&&c.target_type==='player'&&c.target_id===pid);
  const teamChalls=team?state.challenges.filter(c=>c.status==='active'&&c.target_type==='team'&&c.target_id===team.id):[];
  const allChalls=[...myChalls,...teamChalls];
  const activeEvents=state.events.filter(e=>e.status==='active'&&(e.catId===catId||e.catId===null));
  const mult=activeEvents.length>0?Math.max(...activeEvents.map(e=>e.xp_multiplier||1)):1;
  const color=getAvatarColor(p.id);
  // Topbar
  const tb=document.createElement('div');tb.className='topbar';
  tb.innerHTML=`<div class="logo"><div class="logo-mark">⚔</div><div class="logo-text">LIFE <span>AS</span> GAME</div></div>
    <span class="level-badge ${info.cls}" style="flex-shrink:0">Lv.${info.level}</span>
    ${p.streak>0?`<span class="streak-badge" style="flex-shrink:0">🔥 ${p.streak}d`:''}
    ${mult>1?`<span class="event-multiplier-pill" style="flex-shrink:0">⚡ ${mult}×</span>`:''}
    <div style="margin-left:auto;flex-shrink:0;display:flex;gap:6px">
      <button class="btn sm" onclick="navigate('leaderboard')">🏆</button>
      <button class="btn sm danger" onclick="logout()">Exit</button>
    </div>`;
  app.appendChild(tb);
  const main=document.createElement('div');main.className='main';
  const content=document.createElement('div');content.className='content';
  main.appendChild(content);app.appendChild(main);
  if(state.tab==='leaderboard'){renderPlayerLeaderboard(content,catId,p);return}
  // Hero
  const hero=document.createElement('div');hero.className='player-hero';
  hero.innerHTML=`<div class="player-hero-top">
    <div class="player-avatar" style="background:${color}22;color:${color}">${getPlayerInitials(p.name)}</div>
    <div style="flex:1;min-width:0">
      <div style="font-size:11px;color:var(--text3);margin-bottom:1px">Welcome back</div>
      <div class="player-name-big">${p.name}</div>
      <div class="player-hero-badges">
        <span class="level-badge ${info.cls}">Lv.${info.level} · ${info.name}</span>
        ${team?`<span style="font-size:11px;color:var(--text2)">⚔ ${team.icon||'⚡'} ${team.name}</span>`:''}
        ${rankPos>0?`<span class="rank-badge">🏆 #${rankPos}</span>`:''}
        ${mult>1?`<span class="event-multiplier-pill">⚡ ${mult}× XP</span>`:''}
      </div>
    </div>
    <div style="text-align:right;flex-shrink:0">
      <div style="font-size:20px;font-weight:900;color:var(--purple)">${p.xp.toLocaleString()}</div>
      <div style="font-size:10px;color:var(--text3)">XP</div>
    </div>
  </div>
  <div class="xp-bar-wrap">
    <div class="xp-bar-label"><span>Lv.${info.level} → ${info.nextXP?'Lv.'+(info.level+1):'MAX'}</span><span>${info.nextXP?`${info.xpToNext} XP to next`:'Max Level'}</span></div>
    <div class="xp-bar-track"><div class="xp-bar-fill" style="width:0%" data-target="${info.progress}"></div></div>
  </div>`;
  content.appendChild(hero);
  setTimeout(()=>{const f=hero.querySelector('.xp-bar-fill');if(f)f.style.width=f.dataset.target+'%'},80);
  // Stat orbs
  const orbs=document.createElement('div');orbs.className='stat-orbs';
  orbs.innerHTML=`<div class="stat-orb purple-orb"><span class="stat-orb-icon">💎</span><div class="stat-orb-val">${p.xp.toLocaleString()}</div><div class="stat-orb-label">Total XP</div></div>

    <div class="stat-orb amber-orb"><span class="stat-orb-icon">🔥</span><div class="stat-orb-val">${p.streak>0?p.streak+'d':'—'}</div><div class="stat-orb-label">Streak</div></div>`;
  content.appendChild(orbs);
  // Active events
  if(activeEvents.length>0){
    const evDiv=document.createElement('div');
    evDiv.innerHTML='<div class="player-section-label">🎪 Active Event</div>';
    const ev=activeEvents[0];
    const lb=[...(ev.leaderboard||[])].sort((a,b)=>b.xp_earned-a.xp_earned).slice(0,5);

function renderQsHtml(qs,iid,pid){
  return qs.map(q=>{
    const ex=getAnswer(q.id,iid,pid);
    if(q.type==='mcq'){
      const opts=(q.options||[]).map(opt=>{const sel=ex?.answer_content===opt;const cls=sel?(q.correct_answer?(opt===q.correct_answer?'correct':'wrong'):'selected'):'';return `<button class="mcq-option ${cls}" onclick="window.submitAnswer(${q.id},${iid},${pid},${JSON.stringify(opt)})">${opt}</button>`}).join('');
      return `<div class="question-card"><div class="question-text">${q.question_text}</div><div class="mcq-options">${opts}</div></div>`;
    }
    const val=ex?.answer_content||'',ml=q.max_length||500;
    return `<div class="question-card"><div class="question-text">${q.question_text}</div><textarea class="essay-textarea" maxlength="${ml}" placeholder="Your answer…" onchange="window.submitAnswer(${q.id},${iid},${pid},this.value)" oninput="this.nextElementSibling.textContent=this.value.length+'/${ml}'">${val.replace(/</g,'&lt;')}</textarea><div class="char-count">${val.length}/${ml}</div></div>`;
  }).join('');
}

function renderAdminApp(app){
  const admin=auth.getAdmin(),envIds=auth.getAdminEnvIds(),cats=state.categories.filter(c=>envIds.includes(c.id));

function renderOwnerApp(app){
  const cats=state.categories,cat=cats[state.currentCat]||cats[0];

function renderFullApp(app,cat,tabs,roleType,displayName){
  const tb=document.createElement('div');tb.className='topbar';
  const tabLabels={overview:'Overview',environments:'Realms',admins:'Commanders',tasks:'Quests',teams:'Teams',players:'Warriors',challenges:'Challenges',events:'Events',performance:'Performance',settings:'Settings'};
  tb.innerHTML=`<div class="logo"><div class="logo-mark">⚔</div><div class="logo-text">LIFE <span>AS</span> GAME</div></div>
    <div class="nav" style="margin-left:4px">${tabs.map(t=>`<button class="nav-btn ${state.tab===t?'active':''}" onclick="navigate('${t}')">${tabLabels[t]||t}</button>`).join('')}</div>
    <span class="role-badge ${roleType}">${roleType==='owner'?'⚡':'🛡'} ${displayName}</span>
    <button class="btn sm danger" onclick="logout()">Exit</button>`;
  app.appendChild(tb);
  const main=document.createElement('div');main.className='main';
  if(state.categories.length>0){
    const sb=document.createElement('div');sb.className='sidebar';
    sb.innerHTML=`<div class="sidebar-section"><div class="sidebar-label">Realms</div>
      ${state.categories.filter(c=>auth.canAccessEnv(c.id)||roleType==='owner').map((c,i)=>`<div class="cat-item ${i===state.currentCat?'active':''}" onclick="state.currentCat=${state.categories.indexOf(c)};render()"><span class="cat-dot ${c.status==='closed'?'closed':''}"></span><span class="cat-name">${c.name}</span><span class="cat-status">${c.status==='closed'?'⚪':''}</span></div>`).join('')}
      ${roleType==='owner'?`<button class="btn sm primary" style="margin-top:8px;width:100%" onclick="openModal('addEnv')">+ Realm</button>`:''}
    </div>`;
    main.appendChild(sb);
  }
  const content=document.createElement('div');content.className='content';
  main.appendChild(content);app.appendChild(main);
  try{
    const envId=cat?.id;
    if(state.tab==='overview')renderTabOverview(content,cat,envId,roleType);
    else if(state.tab==='environments'&&roleType==='owner')renderTabEnvironments(content);
    else if(state.tab==='admins'&&roleType==='owner')renderTabAdmins(content);
    else if(state.tab==='tasks')renderTabTasks(content,envId,roleType);
    else if(state.tab==='teams')renderTabTeams(content,envId,roleType);
    else if(state.tab==='players')renderTabPlayers(content,envId,roleType);
    else if(state.tab==='challenges')renderTabChallenges(content,envId,roleType);
    else if(state.tab==='events')renderTabEvents(content,envId,roleType);
    else if(state.tab==='performance')renderTabPerformance(content,envId,roleType);
    else if(state.tab==='settings'&&roleType==='owner')renderTabSettings(content);
    else renderTabOverview(content,cat,envId,roleType);
  }catch(e){content.innerHTML=`<div style="padding:16px;color:var(--red)">Tab error: ${e.message}</div>`;console.error('[TAB]',e)}
}

function renderTabChallenges(content,envId,roleType){
  const challenges=envId?state.challenges.filter(c=>c.catId===envId):state.challenges;
  content.innerHTML=`<div class="section-header"><div class="section-title">⚔ Challenges</div><button class="btn primary" onclick="openModal('addChallenge',{envId:${envId}})">+ New Challenge</button></div>`;
  ['active','completed','expired'].forEach(status=>{
    const grp=challenges.filter(c=>c.status===status);if(!grp.length)return;
    const col=status==='active'?'var(--teal)':status==='completed'?'var(--green)':'var(--text3)';
    content.innerHTML+=`<div style="font-size:10px;font-weight:700;color:${col};letter-spacing:1px;text-transform:uppercase;margin:12px 0 7px">${status.toUpperCase()}</div>`;
    grp.forEach(ch=>{
      const pct=ch.goal_value>0?Math.min(100,Math.round((ch.progress||0)/ch.goal_value*100)):0;
      const tgt=ch.target_type==='player'?state.players.find(p=>p.id===ch.target_id)?.name:state.teams.find(t=>t.id===ch.target_id)?.name;
      content.innerHTML+=`<div class="challenge-card ${ch.status==='completed'?'completed-ch':ch.status==='expired'?'expired-ch':''}">
        <div style="display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:6px;margin-bottom:5px">
          <div><div style="font-size:13px;font-weight:700">${ch.title}</div>${ch.description?`<div style="font-size:11px;color:var(--text3);margin-top:2px">${ch.description}</div>`:''}</div>
          <div style="display:flex;gap:5px;align-items:center"><span class="badge ${ch.status==='completed'?'done':ch.status==='expired'?'missed':'active'}">${ch.status.toUpperCase()}</span><span style="font-size:12px;font-weight:700;color:var(--purple)">+${ch.xp_reward}</span></div>
        </div>
        <div style="font-size:11px;color:var(--text3);margin-bottom:5px">→ ${tgt||'?'} · ${ch.goal_type.replace(/_/g,' ')}: ${ch.progress||0}/${ch.goal_value}${ch.expires_at?` · ${ch.expires_at}`:''}</div>
        <div class="challenge-progress-track"><div class="challenge-progress-fill" style="width:${pct}%"></div></div>
        ${(roleType==='owner'||roleType==='admin')?`<div style="margin-top:7px;display:flex;gap:6px"><button class="btn sm" onclick="openModal('editChallenge',${ch.id})">✏️ Edit</button><button class="btn sm danger" onclick="deleteChallenge(${ch.id})">🗑 Delete</button></div>`:''}

window.submitAddEnv=()=>{const n=document.getElementById('m-name')?.value?.trim();if(!n)return;const pw=document.getElementById('m-env-pw')?.value?.trim()||'';state.categories.push({id:newId(state.categories),name:n,status:'open',environmentPassword:pw,roles:[],importantLinks:[]});state.currentCat=state.categories.length-1;saveState();closeModal();showToast(`Realm "${n}" created!`);render()};
window.submitAddAdmin=async()=>{const u=document.getElementById('m-admin-user')?.value?.trim(),pw=document.getElementById('m-admin-pw')?.value,envIds=[...document.querySelectorAll('.m-admin-env:checked')].map(cb=>parseInt(cb.value));if(!u||!pw){showToast('⚠ Fill all fields');return}if(state.admins.find(a=>a.username.toLowerCase()===u.toLowerCase())){showToast('⚠ Username taken');return}const h=await _hashPassword(pw);state.admins.push({id:newId(state.admins),username:u,passwordHash:h,environmentIds:envIds,createdAt:new Date().toISOString()});saveState();closeModal();showToast(`Commander "${u}" created!`);render()};
window.submitAddTemplate=()=>{
  const title=document.getElementById('m-title')?.value?.trim();
  const sd=document.getElementById('m-start-date')?.value;
  const ed=document.getElementById('m-end-date')?.value;
  const errEl=document.getElementById('m-date-err');
  if(!title){showToast('⚠ Quest title is required');return}
  if(!sd&&errEl){errEl.textContent='⚠ Start Date is required — please set a start date.';return}
  if(!ed&&errEl){errEl.textContent='⚠ End Date is required — please set an end date.';return}
  if(sd&&ed&&sd>=ed&&errEl){errEl.textContent='⚠ End Date must be after Start Date.';return}
  if(errEl)errEl.textContent='';
  const dur=dateDiffDays(ed,sd);
  const cid=parseInt(document.getElementById('m-catid')?.value);
  state.taskTemplates.push({id:newId(state.taskTemplates),catId:cid,title,description:document.getElementById('m-desc')?.value?.trim()||'',start_date:sd,end_date:ed,duration_in_days:Math.max(1,dur),xp_reward:parseInt(document.getElementById('m-xp')?.value)||50,target_type:'player',is_repeating:document.getElementById('m-repeating')?.checked||false,team_completion_mode:document.getElementById('m-team-mode')?.value||'individual',createdAt:new Date().toISOString()});
  saveState();closeModal();showToast('Quest created!');render();
};
window.submitEditTemplate=(id)=>{
  const t=state.taskTemplates.find(x=>x.id===id);if(!t)return;
  const sd=document.getElementById('m-start-date')?.value;
  const ed=document.getElementById('m-end-date')?.value;
  const errEl=document.getElementById('m-date-err');
  if(!sd&&errEl){errEl.textContent='⚠ Start Date is required — please set a start date.';return}
  if(!ed&&errEl){errEl.textContent='⚠ End Date is required — please set an end date.';return}
  if(sd&&ed&&sd>=ed&&errEl){errEl.textContent='⚠ End Date must be after Start Date.';return}
  if(errEl)errEl.textContent='';
  t.title=document.getElementById('m-title')?.value?.trim()||t.title;
  t.description=document.getElementById('m-desc')?.value?.trim()||'';
  t.start_date=sd;t.end_date=ed;
  t.duration_in_days=Math.max(1,dateDiffDays(ed,sd));
  t.xp_reward=parseInt(document.getElementById('m-xp')?.value)||t.xp_reward;
  t.is_repeating=document.getElementById('m-repeating')?.checked||false;
  saveState();closeModal();showToast('Quest updated!');render();
};

window.editEnvironment=(idx)=>{const cat=state.categories[idx];if(!cat)return;showEditModal({title:'Edit Realm',fields:[{label:'Name',id:'name',value:cat.name},{label:'Status',id:'status',type:'select',value:cat.status,options:[{value:'open',label:'Open'},{value:'closed',label:'Closed'}]}],onSave:(v)=>{if(!v.name.trim())return 'Name required';cat.name=v.name.trim();cat.status=v.status;saveState();showToast('Realm updated');render();return null}})};
window.deleteEnvironment=(idx)=>{const cat=state.categories[idx];if(!cat)return;showConfirm({icon:'🗑️',title:'Delete Realm',body:`Delete <b>${cat.name}</b> and all data?`,confirmLabel:'Delete',confirmClass:'danger',onConfirm:()=>{const tids=state.teams.filter(t=>t.catId===cat.id).map(t=>t.id),pids=state.players.filter(p=>tids.includes(p.teamId)).map(p=>p.id);state.players=state.players.filter(p=>!pids.includes(p.id));state.teams=state.teams.filter(t=>!tids.includes(t.id));state.taskTemplates=state.taskTemplates.filter(t=>t.catId!==cat.id);state.categories.splice(idx,1);if(state.currentCat>=state.categories.length)state.currentCat=Math.max(0,state.categories.length-1);saveState();showToast('Realm deleted');render()}})};
window.submitEnvPassword=(idx,remove)=>{const cat=state.categories[idx];if(!cat)return;if(remove){cat.environmentPassword='';saveState();closeModal();showToast('🔓 Password removed');render();return}const np=document.getElementById('m-new-env-pw')?.value||'',cp=document.getElementById('m-confirm-env-pw')?.value||'',err=document.getElementById('m-env-pw-err');if(np&&np!==cp){if(err)err.textContent='Passwords do not match';return}cat.environmentPassword=np.trim();saveState();closeModal();showToast(np?'🔒 Set':'🔓 Removed');render()};
window.editAdmin=(id)=>{const a=state.admins.find(x=>x.id===id);if(!a)return;showEditModal({title:'Edit Commander',fields:[{label:'Username',id:'user',value:a.username}],onSave:(v)=>{if(!v.user.trim())return 'Required';a.username=v.user.trim();saveState();showToast('Updated');render();return null}})};
window.deleteAdmin=(id)=>{const a=state.admins.find(x=>x.id===id);showConfirm({icon:'🗑️',title:'Remove Commander',body:`Remove <b>${a?.username}</b>?`,confirmLabel:'Remove',confirmClass:'danger',onConfirm:()=>{state.admins=state.admins.filter(x=>x.id!==id);saveState();render();showToast('Removed')}})};
window.submitAddLink=(cid)=>{const cat=state.categories.find(c=>c.id===cid);if(!cat)return;const label=document.getElementById('link-label-input')?.value?.trim(),url=document.getElementById('link-url-input')?.value?.trim();if(!label||!url)return;if(!Array.isArray(cat.importantLinks))cat.importantLinks=[];cat.importantLinks.push({id:newId(cat.importantLinks),label,url:url.startsWith('http')?url:'https://'+url,icon:document.getElementById('link-icon-input')?.value?.trim()||'🔗'});saveState();openModal('manageLinks',cid);showToast('Link added')};
window.deleteLink=(cid,lid)=>{const cat=state.categories.find(c=>c.id===cid);if(!cat)return;cat.importantLinks=(cat.importantLinks||[]).filter(l=>l.id!==lid);saveState();openModal('manageLinks',cid);showToast('Deleted')};
window.submitAddRole=(cid)=>{const cat=state.categories.find(c=>c.id===cid);if(!cat)return;const label=document.getElementById('role-label-input')?.value?.trim();if(!label)return;if(!Array.isArray(cat.roles))cat.roles=[];cat.roles.push({id:newId(cat.roles),label,desc:document.getElementById('role-desc-input')?.value?.trim()||''});saveState();openModal('manageRoles',cid);showToast('Role added')};
window.deleteRole=(cid,rid)=>{const cat=state.categories.find(c=>c.id===cid);if(!cat)return;cat.roles=(cat.roles||[]).filter(r=>r.id!==rid);saveState();openModal('manageRoles',cid);showToast('Deleted')};
window.submitAddEnvRule=()=>{const t=document.getElementById('env-rule-input')?.value?.trim();if(!t)return;if(!Array.isArray(state.environment.rules))state.environment.rules=[];state.environment.rules.push({id:newId(state.environment.rules),text:t});saveState();openModal('manageEnvRules');showToast('Rule added')};
window.deleteEnvRule=(id)=>{state.environment.rules=(state.environment.rules||[]).filter(r=>r.id!==id);saveState();openModal('manageEnvRules');showToast('Deleted')};
window.submitAddEnvLink=()=>{const label=document.getElementById('env-link-label-input')?.value?.trim(),url=document.getElementById('env-link-url-input')?.value?.trim();if(!label||!url)return;if(!Array.isArray(state.environment.links))state.environment.links=[];state.environment.links.push({id:newId(state.environment.links),label,url:url.startsWith('http')?url:'https://'+url,icon:document.getElementById('env-link-icon-input')?.value?.trim()||'🔗'});saveState();openModal('manageEnvLinks');showToast('Link added')};
window.deleteEnvLink=(id)=>{state.environment.links=(state.environment.links||[]).filter(l=>l.id!==id);saveState();openModal('manageEnvLinks');showToast('Deleted')};
window.toggleQFields=()=>{const t=document.getElementById('q-type')?.value,f=document.getElementById('q-mcq-fields');if(f)f.style.display=t==='mcq'?'block':'none'};
window.submitAddQuestion=(tid)=>{const type=document.getElementById('q-type')?.value||'essay',text=document.getElementById('q-text')?.value?.trim();if(!text){showToast('⚠ Text required');return}const q={id:newId(state.questions),task_template_id:tid,type,position:document.getElementById('q-pos')?.value||'pre',question_text:text,options:[],correct_answer:null,max_length:500};if(type==='mcq'){const raw=document.getElementById('q-opts')?.value||'';q.options=raw.split('\n').map(s=>s.trim()).filter(Boolean);if(q.options.length<2){showToast('⚠ 2+ options required');return}q.correct_answer=document.getElementById('q-correct')?.value?.trim()||null}state.questions.push(q);saveState();openModal('manageQuestions',tid);showToast('Question added')};
window.deleteQuestion=(id)=>{state.questions=state.questions.filter(q=>q.id!==id);saveState();render();showToast('Deleted')};
let _spSub=false;
async function submitChangeSystemPassword(){
  if(!auth.isOwner()||_spSub)return;
  const ci=document.getElementById('sp-current'),ni=document.getElementById('sp-new'),cfi=document.getElementById('sp-confirm'),msg=document.getElementById('sp-msg'),btn=document.getElementById('sp-submit');
  if(!ci||!ni||!cfi||!msg)return;
  msg.textContent='';msg.style.color='var(--red)';
  if(!ci.value||!ni.value||!cfi.value){msg.textContent='All fields required.';return}
  if(ni.value!==cfi.value){msg.textContent='Passwords do not match.';return}
  if(ni.value.length<8||!/[a-zA-Z]/.test(ni.value)||!/[0-9]/.test(ni.value)){msg.textContent='Min 8 chars, letters + numbers.';return}
  _spSub=true;if(btn){btn.disabled=true;btn.textContent='Updating…'}
  const r=await auth.changePassword(ci.value,ni.value);
  _spSub=false;if(btn){btn.disabled=false;btn.textContent='Update Password'}
  if(r.ok){showToast('✅ Password updated. Please log in again.');setTimeout(()=>{playerAuth.clear();Entry.show('entry')},1800)}
  else{msg.textContent=r.msg||'Failed.';ci.value='';ci.focus()}
}
window.submitChangeSystemPassword=submitChangeSystemPassword;

// ═══ BOOT ═══
function _bootMsg(m){const e=document.getElementById('boot-msg');if(e)e.textContent=m}
function _bootDone(){const b=document.getElementById('boot-screen');if(b){b.style.transition='opacity .3s';b.style.opacity='0';setTimeout(()=>b?.remove(),320)}}
(async()=>{
  try{_bootMsg('Initialising security…');await _initPasswordHash()}catch(e){console.error('[INIT]',e)}
  try{
    const ok=typeof firebase!=='undefined'&&!window._firebaseSDKFailed;
    _bootMsg(ok?'Connecting to Firebase…':'Loading local data…');
    await DB.init();
  }catch(e){console.error('[INIT] DB:',e)}
  _bootMsg('Ready!');_bootDone();
  try{Engine.tick()}catch(e){console.error('[TICK]',e)}
  const role=sessionStorage.getItem('lag_role_v22');
  if(role==='owner')Entry.show('owner-app');
  else if(role==='admin'){
    const aid=sessionStorage.getItem('lag_admin_id_v22');if(aid)auth.adminId=parseInt(aid);
    const ids=auth.getAdminEnvIds();if(ids.length>0){const i=state.categories.findIndex(c=>c.id===ids[0]);if(i>=0)state.currentCat=i}
    Entry.show('admin-app');
  }else Entry.show('entry');
})();
setInterval(()=>{try{Engine.tick();render()}catch(e){}},60000);
setTimeout(renderMobileNav,500);
