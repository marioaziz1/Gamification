<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>LIFE AS GAME</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07090f;--bg2:#0d1120;--bg3:#131829;--bg4:#1a2035;
  --border:#1e2a48;--border2:#2e3f6a;
  --text:#e8ecf4;--text2:#8b95b0;--text3:#5a6480;
  --purple:#7c6fff;--purple2:#5b4fcf;--purple3:#1a1540;
  --teal:#00d4aa;--teal2:#009e7e;--teal3:#001e1a;
  --amber:#ffb830;--amber2:#d4900a;--amber3:#261800;
  --red:#ff4d6a;--red2:#cc2a45;--red3:#250010;
  --green:#4dff91;--green2:#22cc66;--green3:#002514;
  --blue:#4da6ff;--blue2:#2280d4;--blue3:#000e25;
  --gold:#ffd700;--silver:#c0c0c0;--bronze:#cd7f32;
  --r:8px;--r2:14px;
  --glow-purple:0 0 20px rgba(124,111,255,0.4);
  --glow-teal:0 0 20px rgba(0,212,170,0.4);
}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;font-size:14px;line-height:1.5;min-height:100vh;overflow-x:hidden}

/* ══════════════════════════════════════════
   ENTRY SCREEN — clean, no layers, no z-index conflicts
══════════════════════════════════════════ */
#entry-screen{
  position:fixed;inset:0;
  display:flex;align-items:center;justify-content:center;
  background:var(--bg);
  z-index:100;
}
.entry-box{
  width:100%;max-width:360px;
  background:rgba(13,17,32,0.95);
  border:1px solid var(--border2);
  border-radius:16px;
  padding:36px 32px 28px;
  display:flex;flex-direction:column;align-items:center;gap:0;
}
.entry-logo{
  font-size:28px;font-weight:900;color:#fff;
  letter-spacing:.12em;text-transform:uppercase;
  margin-bottom:6px;
}
.entry-logo span{color:var(--teal)}
.entry-tagline{font-size:11px;letter-spacing:.25em;color:var(--text3);text-transform:uppercase;margin-bottom:28px}
.entry-btns{display:flex;flex-direction:column;gap:10px;width:100%}
.entry-btn{
  width:100%;padding:13px 20px;border-radius:10px;border:1px solid;
  font-size:14px;font-weight:700;cursor:pointer;letter-spacing:.04em;
  transition:box-shadow .15s,transform .1s;
  display:flex;align-items:center;gap:10px;
}
.entry-btn:hover{transform:translateY(-1px)}
.entry-btn:active{transform:scale(0.98)}
.entry-btn-player{background:rgba(0,212,170,0.08);border-color:var(--teal2);color:var(--teal)}
.entry-btn-player:hover{box-shadow:0 0 16px rgba(0,212,170,0.25)}
.entry-btn-owner{background:rgba(255,184,48,0.08);border-color:var(--amber2);color:var(--amber)}
.entry-btn-owner:hover{box-shadow:0 0 16px rgba(255,184,48,0.25)}
.entry-btn-icon{font-size:18px;flex-shrink:0}
.entry-btn-label{flex:1;text-align:left}
.entry-btn-sub{font-size:10px;font-weight:400;opacity:.6;display:block;margin-top:1px}

/* ── LOGIN PANEL (shared by both modes) ── */
.login-panel{
  width:100%;max-width:360px;
  background:rgba(13,17,32,0.95);
  border:1px solid var(--border2);
  border-radius:16px;
  padding:32px;
}
.lp-back{
  display:inline-flex;align-items:center;gap:6px;
  font-size:12px;color:var(--text3);cursor:pointer;
  background:none;border:none;padding:0;margin-bottom:20px;
  transition:color .15s;
}
.lp-back:hover{color:var(--text)}
.lp-icon{font-size:24px;margin-bottom:10px}
.lp-title{font-size:20px;font-weight:800;color:#fff;margin-bottom:4px}
.lp-sub{font-size:12px;color:var(--text3);margin-bottom:20px}
.lp-label{font-size:11px;color:var(--text3);font-weight:600;letter-spacing:.08em;margin-bottom:6px;display:block}
.lp-input{
  width:100%;background:rgba(255,255,255,0.05);
  border:1px solid var(--border2);color:var(--text);
  padding:10px 14px;border-radius:8px;font-size:14px;outline:none;
  transition:border-color .15s,box-shadow .15s;
  letter-spacing:.08em;margin-bottom:14px;
}
.lp-input:focus{border-color:var(--teal);box-shadow:0 0 0 2px rgba(0,212,170,0.15)}
.lp-input.owner:focus{border-color:var(--amber);box-shadow:0 0 0 2px rgba(255,184,48,0.15)}
.lp-submit{
  width:100%;padding:11px;border-radius:8px;border:none;
  font-size:14px;font-weight:700;cursor:pointer;letter-spacing:.05em;
  transition:box-shadow .15s,transform .1s;
}
.lp-submit:active{transform:scale(0.98)}
.lp-submit-player{background:var(--teal2);color:#fff}
.lp-submit-player:hover{box-shadow:0 0 16px rgba(0,212,170,0.35)}
.lp-submit-owner{background:var(--amber2);color:#000}
.lp-submit-owner:hover{box-shadow:0 0 16px rgba(255,184,48,0.35)}

/* player env + name selects */
.lp-select{
  width:100%;background:rgba(255,255,255,0.05);
  border:1px solid var(--border2);color:var(--text);
  padding:10px 14px;border-radius:8px;font-size:13px;outline:none;
  margin-bottom:14px;cursor:pointer;
  transition:border-color .15s;
}
.lp-select:focus{border-color:var(--teal)}
.lp-select option{background:var(--bg2);color:var(--text)}

.lp-err{color:var(--red);font-size:12px;min-height:18px;margin-bottom:10px}

/* ── shared input override used elsewhere in app ── */
.login-input{width:100%;background:rgba(255,255,255,0.05);border:1px solid var(--border2);color:var(--text);padding:10px 14px;border-radius:8px;font-size:14px;outline:none;transition:.15s;letter-spacing:.08em}
.login-input:focus{border-color:var(--teal);box-shadow:0 0 0 2px rgba(0,212,170,0.15)}
.login-err{color:var(--red);font-size:12px;margin-top:6px;min-height:16px}

/* ── LAYOUT ── */
.sr-only{position:absolute;left:-9999px}
.app{display:flex;flex-direction:column;min-height:100vh}
.main{display:flex;flex:1;gap:0}
.content{flex:1;padding:20px;overflow:auto}
/* ── TOPBAR ── */
.topbar{background:rgba(7,9,15,0.95);border-bottom:1px solid var(--border);padding:0 20px;display:flex;align-items:center;gap:16px;height:56px;position:sticky;top:0;z-index:100;backdrop-filter:blur(12px);box-shadow:0 1px 0 var(--border),0 4px 20px rgba(0,0,0,0.4)}
.topbar::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--purple),var(--teal),transparent);opacity:.5}
/* ── LOGO ── */
.logo{font-size:14px;font-weight:900;color:#fff;letter-spacing:.1em;display:flex;align-items:center;gap:8px;text-transform:uppercase;text-shadow:0 0 20px rgba(124,111,255,0.6)}
.logo-mark{width:28px;height:28px;border-radius:6px;background:linear-gradient(135deg,var(--purple2),var(--teal2));display:flex;align-items:center;justify-content:center;font-size:14px;box-shadow:0 0 12px rgba(124,111,255,0.4)}
.logo-text span{color:var(--teal)}
/* ── NAV ── */
.nav{display:flex;gap:2px;margin-left:auto}
.nav-btn{background:none;border:none;color:var(--text2);padding:6px 14px;border-radius:var(--r);cursor:pointer;font-size:13px;transition:.15s}
.nav-btn:hover{background:rgba(124,111,255,0.1);color:var(--text)}
.nav-btn.active{background:rgba(124,111,255,0.15);color:var(--purple);box-shadow:inset 0 -2px 0 var(--purple)}
/* ── ROLE BADGES ── */
.role-badge{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;margin-left:8px;display:inline-flex;align-items:center;gap:5px}
.role-badge.owner{background:rgba(255,184,48,0.15);color:var(--amber);border:1px solid var(--amber2);box-shadow:0 0 12px rgba(255,184,48,0.2)}
.role-badge.leader{background:rgba(124,111,255,0.15);color:var(--purple);border:1px solid var(--purple2);box-shadow:0 0 12px rgba(124,111,255,0.2)}
.role-badge.player{background:rgba(0,212,170,0.15);color:var(--teal);border:1px solid var(--teal2);box-shadow:0 0 12px rgba(0,212,170,0.15)}
.view-only-pill{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:.04em;background:rgba(255,184,48,0.07);color:rgba(255,184,48,0.6);border:1px solid rgba(255,184,48,0.2);margin-left:6px;pointer-events:none;user-select:none}

/* ══════════════════════════════════════════
   PLAYER READ-ONLY MODE — Zero Interaction
══════════════════════════════════════════ */
body.player-readonly-mode .content,
body.player-readonly-mode .sidebar{
  pointer-events:none!important;
  user-select:none!important;
}
/* Allow sidebar category clicks only */
body.player-readonly-mode .sidebar .cat-item{
  pointer-events:auto!important;
  cursor:pointer!important;
}
/* Lock overlay on task rows */
.task-row-readonly{
  display:flex;align-items:center;gap:10px;
  padding:10px 12px;
  background:rgba(19,24,41,0.8);
  border:1px solid var(--border);
  border-radius:var(--r);
  margin-bottom:6px;
  position:relative;
  pointer-events:none!important;
  user-select:none!important;
}
.task-row-readonly.status-done{
  border-color:rgba(77,255,145,0.25);
  background:rgba(0,53,26,0.18);
}
.task-row-readonly.status-missed{
  border-color:rgba(255,77,106,0.22);
  background:rgba(53,0,16,0.18);
}
.task-row-readonly.status-active{
  opacity:.72;
  border-color:rgba(26,32,53,0.8);
}
/* Status indicator badge for read-only tasks */
.task-status-badge{
  display:inline-flex;align-items:center;gap:4px;
  padding:4px 10px;border-radius:20px;font-size:11px;font-weight:800;
  flex-shrink:0;letter-spacing:.04em;
}
.task-status-badge.done{
  background:rgba(0,53,26,0.6);color:var(--green);
  border:1px solid rgba(77,255,145,0.35);
  box-shadow:0 0 8px rgba(77,255,145,0.15);
}
.task-status-badge.missed{
  background:rgba(53,0,16,0.6);color:var(--red);
  border:1px solid rgba(255,77,106,0.35);
  box-shadow:0 0 8px rgba(255,77,106,0.12);
}
.task-status-badge.pending{
  background:rgba(26,32,53,0.6);color:var(--text3);
  border:1px solid var(--border2);
}
/* Read-only banner strip at top of player content */
.readonly-banner{
  display:flex;align-items:center;gap:10px;
  padding:8px 14px;
  background:rgba(10,13,22,0.7);
  border:1px solid rgba(124,111,255,0.18);
  border-radius:10px;
  margin-bottom:14px;
  font-size:11px;color:rgba(139,149,176,0.8);
  letter-spacing:.05em;
  user-select:none;pointer-events:none;
  backdrop-filter:blur(4px);
}
.readonly-banner-dot{
  width:6px;height:6px;border-radius:50%;
  background:rgba(124,111,255,0.5);
  box-shadow:0 0 6px rgba(124,111,255,0.4);
  flex-shrink:0;
  animation:livePulse 2.5s ease infinite;
}
.readonly-lock-icon{
  font-size:13px;opacity:.5;flex-shrink:0;
}
/* Daily Timeline Styles */
.daily-timeline-panel{
  background:rgba(13,17,32,0.85);
  border:1px solid var(--border);
  border-radius:16px;
  padding:18px;
  margin-bottom:12px;
  backdrop-filter:blur(4px);
}
.daily-day-row{
  display:flex;align-items:center;gap:0;
  border-radius:10px;margin-bottom:6px;
  overflow:hidden;cursor:default;
  border:1px solid var(--border);
  transition:.15s;
}
.daily-day-row.expanded{ border-color:rgba(124,111,255,0.3); }
.daily-day-label{
  display:flex;align-items:center;gap:8px;
  padding:9px 14px;
  background:rgba(19,24,41,0.7);
  font-size:12px;font-weight:700;color:var(--text2);
  min-width:110px;flex-shrink:0;
  border-right:1px solid var(--border);
}
.daily-day-label.today-label{color:var(--teal)}
.daily-day-tasks{
  flex:1;display:flex;flex-wrap:wrap;gap:5px;
  padding:8px 12px;align-items:center;
}
.daily-task-chip{
  display:inline-flex;align-items:center;gap:4px;
  padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;
  pointer-events:none;user-select:none;
}
.daily-task-chip.chip-done{
  background:rgba(0,53,26,0.55);color:var(--green);
  border:1px solid rgba(77,255,145,0.3);
}
.daily-task-chip.chip-missed{
  background:rgba(53,0,16,0.55);color:var(--red);
  border:1px solid rgba(255,77,106,0.3);
}
.daily-task-chip.chip-pending{
  background:rgba(26,32,53,0.5);color:var(--text3);
  border:1px solid var(--border2);
}
/* Day progress bar */
.daily-day-progress{
  display:flex;align-items:center;gap:8px;
  padding:0 12px 0 0;flex-shrink:0;
}
.daily-progress-mini{
  width:48px;height:5px;border-radius:3px;
  background:rgba(255,255,255,0.06);overflow:hidden;
}
.daily-progress-mini-fill{
  height:100%;border-radius:3px;
  background:linear-gradient(90deg,var(--purple2),var(--teal));
  transition:width .5s cubic-bezier(.34,1.2,.64,1);
}
/* Subtle frosted lock overlay on the whole player panel when read-only */
.player-panel-readonly-wrap{position:relative}
.player-panel-readonly-wrap::after{
  content:'';
  position:absolute;inset:0;border-radius:16px;
  background:rgba(7,9,15,0.0);
  pointer-events:none;
  transition:.2s;
}

/* ── SIDEBAR ── */
.sidebar{width:240px;background:rgba(7,9,15,0.9);border-right:1px solid var(--border);padding:16px;flex-shrink:0;backdrop-filter:blur(8px);overflow-y:auto}
.sidebar-section{margin-bottom:20px}
.sidebar-label{font-size:10px;font-weight:700;color:var(--text3);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px;padding:0 4px}
.cat-item{padding:8px 10px;border-radius:var(--r);cursor:pointer;margin-bottom:2px;border:1px solid transparent;transition:.15s;display:flex;align-items:center;gap:8px}
.cat-item:hover{background:rgba(124,111,255,0.08);border-color:rgba(124,111,255,0.2)}
.cat-item.active{background:rgba(124,111,255,0.12);border-color:rgba(124,111,255,0.3);box-shadow:inset 3px 0 0 var(--purple)}
.cat-dot{width:6px;height:6px;border-radius:50%;background:var(--teal);flex-shrink:0;box-shadow:0 0 6px var(--teal)}
.cat-dot.closed{background:var(--text3);box-shadow:none}
.cat-name{font-size:13px;color:var(--text)}
.cat-status{font-size:10px;color:var(--text3);margin-left:auto}
.sidebar::-webkit-scrollbar{width:4px}
.sidebar::-webkit-scrollbar-track{background:transparent}
.sidebar::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* ── CARDS ── */
.card{background:rgba(13,17,32,0.8);border:1px solid var(--border);border-radius:var(--r2);padding:16px;transition:.2s;backdrop-filter:blur(4px);position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(124,111,255,0.3),transparent);opacity:0;transition:.2s}
.card:hover{border-color:rgba(124,111,255,0.4);box-shadow:0 4px 24px rgba(124,111,255,0.1),inset 0 1px 0 rgba(124,111,255,0.1)}
.card:hover::before{opacity:1}
.card-title{font-size:11px;font-weight:700;color:var(--text3);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:14px;display:flex;align-items:center;gap:8px}

/* ── GRID ── */
.grid2{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin-bottom:16px}
.grid3{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:16px}
.grid4{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:16px}

/* ── STATS ── */
.stat{background:rgba(19,24,41,0.8);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;transition:.2s;backdrop-filter:blur(4px)}
.stat:hover{transform:translateY(-2px)}
.stat-label{font-size:11px;color:var(--text3);margin-bottom:4px;letter-spacing:.05em}
.stat-val{font-size:22px;font-weight:800;color:var(--text)}
.stat-sub{font-size:11px;color:var(--text3);margin-top:2px}
.stat.purple .stat-val{color:var(--purple);text-shadow:0 0 12px rgba(124,111,255,0.4)}
.stat.purple:hover{box-shadow:0 4px 20px rgba(124,111,255,0.2);border-color:rgba(124,111,255,0.4)}
.stat.teal .stat-val{color:var(--teal);text-shadow:0 0 12px rgba(0,212,170,0.4)}
.stat.teal:hover{box-shadow:0 4px 20px rgba(0,212,170,0.2);border-color:rgba(0,212,170,0.4)}
.stat.amber .stat-val{color:var(--amber);text-shadow:0 0 12px rgba(255,184,48,0.3)}
.stat.amber:hover{box-shadow:0 4px 20px rgba(255,184,48,0.2);border-color:rgba(255,184,48,0.4)}
.stat.red .stat-val{color:var(--red)}
.stat.green .stat-val{color:var(--green)}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--r);border:1px solid var(--border2);background:rgba(26,32,53,0.8);color:var(--text);font-size:13px;cursor:pointer;transition:.15s;font-weight:500;position:relative;overflow:hidden}
.btn:hover{background:rgba(46,63,106,0.8);border-color:rgba(124,111,255,0.5);box-shadow:0 0 12px rgba(124,111,255,0.2)}
.btn:active{transform:scale(0.96)}
.btn.primary{background:linear-gradient(135deg,var(--purple2),rgba(124,111,255,0.8));border-color:var(--purple);color:#fff}
.btn.primary:hover{box-shadow:0 0 20px rgba(124,111,255,0.4)}
.btn.danger{background:rgba(53,0,16,0.8);border-color:var(--red2);color:var(--red)}
.btn.danger:hover{background:var(--red2);color:#fff;box-shadow:0 0 12px rgba(255,77,106,0.3)}
.btn.success{background:rgba(0,53,26,0.8);border-color:var(--green2);color:var(--green)}
.btn.success:hover{background:var(--green2);color:#000;box-shadow:0 0 12px rgba(77,255,145,0.3)}
.btn.warn{background:rgba(38,24,0,0.8);border-color:var(--amber2);color:var(--amber)}
.btn.warn:hover{background:var(--amber2);color:#000}
.btn.event{background:linear-gradient(135deg,rgba(255,77,106,0.2),rgba(255,184,48,0.15));border-color:var(--red);color:var(--red)}
.btn.event:hover{box-shadow:0 0 20px rgba(255,77,106,0.4)}
.btn.sm{padding:4px 10px;font-size:12px}
.btn.locked{opacity:.5;cursor:not-allowed;pointer-events:none}
.btn.team-bonus{background:linear-gradient(135deg,rgba(0,53,26,0.8),rgba(0,35,18,0.8));border-color:var(--green2);color:var(--green)}
.btn.team-bonus:hover{box-shadow:0 0 16px rgba(77,255,145,0.3)}

/* ── BADGES ── */
.badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600}
.badge.general{background:rgba(0,53,26,0.8);color:var(--green);border:1px solid var(--green2)}
.badge.special{background:rgba(38,24,0,0.8);color:var(--amber);border:1px solid var(--amber2)}
.badge.team{background:rgba(0,14,37,0.8);color:var(--blue);border:1px solid var(--blue2)}
.badge.done{background:rgba(0,53,26,0.8);color:var(--green);border:1px solid rgba(34,204,102,0.4)}
.badge.missed{background:rgba(37,0,16,0.8);color:var(--red);border:1px solid rgba(204,42,69,0.4)}
.badge.active{background:rgba(26,21,64,0.8);color:var(--purple);border:1px solid rgba(91,79,207,0.4)}
.badge.late{background:rgba(38,24,0,0.8);color:var(--amber);border:1px solid rgba(212,144,10,0.4)}
.badge.locked-task{background:rgba(26,32,53,0.6);color:var(--text3);border:1px solid var(--border)}

/* ── XP / PROGRESS BARS ── */
.xp-bar-wrap{height:4px;background:rgba(255,255,255,0.06);border-radius:2px;overflow:hidden;margin:6px 0}
.xp-bar{height:100%;background:linear-gradient(90deg,var(--purple2),var(--teal));border-radius:2px;transition:width .5s cubic-bezier(.34,1.2,.64,1)}
.lb-bar-wrap{height:4px;background:rgba(255,255,255,0.06);border-radius:2px;overflow:hidden;width:80px;flex-shrink:0}
.lb-bar{height:100%;background:linear-gradient(90deg,var(--purple),var(--teal));border-radius:2px}

/* ── LEVEL BADGE ── */
.level-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:800;letter-spacing:.05em}
.level-badge.lv1{background:rgba(90,100,128,0.2);color:var(--text2);border:1px solid var(--border2)}
.level-badge.lv2{background:rgba(0,53,26,0.3);color:var(--green);border:1px solid var(--green2)}
.level-badge.lv3{background:rgba(0,14,37,0.3);color:var(--blue);border:1px solid var(--blue2)}
.level-badge.lv4{background:rgba(38,24,0,0.4);color:var(--amber);border:1px solid var(--amber2);box-shadow:0 0 8px rgba(255,184,48,0.2)}
.level-badge.lv5{background:rgba(26,21,64,0.5);color:var(--purple);border:1px solid var(--purple2);box-shadow:0 0 8px rgba(124,111,255,0.3)}
.level-badge.lv6{background:rgba(37,0,0,0.5);color:var(--red);border:1px solid var(--red2);box-shadow:0 0 8px rgba(255,77,106,0.3)}
.level-badge.lv7{background:linear-gradient(135deg,rgba(255,215,0,0.2),rgba(255,184,48,0.1));color:var(--gold);border:1px solid rgba(255,215,0,0.5);box-shadow:0 0 12px rgba(255,215,0,0.3)}

/* ── PLAYER / TEAM CARDS ── */
.player-card{background:rgba(13,17,32,0.8);border:1px solid var(--border);border-radius:var(--r2);padding:14px;cursor:default;transition:.2s;backdrop-filter:blur(4px)}
.player-card:hover{border-color:rgba(124,111,255,0.6);transform:translateY(-4px);box-shadow:0 8px 32px rgba(124,111,255,0.2)}
.team-card{background:rgba(13,17,32,0.8);border:1px solid var(--border);border-radius:var(--r2);padding:16px;transition:.2s;backdrop-filter:blur(4px)}
.team-card:hover{border-color:rgba(0,212,170,0.4);box-shadow:0 4px 24px rgba(0,212,170,0.1)}
.player-avatar{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px;flex-shrink:0}
.player-name{font-size:14px;font-weight:600;color:var(--text)}
.player-team{font-size:11px;color:var(--text3)}
.player-xp{font-size:20px;font-weight:800;color:var(--purple);margin:4px 0 2px;text-shadow:0 0 10px rgba(124,111,255,0.4)}
.rank-badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:700;padding:2px 6px;border-radius:4px}
.rank-1{background:rgba(38,24,0,0.9);color:var(--amber);border:1px solid var(--amber2);box-shadow:0 0 8px rgba(255,184,48,0.2)}
.rank-2{background:rgba(26,32,53,0.9);color:var(--text2);border:1px solid var(--border2)}
.rank-3{background:rgba(42,26,0,0.9);color:#cd7f32;border:1px solid rgba(205,127,50,0.3)}
.team-header{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.team-icon{width:36px;height:36px;border-radius:var(--r);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.team-name{font-size:15px;font-weight:700;color:var(--text)}
.team-xp{font-size:11px;color:var(--text3)}

/* ── TASKS ── */
.task-row{display:flex;align-items:center;gap:10px;padding:10px 12px;background:rgba(19,24,41,0.8);border:1px solid var(--border);border-radius:var(--r);margin-bottom:6px;transition:.2s}
.task-row:hover{border-color:rgba(124,111,255,0.3);box-shadow:0 2px 12px rgba(124,111,255,0.1)}
.task-row.task-done{opacity:.65;border-color:rgba(34,204,102,0.2)}
.task-row.task-done .task-name{text-decoration:line-through;color:var(--text3)}
.task-row.task-locked{opacity:.7;border-color:rgba(26,32,53,0.5)}
.task-name{flex:1;font-size:13px;color:var(--text)}
.task-xp{font-size:12px;color:var(--amber);font-weight:700;margin-right:4px}
.task-actions{display:flex;gap:4px}

/* ── LEADERBOARD ── */
.lb-row{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:var(--r);margin-bottom:4px;transition:.2s;border:1px solid transparent}
.lb-row:hover{background:rgba(124,111,255,0.06);border-color:rgba(124,111,255,0.15)}
.lb-row.first-place{background:rgba(255,184,48,0.06);border:1px solid rgba(255,184,48,0.2);box-shadow:inset 0 0 20px rgba(255,184,48,0.04)}
.lb-rank{font-size:14px;font-weight:700;min-width:28px;text-align:center}
.lb-avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.lb-name{flex:1;font-size:13px;font-weight:500}
.lb-team{font-size:11px;color:var(--text3)}
.lb-xp{font-size:14px;font-weight:800;color:var(--purple);text-shadow:0 0 8px rgba(124,111,255,0.4)}

/* ── ACTIVITY LOG ── */
.log-row{display:flex;align-items:center;gap:10px;padding:8px 10px;border-bottom:1px solid var(--border);font-size:12px;transition:.15s}
.log-row:last-child{border-bottom:none}
.log-row:hover{background:rgba(124,111,255,0.04)}
.log-time{color:var(--text3);min-width:70px}
.log-msg{flex:1;color:var(--text2)}
.log-xp{color:var(--teal);font-weight:700;min-width:50px;text-align:right}

/* ── MISSION STATUS ── */
.mission-status{display:inline-flex;align-items:center;gap:6px;background:rgba(0,30,26,0.8);border:1px solid var(--teal2);border-radius:20px;padding:3px 12px;font-size:11px;font-weight:700;color:var(--teal);box-shadow:0 0 8px rgba(0,212,170,0.15)}
.mission-status.closed{background:rgba(26,32,53,0.5);border-color:var(--border2);color:var(--text3);box-shadow:none}
.streak{display:inline-flex;align-items:center;gap:4px;background:rgba(38,24,0,0.8);border:1px solid var(--amber2);border-radius:20px;padding:3px 10px;font-size:12px;font-weight:700;color:var(--amber);box-shadow:0 0 8px rgba(255,184,48,0.15)}

/* ── SECTION HEADER ── */
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px}
.section-title{font-size:16px;font-weight:800;color:var(--text);letter-spacing:.02em}

/* ── TABS ── */
.tabs{display:flex;gap:4px;margin-bottom:16px;border-bottom:1px solid var(--border);padding-bottom:0;position:relative}
.tabs::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(124,111,255,0.2),transparent)}
.tab{background:none;border:none;color:var(--text2);padding:7px 14px;border-radius:var(--r) var(--r) 0 0;cursor:pointer;font-size:13px;transition:.15s;font-weight:500}
.tab:hover{color:var(--text);background:rgba(124,111,255,0.06)}
.tab.active{color:var(--purple);background:rgba(124,111,255,0.1);box-shadow:inset 0 -2px 0 var(--purple)}

/* ── MODAL ── */
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px)}
.modal{background:rgba(10,13,22,0.95);border:1px solid var(--border2);border-radius:var(--r2);padding:24px;width:100%;max-width:460px;position:relative;backdrop-filter:blur(20px);box-shadow:0 0 60px rgba(0,0,0,0.8),0 0 1px var(--purple);animation:modalIn .18s cubic-bezier(.34,1.4,.64,1);max-height:90vh;overflow-y:auto}
@keyframes modalIn{from{transform:scale(0.94);opacity:0}to{transform:none;opacity:1}}
.modal-title{font-size:16px;font-weight:700;margin-bottom:16px;color:#fff;text-shadow:0 0 12px rgba(124,111,255,0.4)}
.modal-close{position:absolute;top:12px;right:14px;background:none;border:none;color:var(--text3);cursor:pointer;font-size:20px;line-height:1;transition:.15s}
.modal-close:hover{color:var(--text);transform:scale(1.2)}
.form-row{margin-bottom:12px}
.form-row label{display:block;font-size:12px;color:var(--text2);margin-bottom:6px;font-weight:500}
.form-row input,.form-row select,.form-row textarea{width:100%;background:rgba(255,255,255,0.06);border:1px solid var(--border2);color:var(--text);padding:9px 12px;border-radius:var(--r);font-size:13px;outline:none;transition:.15s}
.form-row input:focus,.form-row select:focus,.form-row textarea:focus{border-color:var(--purple);box-shadow:0 0 0 2px rgba(124,111,255,0.2)}
.form-row select option{background:var(--bg2)}
.form-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:16px}

/* ── OWNER PANEL ── */
.owner-panel{background:rgba(26,21,64,0.9);border:1px solid var(--purple);border-radius:12px;padding:20px;margin-bottom:16px;box-shadow:0 0 30px rgba(124,111,255,0.15)}
.owner-panel-title{font-size:13px;font-weight:700;color:var(--purple);letter-spacing:1px;text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;gap:8px}

/* ── LEADER CONTROL PANEL ── */
.leader-panel{background:linear-gradient(135deg,rgba(26,21,64,0.95),rgba(13,17,32,0.95));border:1px solid rgba(124,111,255,0.5);border-radius:14px;padding:20px;margin-bottom:16px;box-shadow:0 0 40px rgba(124,111,255,0.12),inset 0 1px 0 rgba(124,111,255,0.2)}
.leader-panel-title{font-size:14px;font-weight:800;color:#fff;letter-spacing:.08em;text-transform:uppercase;margin-bottom:16px;display:flex;align-items:center;gap:8px;text-shadow:0 0 16px rgba(124,111,255,0.5)}
.control-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:8px;margin-bottom:12px}
.control-btn{background:rgba(19,24,41,0.9);border:1px solid var(--border2);border-radius:10px;padding:12px;cursor:pointer;transition:.2s;text-align:center;color:var(--text2);font-size:12px;font-weight:600}
.control-btn:hover{background:rgba(46,63,106,0.8);border-color:rgba(124,111,255,0.5);color:var(--text);transform:translateY(-2px);box-shadow:0 4px 16px rgba(124,111,255,0.2)}
.control-btn .cb-icon{font-size:20px;display:block;margin-bottom:4px}
.control-btn.red-ctrl{border-color:rgba(255,77,106,0.3)}
.control-btn.red-ctrl:hover{border-color:var(--red);box-shadow:0 4px 16px rgba(255,77,106,0.2)}
.control-btn.green-ctrl{border-color:rgba(77,255,145,0.3)}
.control-btn.green-ctrl:hover{border-color:var(--green);box-shadow:0 4px 16px rgba(77,255,145,0.2)}
.control-btn.amber-ctrl{border-color:rgba(255,184,48,0.3)}
.control-btn.amber-ctrl:hover{border-color:var(--amber);box-shadow:0 4px 16px rgba(255,184,48,0.2)}

/* ── EVENT BANNER ── */
.event-banner{background:linear-gradient(135deg,rgba(255,77,106,0.15),rgba(255,184,48,0.1));border:1px solid rgba(255,77,106,0.5);border-radius:12px;padding:14px 18px;margin-bottom:14px;display:flex;align-items:center;gap:12px;animation:eventPulse 2s ease infinite;position:relative;overflow:hidden}
@keyframes eventPulse{0%,100%{box-shadow:0 0 0 0 rgba(255,77,106,0.3)}50%{box-shadow:0 0 0 6px rgba(255,77,106,0)}}
.event-banner::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(45deg,transparent,transparent 10px,rgba(255,77,106,0.03) 10px,rgba(255,77,106,0.03) 11px);pointer-events:none}
.event-icon{font-size:24px;flex-shrink:0}
.event-name{font-size:14px;font-weight:800;color:#fff}
.event-desc{font-size:11px;color:rgba(255,255,255,0.6)}
.event-timer{margin-left:auto;font-size:13px;font-weight:700;color:var(--amber);font-variant-numeric:tabular-nums}
.event-x{background:none;border:none;color:var(--text3);cursor:pointer;font-size:16px;padding:4px;line-height:1}
.event-x:hover{color:var(--text)}

/* ── ACHIEVEMENT ── */
.achievement-popup{position:fixed;bottom:80px;right:20px;z-index:6000;background:linear-gradient(135deg,rgba(255,184,48,0.2),rgba(255,184,48,0.08));border:1px solid rgba(255,184,48,0.6);border-radius:14px;padding:14px 18px;display:flex;align-items:center;gap:12px;box-shadow:0 0 40px rgba(255,184,48,0.3),0 8px 32px rgba(0,0,0,0.6);animation:achieveIn .4s cubic-bezier(.34,1.6,.64,1) forwards;min-width:260px}
@keyframes achieveIn{from{opacity:0;transform:translateX(40px) scale(0.9)}to{opacity:1;transform:none;scale:1}}
.achieve-icon{font-size:28px}
.achieve-title{font-size:11px;font-weight:700;color:var(--amber);letter-spacing:.05em;text-transform:uppercase}
.achieve-name{font-size:14px;font-weight:800;color:#fff}
.achieve-desc{font-size:11px;color:rgba(255,255,255,0.6)}
.ach-card{background:rgba(19,24,41,0.9);border:1px solid var(--border);border-radius:10px;padding:12px;display:flex;align-items:center;gap:10px;transition:.2s}
.ach-card.unlocked{border-color:rgba(255,184,48,0.4);background:rgba(38,24,0,0.4)}
.ach-card:hover{transform:translateY(-2px)}
.ach-icon{font-size:22px;width:40px;height:40px;display:flex;align-items:center;justify-content:center;background:rgba(255,184,48,0.1);border-radius:8px;flex-shrink:0}
.ach-icon.locked{filter:grayscale(1);opacity:.4}
.ach-title{font-size:13px;font-weight:700;color:var(--text)}
.ach-desc{font-size:11px;color:var(--text3)}
.ach-xp{font-size:11px;font-weight:700;color:var(--amber)}

/* ── TOAST ── */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:5000;background:rgba(7,9,15,0.97);border:1px solid rgba(77,255,145,0.5);box-shadow:0 0 30px rgba(77,255,145,0.2),0 8px 32px rgba(0,0,0,0.6);border-radius:10px;padding:10px 20px;font-size:13px;color:var(--text);display:flex;align-items:center;gap:8px;animation:toastIn .3s cubic-bezier(.34,1.4,.64,1)}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(10px)}}
.toast::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green);flex-shrink:0;animation:livePulse 1s ease infinite}

/* ── MISC COMPONENTS ── */
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--teal);display:inline-block;animation:livePulse 1.4s ease infinite;box-shadow:0 0 6px var(--teal);flex-shrink:0}
@keyframes livePulse{0%,100%{opacity:1}50%{opacity:.3}}
.lock-wrap{position:relative;display:inline-flex}
.lock-wrap .lock-tip{position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:rgba(10,13,22,0.95);border:1px solid var(--border2);border-radius:6px;padding:4px 10px;font-size:11px;color:var(--amber);white-space:nowrap;pointer-events:none;opacity:0;transition:.15s;z-index:50}
.lock-wrap:hover .lock-tip{opacity:1}

/* ── SCROLLBAR ── */
.content::-webkit-scrollbar{width:6px}
.content::-webkit-scrollbar-track{background:var(--bg)}
.content::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
.content::-webkit-scrollbar-thumb:hover{background:var(--purple2)}

/* ── ANIMATIONS ── */
@keyframes counterPop{0%{transform:scale(1)}40%{transform:scale(1.18)}100%{transform:scale(1)}}
.xp-pop{animation:counterPop .35s cubic-bezier(.34,1.56,.64,1)}
@keyframes taskDoneFlash{0%{background:rgba(34,204,102,0.3)}100%{background:transparent}}
.task-done-flash{animation:taskDoneFlash .6s ease}
@keyframes taskMissedFlash{0%{background:rgba(255,77,106,0.25)}100%{background:transparent}}
.task-missed-flash{animation:taskMissedFlash .5s ease}
@keyframes checkDraw{from{stroke-dashoffset:20}to{stroke-dashoffset:0}}
.check-svg{width:14px;height:14px}
.check-svg path{stroke-dasharray:20;stroke-dashoffset:0;animation:checkDraw .25s ease forwards}
@keyframes floatXP{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-70px) scale(1.4)}}
.xp-float{position:fixed;font-size:18px;font-weight:800;color:var(--teal);pointer-events:none;z-index:5000;animation:floatXP 1.2s ease-out forwards;text-shadow:0 0 12px rgba(0,212,170,0.8)}
@keyframes levelUpBurst{0%{opacity:0;transform:scale(0.5)}40%{opacity:1;transform:scale(1.1)}80%{opacity:1;transform:scale(1)}100%{opacity:0;transform:scale(1.05)}}
.levelup-overlay{position:fixed;inset:0;z-index:7000;display:flex;align-items:center;justify-content:center;background:rgba(124,111,255,0.15);backdrop-filter:blur(4px);animation:levelUpBurst 2s ease forwards;pointer-events:none}
.levelup-card{text-align:center;background:rgba(10,13,28,0.98);border:2px solid var(--purple);border-radius:20px;padding:40px 60px;box-shadow:0 0 80px rgba(124,111,255,0.6)}
.levelup-label{font-size:12px;font-weight:700;color:var(--teal);letter-spacing:.3em;text-transform:uppercase;margin-bottom:8px}
.levelup-num{font-size:80px;font-weight:900;color:#fff;text-shadow:0 0 40px var(--purple),0 0 80px rgba(124,111,255,0.5);line-height:1}
.levelup-sub{font-size:14px;color:var(--text2);margin-top:8px}
@keyframes pageIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* ── PRIVATE NOTES ── */
.note-item{background:rgba(19,24,41,0.8);border:1px solid var(--border);border-radius:var(--r);padding:10px 12px;margin-bottom:6px;display:flex;align-items:flex-start;gap:8px;font-size:13px;color:var(--text2);transition:.15s}
.note-item:hover{border-color:rgba(124,111,255,0.3)}
.note-text{flex:1;word-break:break-word}
.note-actions{display:flex;gap:4px;flex-shrink:0}
.notes-gate{background:rgba(26,21,64,0.5);border:1px solid rgba(124,111,255,0.3);border-radius:var(--r);padding:14px;text-align:center;font-size:13px;color:var(--text3)}

/* ── ROLES ── */
.role-item{display:flex;align-items:center;gap:10px;padding:8px 10px;background:rgba(19,24,41,0.8);border:1px solid var(--border);border-radius:var(--r);margin-bottom:6px;font-size:13px;transition:.15s}
.role-item:hover{border-color:rgba(124,111,255,0.3)}
.role-label-pill{display:inline-flex;align-items:center;padding:3px 12px;border-radius:20px;font-size:12px;font-weight:700;background:rgba(124,111,255,0.15);color:var(--purple);border:1px solid rgba(124,111,255,0.3)}

/* ── IMPORTANT LINKS ── */
.link-item{display:flex;align-items:center;gap:10px;padding:9px 12px;background:rgba(19,24,41,0.8);border:1px solid var(--border);border-radius:var(--r);margin-bottom:6px;transition:.15s}
.link-item:hover{border-color:rgba(0,212,170,0.3)}
.link-icon{font-size:16px;flex-shrink:0}
.link-label{flex:1;font-size:13px;font-weight:600;color:var(--text)}
.link-url{font-size:11px;color:var(--text3);max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.link-open{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:var(--r);background:rgba(0,212,170,0.1);border:1px solid rgba(0,212,170,0.3);color:var(--teal);font-size:11px;font-weight:700;cursor:pointer;text-decoration:none;transition:.15s}
.link-open:hover{background:rgba(0,212,170,0.2);box-shadow:0 0 10px rgba(0,212,170,0.2)}

/* ── PLAYER PROFILE ── */

/* ══════════════════════════════════════════════════════
   MOBILE-FIRST RESPONSIVE SYSTEM — v21 Mobile Refactor
   All changes marked with [MOBILE] comment tag
   Desktop layout preserved via min-width breakpoints
══════════════════════════════════════════════════════ */

/* ── [MOBILE] GLOBAL OVERFLOW GUARD ── */
html{overflow-x:hidden}
body{overflow-x:hidden;max-width:100vw}

/* ── [MOBILE] ADAPTIVE GRID SYSTEM ──
   Replaces all minmax(200px, 1fr) with adaptive columns */
.grid2{display:grid;grid-template-columns:1fr;gap:10px;margin-bottom:14px}
.grid3{display:grid;grid-template-columns:1fr;gap:10px;margin-bottom:14px}
.grid4{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}

/* [MOBILE] Control grid override for leader panel */
.control-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}

/* [MOBILE] Mission cards: single column on mobile */
.mission-cards-grid{display:grid;grid-template-columns:1fr;gap:10px}

/* [MOBILE] Links grids: single column on mobile */
.links-grid-immersive{display:grid;grid-template-columns:1fr;gap:8px}
.env-links-grid{display:grid;grid-template-columns:1fr;gap:8px}

/* [MOBILE] Stat orbs: 3 col stays but smaller padding */
.player-stats-orbs{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.stat-orb{padding:12px 8px}
.stat-orb-val{font-size:18px}
.stat-orb-label{font-size:9px}

/* ── [MOBILE] TOPBAR — scrollable nav, no overflow ── */
.topbar{
  padding:0 8px;
  gap:6px;
  height:52px;
  position:sticky;top:0;z-index:100;
  width:100%;max-width:100vw;
  overflow:hidden;
}
.logo-text{display:none} /* [MOBILE] hide text logo on mobile, keep mark */
.logo-mark{width:26px;height:26px;font-size:13px;flex-shrink:0}
.nav{
  display:flex;
  gap:0;
  margin-left:auto;
  overflow-x:auto;
  -webkit-overflow-scrolling:touch;
  scrollbar-width:none;
  -ms-overflow-style:none;
  max-width:calc(100vw - 120px);
  flex-shrink:1;
  min-width:0;
}
.nav::-webkit-scrollbar{display:none}
.nav-btn{
  padding:8px 8px;   /* [MOBILE] min 44px touch height via line-height */
  font-size:11px;
  white-space:nowrap;
  min-height:44px;    /* [MOBILE] 44px touch target */
  display:inline-flex;
  align-items:center;
  flex-shrink:0;
}
/* [MOBILE] Role badge compact */
.role-badge{padding:2px 6px;font-size:9px;margin-left:2px;flex-shrink:0}
.view-only-pill{padding:2px 5px;font-size:9px;margin-left:1px;flex-shrink:0}

/* ── [MOBILE] LAYOUT — sidebar hidden, content full width ── */
.app{display:flex;flex-direction:column;min-height:100vh;max-width:100vw;overflow-x:hidden}
.main{display:flex;flex:1;gap:0;min-height:0;max-width:100vw;overflow-x:hidden}
.sidebar{display:none} /* [MOBILE] hidden on mobile — bottom nav replaces it */
.content{
  flex:1;
  padding:10px;      /* [MOBILE] reduced mobile padding */
  overflow:auto;
  overflow-x:hidden;
  max-width:100vw;
  /* [MOBILE] bottom padding to avoid content hiding behind bottom nav */
  padding-bottom:72px;
}

/* ── [MOBILE] ENTRY & LOGIN — fit small screens ── */
.entry-box{
  width:calc(100% - 24px);
  max-width:360px;
  padding:24px 16px 20px;
  margin:12px;
  box-sizing:border-box;
}
.entry-logo{font-size:22px}
.login-panel{
  width:calc(100% - 24px);
  max-width:360px;
  padding:24px 16px;
  margin:12px;
  box-sizing:border-box;
}

/* ── [MOBILE] ENTRY SCREEN ── */
#entry-screen{padding:12px;align-items:center}

/* ── [MOBILE] SECTION HEADER WRAP ── */
.section-header{flex-wrap:wrap;gap:6px}
.section-title{font-size:14px}

/* ── [MOBILE] BOTTOM NAVIGATION BAR ── */
#mobile-bottom-nav{
  display:flex;
  position:fixed;
  bottom:0;left:0;right:0;
  height:60px;
  background:rgba(7,9,15,0.97);
  border-top:1px solid var(--border);
  z-index:500;
  backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);
  box-shadow:0 -4px 24px rgba(0,0,0,0.5);
  /* gradient accent line at top */
}
#mobile-bottom-nav::before{
  content:'';
  position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--purple),var(--teal),transparent);
  opacity:.5;
}
.mob-nav-btn{
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:3px;
  background:none;
  border:none;
  color:var(--text3);
  font-size:10px;
  font-weight:600;
  letter-spacing:.04em;
  cursor:pointer;
  transition:color .15s;
  min-height:44px; /* [MOBILE] touch target */
  padding:6px 4px;
  -webkit-tap-highlight-color:transparent;
}
.mob-nav-btn:active{
  background:rgba(124,111,255,0.08);
}
.mob-nav-btn.active{
  color:var(--purple);
}
.mob-nav-btn.active .mob-nav-icon{
  filter:drop-shadow(0 0 6px rgba(124,111,255,0.5));
}
.mob-nav-icon{
  font-size:18px;
  line-height:1;
  transition:transform .15s;
}
.mob-nav-btn:active .mob-nav-icon{
  transform:scale(0.88);
}
.mob-nav-label{
  font-size:9px;
  text-transform:uppercase;
  letter-spacing:.08em;
}

/* ── [MOBILE] SIDEBAR DRAWER (for environments/categories) ── */
#mobile-sidebar-drawer{
  display:none; /* controlled via JS class */
  position:fixed;
  inset:0;
  z-index:400;
}
#mobile-sidebar-drawer.open{display:block}
.mob-drawer-backdrop{
  position:absolute;inset:0;
  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(4px);
}
.mob-drawer-panel{
  position:absolute;
  left:0;top:0;bottom:0;

}
@keyframes drawerSlideIn{
  from{transform:translateX(-100%);opacity:.8}
  to{transform:translateX(0);opacity:1}
}
/* Drawer sidebar content reuses .sidebar styles */
.mob-drawer-panel .sidebar-section{margin-bottom:16px}
.mob-drawer-panel .sidebar-label{font-size:10px;font-weight:700;color:var(--text3);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px;padding:0 4px}
.mob-drawer-panel .cat-item{min-height:44px} /* [MOBILE] touch target */
.mob-drawer-handle{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:18px;padding-bottom:14px;
  border-bottom:1px solid var(--border);
}
.mob-drawer-title{font-size:12px;font-weight:800;color:var(--text);letter-spacing:.12em;text-transform:uppercase}
.mob-drawer-close{
  background:none;border:none;color:var(--text3);cursor:pointer;
  font-size:20px;line-height:1;padding:4px;min-width:44px;min-height:44px;
  display:flex;align-items:center;justify-content:center;
  -webkit-tap-highlight-color:transparent;
}
.mob-drawer-close:hover{color:var(--text)}

/* ── [MOBILE] DOUBLE XP BADGE — above bottom nav ── */
body.double-xp-active #app::after{
  bottom:68px; /* [MOBILE] above bottom nav */
}

/* ── [MOBILE] TOUCH TARGETS — Buttons, tasks ── */
.btn{min-height:44px;padding:8px 12px;max-width:100%;white-space:normal;word-break:break-word} /* [MOBILE] increased */
.btn.sm{min-height:36px;padding:6px 10px}
.icon-btn{width:36px;height:36px} /* [MOBILE] larger touch target */
.task-row{padding:12px 10px;gap:8px;flex-wrap:wrap}

/* [MOBILE] Cards must not overflow */
.card,.player-card,.team-card,.profile-card{
  max-width:100%;
  overflow-x:hidden;
  box-sizing:border-box;
}

/* [MOBILE] Task name and XP should wrap on small screens */

/* [MOBILE] Form rows must not overflow */

}

/* [MOBILE] Env row wraps properly */

/* [MOBILE] Leader panel control buttons */
.leader-panel,.owner-panel{

}

/* [MOBILE] lb-row items must not overflow */

.modal{

}

/* ── [MOBILE] PLAYER HERO IMMERSIVE ── */
.player-hero-immersive{padding:18px 16px 14px}
.player-hero-top{gap:12px;margin-bottom:14px}
.player-hero-avatar-ring{width:60px;height:60px}

.player-hero-xp-num{font-size:30px}

/* ── [MOBILE] DAILY TIMELINE ── */
.daily-day-label{min-width:80px;font-size:11px}

/* ── [MOBILE] TOAST — above bottom nav ── */
.toast{bottom:68px}

/* ── [MOBILE] ACHIEVEMENT POPUP — above bottom nav ── */
.achievement-popup{bottom:68px;right:12px;min-width:240px}

   TABLET BREAKPOINT — 2 columns, sidebar optional

@media (min-width: 600px) {
  /* [TABLET] Grid upgrades */
  .grid2{grid-template-columns:repeat(2,1fr);gap:12px}
  .grid3{grid-template-columns:repeat(2,1fr);gap:12px}

  .control-btn{padding:12px;min-height:auto;word-break:normal}
  .tab{min-height:auto;padding:7px 14px;font-size:13px}

  /* [DESKTOP] Restore modal */
  .modal{width:100%;max-width:460px;margin:0;padding:24px;max-height:90vh;overflow-x:auto}
  .modal-backdrop{padding:20px;align-items:center}

  /* [DESKTOP] Restore entry */
  .entry-box{width:100%;max-width:360px;padding:36px 32px 28px;margin:0}

  .player-hero-xp-num{font-size:42px}
  .stat-orb{padding:14px 10px}
  .stat-orb-val{font-size:22px}
  .stat-orb-label{font-size:10px}
  .player-stats-orbs{gap:10px}

  /* [DESKTOP] Restore toast/achievement positions */
  .toast{bottom:20px}
  .achievement-popup{bottom:80px;right:20px}

  .form-actions{flex-wrap:nowrap}

  .lb-row{flex-wrap:nowrap}

  content:'';position:absolute;top:-80px;right:-60px;width:320px;height:320px;
  background:radial-gradient(ellipse at 70% 30%,rgba(124,111,255,0.25) 0%,transparent 65%);
  pointer-events:none;
}
.player-hero-immersive::after{
  content:'';position:absolute;bottom:-40px;left:-40px;width:200px;height:200px;
  background:radial-gradient(ellipse at 30% 70%,rgba(0,212,170,0.15) 0%,transparent 65%);
  pointer-events:none;
}
.player-hero-top{display:flex;align-items:flex-start;gap:20px;position:relative;z-index:1;margin-bottom:20px}
.player-hero-avatar-wrap{flex-shrink:0;position:relative}
.player-hero-avatar-ring{
  width:80px;height:80px;border-radius:50%;
  padding:3px;
  background:linear-gradient(135deg,var(--purple),var(--teal));
  box-shadow:0 0 24px rgba(124,111,255,0.5),0 0 48px rgba(0,212,170,0.2);
  animation:avatarRingPulse 3s ease infinite;
}
@keyframes avatarRingPulse{
  0%,100%{box-shadow:0 0 24px rgba(124,111,255,0.5),0 0 48px rgba(0,212,170,0.2)}
  50%{box-shadow:0 0 40px rgba(124,111,255,0.7),0 0 60px rgba(0,212,170,0.3)}
}
.player-hero-avatar-inner{width:100%;height:100%;border-radius:50%;overflow:hidden;background:var(--bg3)}
.player-hero-info{flex:1;min-width:0}
.player-hero-greeting{font-size:11px;color:var(--teal);letter-spacing:.2em;text-transform:uppercase;margin-bottom:4px;opacity:.8}
.player-hero-name-big{font-size:26px;font-weight:900;color:#fff;letter-spacing:.01em;line-height:1.1;margin-bottom:6px;text-shadow:0 0 30px rgba(124,111,255,0.3)}
.player-hero-badges{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.player-hero-xp-block{text-align:right;flex-shrink:0;position:relative;z-index:1}
.player-hero-xp-num{font-size:42px;font-weight:900;color:transparent;background:linear-gradient(135deg,var(--purple),var(--teal));-webkit-background-clip:text;background-clip:text;line-height:1;letter-spacing:-.02em;text-shadow:none;animation:xpCounterGlow 2s ease infinite}
@keyframes xpCounterGlow{0%,100%{filter:drop-shadow(0 0 8px rgba(124,111,255,0.4))}50%{filter:drop-shadow(0 0 16px rgba(0,212,170,0.5))}}
.player-hero-xp-unit{font-size:12px;color:var(--teal);letter-spacing:.2em;text-transform:uppercase;margin-top:2px;opacity:.8}

/* ── XP PROGRESS ARC ── */
.xp-progress-section{position:relative;z-index:1}
.xp-progress-meta{display:flex;justify-content:space-between;font-size:11px;color:var(--text3);margin-bottom:8px}
.xp-bar-immersive{height:10px;background:rgba(255,255,255,0.06);border-radius:5px;overflow:hidden;box-shadow:inset 0 1px 3px rgba(0,0,0,0.4)}
.xp-bar-immersive-fill{height:100%;border-radius:5px;background:linear-gradient(90deg,var(--purple2),var(--purple),var(--teal));position:relative;transition:width 1.2s cubic-bezier(.34,1.2,.64,1);box-shadow:0 0 12px rgba(124,111,255,0.5),0 0 4px rgba(0,212,170,0.4)}
.xp-bar-immersive-fill::after{
  content:'';position:absolute;top:0;right:0;width:30px;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.5));
  animation:barShine 2.5s ease infinite;
}
@keyframes barShine{0%{opacity:0;transform:translateX(-30px)}50%{opacity:1}100%{opacity:0;transform:translateX(30px)}}

/* ── STATS ORBS ── */
.player-stats-orbs{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
.stat-orb{
  background:rgba(13,17,32,0.9);
  border:1px solid var(--border);
  border-radius:14px;
  padding:14px 10px;
  text-align:center;
  transition:.25s;
  position:relative;
  overflow:hidden;
  cursor:default;
}
.stat-orb::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(124,111,255,0.08),transparent 70%);opacity:0;transition:.25s}
.stat-orb:hover{transform:translateY(-3px);border-color:rgba(124,111,255,0.4);box-shadow:0 8px 24px rgba(124,111,255,0.15)}
.stat-orb:hover::before{opacity:1}
.stat-orb.teal-orb:hover{border-color:rgba(0,212,170,0.4);box-shadow:0 8px 24px rgba(0,212,170,0.15)}
.stat-orb.teal-orb::before{background:radial-gradient(ellipse at 50% 0%,rgba(0,212,170,0.08),transparent 70%)}
.stat-orb.amber-orb:hover{border-color:rgba(255,184,48,0.4);box-shadow:0 8px 24px rgba(255,184,48,0.15)}
.stat-orb.amber-orb::before{background:radial-gradient(ellipse at 50% 0%,rgba(255,184,48,0.08),transparent 70%)}
.stat-orb-icon{font-size:20px;margin-bottom:6px;display:block}
.stat-orb-val{font-size:22px;font-weight:800;color:var(--purple);line-height:1}
.stat-orb.teal-orb .stat-orb-val{color:var(--teal)}
.stat-orb.amber-orb .stat-orb-val{color:var(--amber)}
.stat-orb-label{font-size:10px;color:var(--text3);letter-spacing:.08em;margin-top:4px;text-transform:uppercase}

/* ── ACHIEVEMENTS ROW ── */
.ach-row-immersive{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px}
.ach-chip{
  display:inline-flex;align-items:center;gap:5px;
  background:rgba(255,184,48,0.08);
  border:1px solid rgba(255,184,48,0.2);
  border-radius:20px;
  padding:3px 10px;
  font-size:11px;color:var(--amber);
  transition:.2s;cursor:default;
}
.ach-chip:hover{background:rgba(255,184,48,0.15);border-color:rgba(255,184,48,0.4);transform:scale(1.05)}

/* ── MISSIONS SECTION ── */
.missions-section{margin-bottom:16px}
.section-label-immersive{
  font-size:10px;font-weight:800;color:var(--teal);
  letter-spacing:.25em;text-transform:uppercase;
  margin-bottom:12px;
  display:flex;align-items:center;gap:8px;
}
.section-label-immersive::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,rgba(0,212,170,0.3),transparent)}

/* ── MISSION CARDS (tasks as visual cards) ── */
.mission-cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px}
.mission-card{
  background:rgba(13,17,32,0.9);
  border:1px solid var(--border);
  border-radius:14px;
  padding:16px;
  transition:.25s;
  position:relative;
  overflow:hidden;
  cursor:default;
  animation:missionCardIn .3s ease both;
}
@keyframes missionCardIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.mission-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--purple2),var(--teal2));opacity:0;transition:.2s}
.mission-card:hover{border-color:rgba(124,111,255,0.4);box-shadow:0 6px 24px rgba(124,111,255,0.12);transform:translateY(-3px)}
.mission-card:hover::before{opacity:1}
.mission-card.done-card{opacity:.65;border-color:rgba(34,204,102,0.2)}
.mission-card.done-card::before{background:var(--green2);opacity:.5}
.mission-card.locked-card{opacity:.55}
.mission-card-header{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.mission-card-type-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.mission-card-type-dot.general{background:var(--green);box-shadow:0 0 6px var(--green)}
.mission-card-type-dot.special{background:var(--amber);box-shadow:0 0 6px var(--amber)}
.mission-card-type-dot.team{background:var(--blue);box-shadow:0 0 6px var(--blue)}
.mission-card-name{font-size:13px;font-weight:600;color:var(--text);flex:1;line-height:1.3}
.mission-card.done-card .mission-card-name{text-decoration:line-through;color:var(--text3)}
.mission-card-xp{font-size:14px;font-weight:800;color:var(--amber);display:flex;align-items:center;gap:4px}
.mission-card-xp-label{font-size:9px;color:var(--text3);letter-spacing:.1em}
.mission-card-actions{display:flex;gap:6px;margin-top:12px}
.mission-btn{
  flex:1;padding:7px 8px;border-radius:8px;border:none;
  font-size:11px;font-weight:700;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:4px;
  transition:.15s;letter-spacing:.03em;
}
.mission-btn.done-btn{background:rgba(0,53,26,0.8);color:var(--green);border:1px solid rgba(34,204,102,0.3)}
.mission-btn.done-btn:hover{background:rgba(34,204,102,0.2);border-color:var(--green2);box-shadow:0 0 12px rgba(77,255,145,0.2)}
.mission-btn.missed-btn{background:rgba(53,0,16,0.8);color:var(--red);border:1px solid rgba(204,42,69,0.3)}
.mission-btn.missed-btn:hover{background:rgba(255,77,106,0.15);border-color:var(--red2);box-shadow:0 0 12px rgba(255,77,106,0.2)}
.mission-card-status-done{display:flex;align-items:center;gap:6px;color:var(--green);font-size:11px;font-weight:700;margin-top:10px;padding-top:8px;border-top:1px solid rgba(34,204,102,0.15)}
.mission-card-status-locked{display:flex;align-items:center;gap:6px;color:var(--text3);font-size:11px;margin-top:10px;padding-top:8px;border-top:1px solid var(--border)}
.mission-card-repeat{position:absolute;top:10px;right:10px;font-size:9px;color:var(--text3);background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:20px;padding:2px 6px;letter-spacing:.1em}

/* ── ENVIRONMENT LOCKED STATE ── */
.env-locked-card{
  background:rgba(10,12,24,0.9);
  border:1px solid rgba(255,184,48,0.2);
  border-radius:14px;
  padding:24px 20px;
  text-align:center;
  position:relative;
  overflow:hidden;
  cursor:pointer;
  transition:.25s;
}
.env-locked-card::before{
  content:'';position:absolute;inset:0;
  background:repeating-linear-gradient(45deg,transparent,transparent 20px,rgba(255,184,48,0.02) 20px,rgba(255,184,48,0.02) 21px);
  pointer-events:none;
}
.env-locked-card:hover{border-color:rgba(255,184,48,0.5);box-shadow:0 0 30px rgba(255,184,48,0.1)}
.env-locked-icon{font-size:32px;margin-bottom:10px;animation:lockBounce 3s ease infinite}
@keyframes lockBounce{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
.env-locked-name{font-size:15px;font-weight:700;color:var(--text2);margin-bottom:4px}
.env-locked-hint{font-size:11px;color:var(--amber);letter-spacing:.05em}

/* ── RULES SECTION ── */
.rules-section-immersive{
  background:rgba(0,212,170,0.04);
  border:1px solid rgba(0,212,170,0.15);
  border-radius:14px;
  padding:18px;
  margin-bottom:16px;
}
.rules-list-immersive{list-style:none;padding:0;margin:0}
.rules-list-immersive li{
  display:flex;align-items:flex-start;gap:10px;
  padding:8px 0;
  border-bottom:1px solid rgba(0,212,170,0.08);
  font-size:13px;color:var(--text2);line-height:1.5;
}
.rules-list-immersive li:last-child{border-bottom:none}
.rules-list-immersive li::before{
  content:'◈';color:var(--teal);font-size:10px;
  flex-shrink:0;margin-top:4px;
}

/* ── LINKS SECTION IMMERSIVE ── */
.links-grid-immersive{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:8px}
.link-card-immersive{
  background:rgba(13,17,32,0.9);
  border:1px solid var(--border);
  border-radius:12px;
  padding:12px 14px;
  display:flex;align-items:center;gap:10px;
  text-decoration:none;
  transition:.2s;
  cursor:pointer;
}
.link-card-immersive:hover{border-color:rgba(0,212,170,0.4);background:rgba(0,212,170,0.05);transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,212,170,0.1)}
.link-card-icon{font-size:20px;flex-shrink:0}
.link-card-label{font-size:12px;font-weight:600;color:var(--text);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.link-card-arrow{color:var(--teal);font-size:14px;flex-shrink:0}

/* ── RANKING IMMERSIVE ── */
.rank-immersive{
  display:flex;align-items:center;gap:6px;
  background:rgba(124,111,255,0.08);border:1px solid rgba(124,111,255,0.2);
  border-radius:20px;padding:4px 12px;font-size:11px;color:var(--purple);font-weight:700;
}

/* ── PLAYER TOPBAR IMMERSIVE ── */
.player-topbar-avatar{width:32px;height:32px;border-radius:50%;overflow:hidden;border:2px solid rgba(124,111,255,0.4);flex-shrink:0}
.player-nav-pill{
  display:flex;align-items:center;gap:4px;background:rgba(0,212,170,0.08);
  border:1px solid rgba(0,212,170,0.2);border-radius:20px;padding:4px 12px;
  font-size:11px;color:var(--teal);font-weight:700;cursor:default;
}

/* ── SECTION PANELS ── */
.player-panel{
  background:rgba(13,17,32,0.85);
  border:1px solid var(--border);
  border-radius:16px;
  padding:18px;
  margin-bottom:12px;
  backdrop-filter:blur(4px);
}
.player-panel-title{
  font-size:10px;font-weight:800;letter-spacing:.2em;text-transform:uppercase;
  color:var(--text3);margin-bottom:14px;display:flex;align-items:center;gap:8px;
}
.player-panel-title .panel-accent{color:var(--purple)}
.player-panel-title .panel-accent.teal{color:var(--teal)}
.player-panel-title .panel-accent.amber{color:var(--amber)}

/* ── SIDEBAR PLAYER MINI CARD ── */
.sidebar-player-mini{
  background:linear-gradient(135deg,rgba(26,21,64,0.8),rgba(13,17,32,0.8));
  border:1px solid rgba(124,111,255,0.25);
  border-radius:10px;padding:12px;margin-bottom:16px;
  display:flex;align-items:center;gap:10px;
}
.sidebar-player-xp-mini{font-size:16px;font-weight:800;color:var(--purple);text-shadow:0 0 12px rgba(124,111,255,0.4)}

/* ── ENV ITEM PLAYER (unlocked glow) ── */
.cat-item.env-unlocked{
  border-color:rgba(0,212,170,0.3);
  background:rgba(0,212,170,0.06);
  box-shadow:inset 0 0 12px rgba(0,212,170,0.05);
}
.cat-item.env-locked-visual{
  opacity:.7;
}

/* ── EMPTY STATE ── */
.empty-missions{text-align:center;padding:40px 20px;color:var(--text3);font-size:13px}
.empty-missions-icon{font-size:36px;margin-bottom:12px;opacity:.5}

/* ── DAILY RESET TAG ── */
.daily-tag{display:inline-flex;align-items:center;gap:3px;font-size:9px;color:var(--blue);background:rgba(77,166,255,0.1);border:1px solid rgba(77,166,255,0.2);border-radius:20px;padding:1px 6px;letter-spacing:.08em}

/* ══════════════════════════════════════════
   GLOBAL ENVIRONMENT PANEL (Player Mode)
══════════════════════════════════════════ */
.env-global-panel{
  background:linear-gradient(135deg,rgba(0,212,170,0.07),rgba(13,17,32,0.9));
  border:1px solid rgba(0,212,170,0.35);
  border-radius:18px;
  padding:20px;
  margin-bottom:16px;
  position:relative;
  overflow:hidden;
  backdrop-filter:blur(6px);
}
.env-global-panel::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--teal2),var(--purple2),var(--teal2));
  opacity:.8;
}
.env-global-header{
  display:flex;align-items:center;gap:10px;margin-bottom:18px;
}
.env-global-icon{
  width:36px;height:36px;border-radius:10px;
  background:rgba(0,212,170,0.15);border:1px solid rgba(0,212,170,0.3);
  display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;
}
.env-global-title{
  font-size:11px;font-weight:800;letter-spacing:.22em;text-transform:uppercase;
  color:var(--teal);flex:1;
}
.env-global-env-name{
  font-size:11px;color:var(--text3);
  background:rgba(255,255,255,0.05);border:1px solid var(--border);
  border-radius:20px;padding:2px 10px;
}
.env-section-divider{
  font-size:9px;font-weight:800;letter-spacing:.2em;text-transform:uppercase;
  color:var(--text3);margin:0 0 10px;display:flex;align-items:center;gap:8px;
}
.env-section-divider::after{
  content:'';flex:1;height:1px;background:var(--border);
}
/* Rules list */
.env-rules-list{
  list-style:none;padding:0;margin:0 0 16px;
}
.env-rules-list li{
  display:flex;align-items:flex-start;gap:10px;
  padding:9px 0;border-bottom:1px solid rgba(0,212,170,0.08);
  font-size:13px;color:var(--text2);line-height:1.5;
}
.env-rules-list li:last-child{border-bottom:none;padding-bottom:0}
.env-rules-list li::before{
  content:'◈';color:var(--teal);font-size:11px;flex-shrink:0;margin-top:3px;
}
.env-rules-empty{
  font-size:12px;color:var(--text3);padding:6px 0 14px;
  font-style:italic;
}
/* Links grid */
.env-links-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px;
}
.env-link-card{
  background:rgba(13,17,32,0.9);border:1px solid var(--border);border-radius:12px;
  padding:11px 13px;display:flex;align-items:center;gap:9px;
  text-decoration:none;transition:.2s;cursor:pointer;
}
.env-link-card:hover{
  border-color:rgba(0,212,170,0.45);background:rgba(0,212,170,0.06);
  transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,212,170,0.12);
}
.env-link-card-icon{font-size:18px;flex-shrink:0}
.env-link-card-label{font-size:12px;font-weight:600;color:var(--text);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.env-link-card-arrow{color:var(--teal);font-size:13px;flex-shrink:0}
.env-links-empty{font-size:12px;color:var(--text3);font-style:italic}

</style>
</head>
<body>
<h2 class="sr-only">Life as Game — a real-time gamified Life Operating System</h2>

<!-- ══ BOOT LOADER — hidden once DB.init() completes ══ -->
<div id="boot-screen" style="position:fixed;inset:0;background:#07090f;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:9999">
  <div style="font-size:28px;font-weight:900;color:#fff;letter-spacing:.12em;text-transform:uppercase">LIFE <span style="color:#00d4aa">AS</span> GAME</div>
  <div style="display:flex;align-items:center;gap:10px;font-size:12px;color:#5a6480;letter-spacing:.15em;text-transform:uppercase">
    <span id="boot-dot" style="display:inline-block;width:6px;height:6px;border-radius:50%;background:#00d4aa;animation:livePulse 1s ease infinite"></span>
    <span id="boot-msg">Connecting…</span>
  </div>
</div>

<!-- ══ ENTRY SCREEN ══ -->
<div id="entry-screen">
  <div class="entry-box">
    <div class="entry-logo">LIFE <span>AS</span> GAME</div>
    <div class="entry-tagline">Live · Level · Conquer</div>
    <div class="entry-btns">
      <button class="entry-btn entry-btn-player" onclick="Entry.show('player-login')">
        <span class="entry-btn-icon">◉</span>
        <span class="entry-btn-label">
          Player
          <span class="entry-btn-sub">Enter your arena</span>
        </span>
        <span>→</span>
      </button>
      <button class="entry-btn entry-btn-owner" onclick="Entry.show('owner-login')">
        <span class="entry-btn-icon">⚡</span>
        <span class="entry-btn-label">
          Owner
          <span class="entry-btn-sub">Full system access</span>
        </span>
        <span>→</span>
      </button>
    </div>
  </div>
</div>

<!-- ══ PLAYER LOGIN PANEL ══ -->
<div id="player-login-screen" style="display:none;position:fixed;inset:0;align-items:center;justify-content:center;background:var(--bg);z-index:100">
  <div class="login-panel">
    <button class="lp-back" onclick="Entry.show('entry')">← Back</button>
    <div class="lp-icon">◉</div>
    <div class="lp-title">Player Login</div>
    <div class="lp-sub">Select your environment and name</div>

    <label class="lp-label">Environment</label>
    <select id="lp-env-select" class="lp-select" onchange="Entry.onEnvChange()"></select>

    <label class="lp-label">Your Name</label>
    <select id="lp-player-select" class="lp-select"></select>

    <label class="lp-label">Environment Password <span style="font-weight:400;opacity:.5">(leave blank if none)</span></label>
    <input id="lp-player-pw" type="password" class="lp-input" placeholder="Enter environment password..."
      autocomplete="off" onkeydown="if(event.key==='Enter')Entry.submitPlayer()">
    <div style="font-size:11px;color:var(--text3);margin-top:-8px;margin-bottom:10px;padding-left:2px">🔒 Environment access only — does not unlock Personal Notes</div>

    <div id="lp-player-err" class="lp-err"></div>
    <button class="lp-submit lp-submit-player" onclick="Entry.submitPlayer()">Enter Arena →</button>
  </div>
</div>

<!-- ══ OWNER LOGIN PANEL ══ -->
<div id="owner-login-screen" style="display:none;position:fixed;inset:0;align-items:center;justify-content:center;background:var(--bg);z-index:100">
  <div class="login-panel">
    <button class="lp-back" onclick="Entry.show('entry')">← Back</button>
    <div class="lp-icon">⚡</div>
    <div class="lp-title">Owner Access</div>

<div class="app" id="app" style="display:none"></div>

  <!-- populated by JS after login -->
