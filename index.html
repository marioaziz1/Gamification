function renderViewSafe(viewId, content) {
  const view = VIEW_REGISTRY[viewId] || VIEW_REGISTRY['dashboard'];
  try {
    view.render(content);
  } catch (err) {
    console.error(`[VIEW ERROR] "${viewId}" crashed:`, err);
    content.innerHTML = `
      <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:300px;gap:16px;color:var(--text3)">
        <div style="font-size:40px;opacity:.4">⚠️</div>
        <div style="font-size:16px;font-weight:700;color:var(--text2)">${view.label} — Render Error</div>
        <div style="font-size:12px;color:var(--text3);max-width:400px;text-align:center">
          Something went wrong loading this section. Your data is safe.
        </div>
        <div style="font-size:11px;color:var(--red);font-family:monospace;background:rgba(255,77,106,0.08);border:1px solid rgba(255,77,106,0.2);border-radius:6px;padding:8px 12px;max-width:480px;word-break:break-all">
          ${String(err).replace(/</g,'&lt;')}
        </div>
        <button class="btn sm primary" onclick="navigate('dashboard')">← Back to Dashboard</button>
      </div>`;
  }
}

// ========== RENDER ==========
// This function is the single entry point for all UI updates.
// It uses a local _crashed flag to prevent any possibility of re-entrant
// or recursive calls. The outer try-catch is self-contained — no wrapper
// function, no aliasing, no recursion risk.
function render() {
  const app = document.getElementById('app');
  if (!app) { console.error('[RENDER] #app element not found'); return; }

  try {
    try { computeTeamXP(); } catch(e) { console.error('[RENDER] computeTeamXP:', e); }

    // ── READ-ONLY MODE: manage body class based on role ──
    if (auth.isOwner()) {
      document.body.classList.remove('player-readonly-mode');
    }
    // Player mode class is applied inside renderDashboard after auth check

    app.innerHTML = '';

    // ── Topbar ──
    const topbar = el('div','topbar');
    const unlockedPlayerTopbar = playerAuth._unlockedPlayerId
      ? state.players.find(x => x.id === playerAuth._unlockedPlayerId)
      : null;
    topbar.innerHTML = `
      <div class="logo">
        <div class="logo-mark">🎮</div>
        <div class="logo-text">LIFE <span>AS</span> GAME</div>
      </div>
      <span class="role-badge ${auth.role}">${auth.isOwner()?'⚡ OWNER':'◉ PLAYER'}</span>
      ${!auth.isOwner() ? `<span class="view-only-pill">👁 View Only</span>` : ''}
      ${!auth.isOwner() && unlockedPlayerTopbar ? `
      <div class="player-nav-pill">
        ${renderAvatarHtml(unlockedPlayerTopbar,20,'font-size:9px!important;flex-shrink:0')}
        <span>${unlockedPlayerTopbar.name}</span>
      </div>` : ''}
      <div class="nav">
        ${VALID_VIEWS.filter(v=>auth.isOwner()||!['activity','settings'].includes(v)).map(v=>`<button class="nav-btn ${state.currentView===v?'active':''}" onclick="navigate('${v}')">${VIEW_REGISTRY[v].label}</button>`).join('')}
      </div>
      <div style="display:flex;gap:6px;margin-left:8px">
        ${auth.isOwner()
          ? `<button class="btn sm danger" onclick="logout()" style="font-size:11px">Logout</button>`
          : `<button class="btn sm primary" onclick="openLoginModal()" style="font-size:11px">Owner Login</button>`}
      </div>`;
    app.appendChild(topbar);

    // ── Main layout ──
    const main = el('div','main');

    try { main.appendChild(renderSidebar()); }
    catch(e) {
      console.error('[RENDER] Sidebar error:', e);
      main.appendChild(el('div','sidebar')); // empty sidebar fallback
    }

    const content = el('div','content');
    content.style.animation = 'pageIn .18s ease';

    // Validate current view; reset to dashboard if invalid
    if (!VALID_VIEWS.includes(state.currentView)) {
      console.warn(`[RENDER] Unknown view "${state.currentView}" → dashboard`);
      state.currentView = 'dashboard';
    }
    // Player mode: activity and settings views are hidden — redirect to dashboard
    if (!auth.isOwner() && ['activity','settings'].includes(state.currentView)) {
      state.currentView = 'dashboard';
    }

    // Safe per-view render (each view is individually try-caught inside renderViewSafe)
    renderViewSafe(state.currentView, content);

    main.appendChild(content);
    app.appendChild(main);

    // ── Modal ──
    try {
      if (state.modal) app.appendChild(renderModal());
    } catch(e) {
      console.error('[RENDER] Modal error:', e);
      state.modal = null;
    }

    // ── Toast ──
    if (state.toast) {
      const t = el('div','toast');
      t.textContent = state.toast;
      app.appendChild(t);
    }

    // ── Debug view indicator ──
    const dbg = document.createElement('div');
    dbg.style.cssText = 'position:fixed;bottom:8px;right:8px;font-size:9px;color:rgba(255,255,255,0.18);letter-spacing:.08em;pointer-events:none;z-index:9999';
    dbg.textContent = `view:${state.currentView}`;
    app.appendChild(dbg);

    // ── [MOBILE] Update bottom nav on every render ──
    try { renderMobileBottomNav(); } catch(e) { console.warn('[MOBILE] bottom nav render error:', e); }

  } catch(criticalErr) {
    // Last-resort fallback — no recursion, just static HTML
    console.error('[RENDER CRITICAL] Complete render failure:', criticalErr);
    app.innerHTML = `
      <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;
                  min-height:100vh;gap:20px;padding:40px;background:#07090f;color:#e8ecf4">
        <div style="font-size:48px">🛡️</div>
        <div style="font-size:20px;font-weight:800">Dashboard Protected</div>
        <div style="font-size:13px;color:#8b95b0;max-width:400px;text-align:center;line-height:1.6">
          A critical error was caught. Your data is safe. Click below to recover.
        </div>
        <div style="font-size:11px;font-family:monospace;color:#ff4d6a;
                    background:rgba(255,77,106,0.08);border:1px solid rgba(255,77,106,0.2);
                    border-radius:6px;padding:10px 16px;max-width:500px;word-break:break-all">
          ${String(criticalErr).replace(/</g,'&lt;')}
        </div>
        <button onclick="state.currentView='dashboard';state.modal=null;render()"
                style="padding:10px 24px;border-radius:8px;border:1px solid #7c6fff;
                       background:rgba(124,111,255,0.15);color:#7c6fff;
                       font-size:14px;font-weight:700;cursor:pointer">
          ↺ Reset to Dashboard
        </button>
      </div>`;
  }
}

function renderDashboard(content) {
  const cat=state.categories[state.currentCat];
  if(!cat) { content.innerHTML='<div style="color:var(--text3);padding:20px">No category selected.</div>'; return; }

  // ── PLAYER MODE: immersive view ──
  if(!auth.isOwner()) {
    renderPlayerImmersiveDashboard(content, cat);
    return;
  }

  // ── OWNER MODE: full admin view (unchanged) ──
  const teams=catTeams(cat.id);
  const players=catPlayers(cat.id);
  const tasks = visibleTasksFor(cat.id, state.activePlayerId || null);
  const totalXP=players.reduce((s,p)=>s+p.xp,0);
  const avgComp=players.length?Math.round(players.reduce((s,p)=>s+p.completionRate,0)/players.length):0;
  const todayDone=state.activityLog.filter(l=>l.date.includes('Today')&&l.status==='done').length;

  state.activeEvents.filter(e=>e.endsAt>Date.now()).forEach(e=>{
    content.appendChild(html('event-banner',`
      <span class="event-icon">${e.icon}</span>
      <div><div class="event-name">${e.name}</div><div class="event-desc">${e.desc}</div></div>
      <div class="event-timer">⏱ ${fmtTime(e.endsAt-Date.now())}</div>
      <button class="event-x" onclick="dismissEvent(${e.id})">✕</button>`));
  });

  const catChallenges=state.challenges.filter(c=>c.catId===cat.id);
  if(catChallenges.length) {
    const cc=el('div','card');
    cc.style.marginBottom='14px';
    cc.innerHTML=`<div class="card-title">⚔ Active Challenges</div>`;
    catChallenges.forEach(ch=>{
      const isPvp=ch.type==='pvp';
      const a=isPvp?state.players.find(p=>p.id===ch.aId):state.teams.find(t=>t.id===ch.aId);
      const b=isPvp?state.players.find(p=>p.id===ch.bId):state.teams.find(t=>t.id===ch.bId);
      if(!a||!b) return;
      const aScore=(a.xp||a.totalXP||0)-(ch.startXpA||0);
      const bScore=(b.xp||b.totalXP||0)-(ch.startXpB||0);
      const total=Math.max(aScore+bScore,1);
      cc.appendChild(html('challenge-card',`
        <div style="flex:1">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
            <span class="challenge-vs">${isPvp?'PvP':'Team'}</span>
            <b style="color:var(--text)">${a.name}</b><span style="color:var(--text3)">vs</span><b style="color:var(--text)">${b.name}</b>
          </div>
          <div style="display:grid;grid-template-columns:1fr auto 1fr;gap:4px;align-items:center;font-size:12px">
            <div>
              <div style="color:var(--text2);margin-bottom:2px">${a.name}</div>
              <div class="xp-bar-wrap"><div class="xp-bar" style="width:${Math.round((aScore/total)*100)}%;background:var(--purple)"></div></div>
              <span style="color:var(--purple);font-weight:700">+${aScore} XP</span>
            </div>
            <div style="color:var(--text3);font-size:16px;text-align:center">⚡</div>
            <div>
              <div style="color:var(--text2);margin-bottom:2px">${b.name}</div>
              <div class="xp-bar-wrap"><div class="xp-bar" style="width:${Math.round((bScore/total)*100)}%;background:var(--red)"></div></div>
              <span style="color:var(--red);font-weight:700">+${bScore} XP</span>
            </div>
          </div>
        </div>
        <button class="btn sm danger" onclick="state.challenges=state.challenges.filter(c=>c.id!==${ch.id});render()" style="margin-left:8px;align-self:flex-start">End</button>`));
    });
    content.appendChild(cc);
  }

  content.appendChild(html('section-header',`
    <div>
      <div class="section-title">${cat.name}${cat.environmentPassword?` <span style="font-size:12px;color:var(--amber);margin-left:6px">🔒</span>`:''}</div>
      <div style="font-size:12px;color:var(--text3);margin-top:2px">${cat.duration} · ${teams.length} teams · ${players.length} players</div>
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
      ${auth.isLeader()?`<button class="btn sm" onclick="openModal('addTeam')">+ Team</button>`:`<span class="lock-wrap"><button class="btn sm locked">+ Team</button><span class="lock-tip">Requires Owner Access</span></span>`}
      ${auth.isLeader()?`<button class="btn sm" onclick="openModal('addPlayer')">+ Player</button>`:`<span class="lock-wrap"><button class="btn sm locked">+ Player</button><span class="lock-tip">Requires Owner Access</span></span>`}
      ${auth.isLeader()?`<button class="btn sm primary" onclick="openModal('addTask')">+ Task</button>`:`<span class="lock-wrap"><button class="btn sm primary locked">+ Task</button><span class="lock-tip">Requires Owner Access</span></span>`}
      ${auth.isOwner()?`<button class="btn sm" style="border-color:rgba(255,184,48,0.4);color:var(--amber);background:rgba(255,184,48,0.07)" onclick="openModal('changeEnvPassword',${state.currentCat})">🔐 ${cat.environmentPassword?'Change':'Set'} Password</button>`:''}
    </div>`));

  const mult=getActiveMultiplier();
  const stats=el('div','grid4');
  stats.innerHTML=`
    <div class="stat purple"><div class="stat-label">Total XP</div><div class="stat-val">${totalXP.toLocaleString()}</div><div class="stat-sub">all players</div></div>
    <div class="stat teal"><div class="stat-label">Avg Completion</div><div class="stat-val">${avgComp}%</div><div class="stat-sub">today</div></div>
    <div class="stat amber"><div class="stat-label">Tasks Done</div><div class="stat-val">${todayDone}</div><div class="stat-sub">today</div></div>
    <div class="stat ${mult>1?'red':''}"><div class="stat-label">XP Multiplier</div><div class="stat-val">${mult}×</div><div class="stat-sub">${mult>1?'ACTIVE':'normal'}</div></div>`;
  content.appendChild(stats);

  const tabs=el('div','tabs');
  tabs.innerHTML=['teams','players','tasks'].map(t=>`<button class="tab ${state.tab===t?'active':''}" onclick="setTab('${t}')">${t[0].toUpperCase()+t.slice(1)}</button>`).join('');
  content.appendChild(tabs);

  if(state.tab==='teams') renderTeamsTab(content,teams,cat);
  else if(state.tab==='players') renderPlayersTab(content,players);
  else if(state.tab==='tasks') renderTasksTab(content,tasks);
}

// ══════════════════════════════════════════
// PLAYER IMMERSIVE DASHBOARD
// ══════════════════════════════════════════
function renderPlayerImmersiveDashboard(content, cat) {
  const unlockedPlayerId = playerAuth._unlockedPlayerId;
  const p = unlockedPlayerId ? state.players.find(x => x.id === unlockedPlayerId) : null;
  const canEnter = envAccess.canEnter(cat.id);

  // ── Active event banners (visible to players too) ──
  state.activeEvents.filter(e=>e.endsAt>Date.now()).forEach(e=>{
    content.appendChild(html('event-banner',`
      <span class="event-icon">${e.icon}</span>
      <div><div class="event-name">${e.name}</div><div class="event-desc">${e.desc}</div></div>
      <div class="event-timer">⏱ ${fmtTime(e.endsAt-Date.now())}</div>`));

  const wrap = el('div', 'player-immersive-wrap');

  // ── GLOBAL ENVIRONMENT PANEL — always visible, no auth restriction ──
  const globalRules = state.environment?.rules || [];
  const globalLinks = state.environment?.links || [];
  if (globalRules.length > 0 || globalLinks.length > 0) {
    const envGlobalPanel = el('div', 'env-global-panel');
    envGlobalPanel.innerHTML = `
      <div class="env-global-header">
        <div class="env-global-icon">🌍</div>
        <div class="env-global-title">Environment</div>
        <div class="env-global-env-name">${cat.name}</div>
      </div>
      ${globalRules.length > 0 ? `
        <div class="env-section-divider">📋 Environment Rules</div>
        <ul class="env-rules-list">
          ${globalRules.map(r => `<li>${r.text.replace(/</g,'&lt;')}</li>`).join('')}

        <div class="env-section-divider" style="margin-top:${globalRules.length?'0':'0'}">🔗 Environment Links</div>
        <div class="env-links-grid">
          ${globalLinks.map(l => `
            <a class="env-link-card" href="${l.url.replace(/"/g,'&quot;')}" target="_blank" rel="noopener noreferrer">
              <span class="env-link-card-icon">${l.icon || '🔗'}</span>
              <span class="env-link-card-label">${l.label.replace(/</g,'&lt;')}</span>
              <span class="env-link-card-arrow">↗</span>
            </a>`).join('')}
        </div>
      ` : ''}`;
    wrap.appendChild(envGlobalPanel);
  }
  if(!p) {
    // No player authenticated — show environment selection cards
    document.body.classList.add('player-readonly-mode');
    const envHeader = el('div','');
    envHeader.innerHTML = `
      <div class="section-label-immersive" style="margin-bottom:16px">
        <span>Mission Environments</span>
      </div>`;
    wrap.appendChild(envHeader);

    const envGrid = el('div','');
    envGrid.style.cssText = 'display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-bottom:24px';
    state.categories.forEach((c, i) => {
      const isLocked = c.environmentPassword && c.environmentPassword.trim() !== '' && !envAccess.canEnter(c.id);
      const catTeamsArr = catTeams(c.id);
      const catPlayersArr = catPlayers(c.id);
      const card = el('div', isLocked ? 'env-locked-card' : 'card');
      if(!isLocked) {
        card.style.cssText = 'border-radius:14px;padding:20px;cursor:pointer;transition:.25s;position:relative;overflow:hidden';
        card.onclick = () => setCat(i);
        card.innerHTML = `
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">
            <span class="mission-status ${c.status==='closed'?'closed':''}">
              <span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:${c.status==='active'?'var(--teal)':'var(--text3)'};margin-right:6px"></span>
              ${c.status}
            </span>
          </div>
          <div style="font-size:16px;font-weight:800;color:#fff;margin-bottom:4px">${c.name}</div>
          <div style="font-size:11px;color:var(--text3);margin-bottom:12px">${c.duration}</div>
          <div style="display:flex;gap:10px;font-size:11px;color:var(--text2)">
            <span>👥 ${catPlayersArr.length} players</span>
            <span>⚔ ${catTeamsArr.length} teams</span>
          </div>
          <div style="position:absolute;bottom:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--purple2),var(--teal2))"></div>`;
      } else {
        card.onclick = () => setCat(i);
        card.innerHTML = `
          <div class="env-locked-icon">🔒</div>
          <div class="env-locked-name">${c.name}</div>
          <div class="env-locked-hint">Click to enter &rarr;</div>`;
      }
      envGrid.appendChild(card);
    });
    wrap.appendChild(envGrid);

    // Show leaderboard teaser for current cat
    const players = catPlayers(cat.id);
    const ranked = [...players].sort((a,b)=>b.xp-a.xp).slice(0,5);
    if(ranked.length) {
      const lbPanel = el('div','player-panel');
      lbPanel.innerHTML = `
        <div class="player-panel-title"><span class="panel-accent teal">◈</span> Top Warriors — ${cat.name}</div>
        ${ranked.map((px,i)=>{
          const info=getLevelInfo(px.xp);
          const medals=['🥇','🥈','🥉'];
          return `<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)">
            <span style="font-size:16px;min-width:24px;text-align:center">${medals[i]||'#'+(i+1)}</span>
            ${renderAvatarHtml(px,32)}
            <div style="flex:1">
              <div style="font-size:13px;font-weight:600;color:var(--text)">${px.name}</div>
              <span class="level-badge ${info.cls}" style="font-size:10px;padding:1px 6px">Lv${info.level} · ${info.name}</span>
            </div>
            <span style="font-size:15px;font-weight:800;color:var(--purple)">${px.xp.toLocaleString()}</span>
          </div>`;
        }).join('')}`;
      wrap.appendChild(lbPanel);
    }

    content.appendChild(wrap);
    return;
  }

  // ── Authenticated player view ──
  const team = playerTeam(p.id);
  const info = getLevelInfo(p.xp);
  const catObj = state.categories.find(c => catTeams(c.id).some(t => t.id === p.teamId));
  const catId = catObj?.id;
  const myTasks = catId ? visibleTasksFor(catId, p.id) : [];
  const rankPos = catId ? rankedPlayers(catId).findIndex(x=>x.id===p.id)+1 : 0;
  // links/roles still fetched for backward compat but no longer rendered separately
  const roles = catObj?.roles || [];
  const mult = getActiveMultiplier();

  // ── ENFORCE READ-ONLY MODE on body ──
  document.body.classList.add('player-readonly-mode');

  // ── READ-ONLY BANNER ──
  const roBanner = el('div','readonly-banner');
  roBanner.innerHTML = `
    <span class="readonly-lock-icon">👁</span>
    <span class="readonly-banner-dot"></span>
    <span style="font-weight:700;letter-spacing:.08em;text-transform:uppercase;font-size:10px;color:rgba(124,111,255,0.7)">View Only</span>
    <span style="opacity:.5;margin:0 6px">·</span>
    <span>Task statuses are updated by the Owner. This screen is for tracking and observation only.</span>
  `;
  wrap.appendChild(roBanner);

  // ── HERO SECTION ──
  const hero = el('div','player-hero-immersive');
  hero.innerHTML = `
    <div class="player-hero-top">
      <div class="player-hero-avatar-wrap">
        <div class="player-hero-avatar-ring">
          <div class="player-hero-avatar-inner">${p.avatarUrl
            ? `<img src="${p.avatarUrl}" style="width:100%;height:100%;object-fit:cover">`
            : `<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:${getAvatarColor(p.id)}22;color:${getAvatarColor(p.id)};font-size:26px;font-weight:800">${getPlayerInitials(p.name)}</div>`}
          </div>
        </div>
      </div>
      <div class="player-hero-info">
        <div class="player-hero-greeting">Welcome back</div>
        <div class="player-hero-name-big">${p.name}</div>
        <div class="player-hero-badges">
          <span class="level-badge ${info.cls}" style="font-size:12px;padding:4px 12px">Lv ${info.level} · ${info.name}</span>
          ${team?`<span style="font-size:11px;color:var(--text3)">⚔ ${team.name}</span>`:''}
          ${p.streak>0?`<span class="streak">🔥 ${p.streak}d</span>`:''}
          ${rankPos>0?`<div class="rank-immersive">🏆 Rank #${rankPos}</div>`:''}
          ${mult>1?`<span style="font-size:11px;background:rgba(255,184,48,0.15);border:1px solid rgba(255,184,48,0.3);border-radius:20px;padding:3px 10px;color:var(--amber)">⚡ ${mult}× XP Active</span>`:''}
        </div>
      </div>
      <div class="player-hero-xp-block">
        <div class="player-hero-xp-num">${p.xp.toLocaleString()}</div>
        <div class="player-hero-xp-unit">XP Earned</div>
      </div>
    </div>
    <div class="xp-progress-section">
      <div class="xp-progress-meta">
        <span>Level ${info.level} Progress</span>
        <span>${info.progress}%${info.nextXP?' · '+(info.nextXP-p.xp)+' XP to Lv'+(info.level+1):' · MAX LEVEL'}</span>
      </div>
      <div class="xp-bar-immersive">
        <div class="xp-bar-immersive-fill" style="width:0%" data-target="${info.progress}"></div>
      </div>
    </div>`;
  wrap.appendChild(hero);

  // Animate progress bar after render
  setTimeout(()=>{
    const fill = hero.querySelector('.xp-bar-immersive-fill');
    if(fill) fill.style.width = fill.dataset.target + '%';
  }, 80);

  // ── STATS ORBS ──
  const orbs = el('div','player-stats-orbs');
  orbs.innerHTML = `
    <div class="stat-orb">
      <span class="stat-orb-icon">💎</span>
      <div class="stat-orb-val">${p.xp.toLocaleString()}</div>
      <div class="stat-orb-label">Total XP</div>
    </div>
    <div class="stat-orb teal-orb">
      <span class="stat-orb-icon">✅</span>
      <div class="stat-orb-val">${p.completionRate}%</div>
      <div class="stat-orb-label">Completion</div>
    </div>
    <div class="stat-orb amber-orb">
      <span class="stat-orb-icon">🔥</span>
      <div class="stat-orb-val">${p.streak>0?p.streak+'d':'—'}</div>
      <div class="stat-orb-label">Streak</div>
    </div>`;
  wrap.appendChild(orbs);

  // ── ACHIEVEMENTS ──
  if(p.achievements?.length) {
    const achPanel = el('div','player-panel');
    achPanel.style.marginBottom = '16px';
    achPanel.innerHTML = `
      <div class="player-panel-title"><span class="panel-accent amber">★</span> Achievements Earned</div>
      <div class="ach-row-immersive">
        ${p.achievements.map(id=>{
          const a = ACHIEVEMENTS.find(x=>x.id===id);
          return a ? `<div class="ach-chip" title="${a.desc}">
            <span>${a.icon}</span><span>${a.name}</span>
          </div>` : '';
        }).join('')}
      </div>`;
    wrap.appendChild(achPanel);
  }

  // ── TODAY'S TASK SUMMARY BANNER ──
  if (myTasks.length > 0) {
    const todayStr = new Date().toLocaleDateString('en', { weekday:'long', year:'numeric', month:'long', day:'numeric' });
    const allWithStatus = myTasks.map(t => ({ ...t, ...getPlayerCompletion(t.id, p.id) }));
    const totalDone = allWithStatus.filter(t=>t.status==='done').length;
    const totalMissed = allWithStatus.filter(t=>t.status==='missed').length;
    const totalPending = allWithStatus.filter(t=>t.status==='pending').length;
    const overallPct = myTasks.length > 0 ? Math.round((totalDone/myTasks.length)*100) : 0;
    const summaryBanner = el('div','');
    summaryBanner.innerHTML = `
      <div style="background:linear-gradient(135deg,rgba(0,212,170,0.07),rgba(13,17,32,0.9));border:1px solid rgba(0,212,170,0.25);border-radius:16px;padding:16px 20px;margin-bottom:14px;position:relative;overflow:hidden">
        <div style="position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--teal2),var(--purple2))"></div>
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;gap:10px;flex-wrap:wrap">
          <div>
            <div style="font-size:10px;font-weight:800;color:var(--teal);letter-spacing:.2em;text-transform:uppercase;margin-bottom:2px">📅 Today's Mission Report</div>
            <div style="font-size:12px;color:var(--text3)">${todayStr}</div>
          </div>
          <div style="display:flex;align-items:center;gap:6px">
            <div style="width:80px;height:6px;border-radius:3px;background:rgba(255,255,255,0.06);overflow:hidden">
              <div style="height:100%;width:${overallPct}%;background:linear-gradient(90deg,var(--purple2),var(--teal));border-radius:3px;transition:width .6s ease"></div>
            </div>
            <span style="font-size:12px;font-weight:800;color:${overallPct===100?'var(--green)':overallPct>50?'var(--teal)':'var(--text3)'}">${overallPct}%</span>
          </div>
        </div>
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px">
          <div style="text-align:center;padding:10px 6px;border-radius:10px;background:rgba(0,53,26,0.5);border:1px solid rgba(77,255,145,0.25)">
            <div style="font-size:24px;font-weight:900;color:var(--green);line-height:1">${totalDone}</div>
            <div style="font-size:10px;color:var(--green);opacity:.85;margin-top:4px;letter-spacing:.06em">✅ Completed</div>
          </div>
          <div style="text-align:center;padding:10px 6px;border-radius:10px;background:rgba(53,0,16,0.5);border:1px solid rgba(255,77,106,0.25)">
            <div style="font-size:24px;font-weight:900;color:var(--red);line-height:1">${totalMissed}</div>
            <div style="font-size:10px;color:var(--red);opacity:.85;margin-top:4px;letter-spacing:.06em">❌ Missed</div>
          </div>
          <div style="text-align:center;padding:10px 6px;border-radius:10px;background:rgba(26,32,53,0.5);border:1px solid var(--border)">
            <div style="font-size:24px;font-weight:900;color:var(--text3);line-height:1">${totalPending}</div>
            <div style="font-size:10px;color:var(--text3);opacity:.85;margin-top:4px;letter-spacing:.06em">⏳ Pending</div>
          </div>
        </div>
      </div>`;
    wrap.appendChild(summaryBanner);
  }

  // ── TASK 2: GROUPED TASKS (Global → Team → Personal) ──
  // Split myTasks into 3 groups before rendering — no data mutation, filter only
  const globalTasks = myTasks.filter(t => {
    if (t.targetScope) return t.targetScope === 'all';
    return t.type === 'general' && t.assignedTo === 'all';
  });
  const teamTasks = myTasks.filter(t => {
    if (t.targetScope) return t.targetScope === 'team';
    return t.type === 'team' || t.type === 'team-all';
  });
  const personalTasks = myTasks.filter(t => {
    if (t.targetScope) return t.targetScope === 'player';
    return t.type === 'special';
  });

  // Helper: renders one task group as a READ-ONLY visual panel with status summary + clickable links
  const renderTaskGroup = (groupTasks, groupLabel, groupIcon, accentColor) => {
    if (!groupTasks.length) return;
    const tasksWithStatus = groupTasks.map(t => {
      const c = getPlayerCompletion(t.id, p.id);
      return { ...t, playerStatus: c.status, playerCompletedAt: c.completedAt };
    });
    const doneCount = tasksWithStatus.filter(t=>t.playerStatus==='done').length;
    const missedCount = tasksWithStatus.filter(t=>t.playerStatus==='missed').length;
    const pendingCount = tasksWithStatus.filter(t=>t.playerStatus==='pending').length;
    const totalCount = tasksWithStatus.length;
    const completionPct = totalCount > 0 ? Math.round((doneCount/totalCount)*100) : 0;

    const panel = el('div', 'player-panel player-panel-readonly-wrap');
    panel.style.marginBottom = '14px';

    // ── STATUS SUMMARY BOX ──
    const summaryBoxHtml = `
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px;padding:10px;background:rgba(7,9,15,0.6);border:1px solid rgba(255,255,255,0.06);border-radius:12px">
        <div style="text-align:center;padding:8px 4px;border-radius:8px;background:rgba(0,53,26,0.45);border:1px solid rgba(77,255,145,0.2)">
          <div style="font-size:20px;font-weight:900;color:var(--green);line-height:1">${doneCount}</div>
          <div style="font-size:9px;color:var(--green);letter-spacing:.08em;text-transform:uppercase;margin-top:3px;opacity:.85">✅ Completed</div>
        </div>
        <div style="text-align:center;padding:8px 4px;border-radius:8px;background:rgba(53,0,16,0.45);border:1px solid rgba(255,77,106,0.2)">
          <div style="font-size:20px;font-weight:900;color:var(--red);line-height:1">${missedCount}</div>
          <div style="font-size:9px;color:var(--red);letter-spacing:.08em;text-transform:uppercase;margin-top:3px;opacity:.85">❌ Missed</div>
        </div>
        <div style="text-align:center;padding:8px 4px;border-radius:8px;background:rgba(26,32,53,0.5);border:1px solid var(--border)">
          <div style="font-size:20px;font-weight:900;color:var(--text3);line-height:1">${pendingCount}</div>
          <div style="font-size:9px;color:var(--text3);letter-spacing:.08em;text-transform:uppercase;margin-top:3px;opacity:.85">⏳ Pending</div>
        </div>
      </div>`;

    const tasksHtml = tasksWithStatus.map(t => {
      const isDone = t.playerStatus === 'done';
      const isMissed = t.playerStatus === 'missed';
      const isLocked = t.locked || state.tasksLocked;
      const statusKey = isDone ? 'done' : isMissed ? 'missed' : 'active';
      const statusBadge = isDone
        ? `<span class="task-status-badge done">✅ Completed</span>`
        : isMissed
          ? `<span class="task-status-badge missed">❌ Missed</span>`
          : isLocked
            ? `<span class="task-status-badge pending">🔒 Locked</span>`
            : `<span class="task-status-badge pending">⏳ Pending</span>`;
      const DS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
      const recurringBadge = (t.recurring && Array.isArray(t.recurringDays) && t.recurringDays.length > 0)
        ? `<span style="display:inline-flex;align-items:center;gap:3px;padding:1px 6px;border-radius:20px;font-size:9px;font-weight:600;background:rgba(124,111,255,0.12);color:var(--purple);border:1px solid rgba(124,111,255,0.3)">🔁 ${t.recurringDays.map(d=>DS[d]).join('•')}</span>`
        : t.repeatDaily
          ? `<span style="display:inline-flex;align-items:center;gap:3px;padding:1px 6px;border-radius:20px;font-size:9px;font-weight:600;background:rgba(77,166,255,0.12);color:var(--blue);border:1px solid rgba(77,166,255,0.3)">🔁 Daily</span>`
          : '';
      // Clickable link button (pointer-events enabled just for the <a>)
      const linkBtn = t.taskLink
        ? `<a href="${t.taskLink.replace(/"/g,'&quot;')}" target="_blank" rel="noopener noreferrer"
             style="display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:8px;border:1px solid rgba(0,212,170,0.4);background:rgba(0,212,170,0.08);color:var(--teal);font-size:11px;font-weight:700;text-decoration:none;pointer-events:auto;cursor:pointer;transition:.15s;letter-spacing:.03em;flex-shrink:0;margin-top:6px"
             onmouseover="this.style.background='rgba(0,212,170,0.2)'" onmouseout="this.style.background='rgba(0,212,170,0.08)'">
             🔗 Open Assignment ↗
           </a>`
        : '';
      return `<div class="task-row-readonly status-${statusKey}" style="user-select:none;flex-wrap:wrap;gap:6px">
        <div style="display:flex;align-items:center;gap:8px;width:100%;flex-wrap:wrap;pointer-events:none">
          <span class="badge ${t.type}" style="font-size:10px;min-width:fit-content;flex-shrink:0">${t.type}</span>
          <span style="flex:1;font-size:13px;color:${isDone?'var(--text3)':isMissed?'rgba(255,77,106,0.7)':'var(--text)'};${isDone?'text-decoration:line-through':''}">${t.name}</span>
          <span style="font-size:12px;color:var(--amber);font-weight:700;flex-shrink:0">+${t.xpValue} XP</span>
          ${recurringBadge}
          ${statusBadge}
        </div>
        ${linkBtn ? `<div style="width:100%;pointer-events:auto">${linkBtn}</div>` : ''}
      </div>`;
    }).join('');

    panel.innerHTML = `
      <div class="player-panel-title" style="pointer-events:none;user-select:none">
        <span class="panel-accent" style="color:${accentColor}">${groupIcon}</span>
        ${groupLabel}
        <span style="font-size:11px;color:var(--text3);font-weight:400;text-transform:none;margin-left:6px">
          <span style="color:var(--green)">✓${doneCount}</span>
          ${missedCount>0?`<span style="color:var(--red);margin-left:4px">✗${missedCount}</span>`:''}
          <span style="margin-left:4px">/ ${totalCount}</span>
        </span>
        <div style="margin-left:auto;display:flex;align-items:center;gap:6px">
          <div style="width:60px;height:4px;border-radius:2px;background:rgba(255,255,255,0.06);overflow:hidden">
            <div style="height:100%;width:${completionPct}%;background:linear-gradient(90deg,var(--purple2),var(--teal));border-radius:2px;transition:width .5s ease"></div>
          </div>
          <span style="font-size:10px;color:var(--text3)">${completionPct}%</span>
        </div>
      </div>
      ${summaryBoxHtml}
      ${tasksHtml}`;
    wrap.appendChild(panel);
  };

  // Render in strict order: Global → Team → Personal
  renderTaskGroup(globalTasks,  '🌐 Global Tasks',   '🌐', 'var(--teal)');
  renderTaskGroup(teamTasks,    '👥 Team Tasks',     '👥', 'var(--blue)');
  renderTaskGroup(personalTasks,'🎯 Personal Tasks', '🎯', 'var(--purple)');

  // Show empty state only if truly no tasks at all
  if (!myTasks.length) {
    const noTasks = el('div','player-panel');
    noTasks.innerHTML = `<div style="color:var(--text3);font-size:13px;text-align:center;padding:10px">No active tasks assigned yet.</div>`;
    wrap.appendChild(noTasks);
  }

  // ── DAILY TIMELINE (Read-Only) ──
  // Shows historical task completion per day from the activity log
  {
    const DAY_NAMES = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    const DAY_SHORT = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    const todayDow = new Date().getDay();

    // Build a 7-day window (Mon–Sun or today-6 to today)
    const days = [];
    for (let i = 6; i >= 0; i--) {
      const d = (todayDow - i + 7) % 7;
      days.push({ dow: d, label: DAY_SHORT[d], isToday: i === 0 });
    }

    // For today: read directly from taskCompletions (authoritative)
    // For past days: fall back to activityLog (has historical entries)
    const myLogs = state.activityLog.filter(l => l.playerId === p.id && myTasks.map(t=>t.id).includes(l.taskId));

    const getLogsForDayLabel = (label, isToday) => {
      if (isToday) return myLogs.filter(l => typeof l.date === 'string' && l.date.toLowerCase().startsWith('today'));
      if (label === DAY_SHORT[(todayDow - 1 + 7) % 7]) return myLogs.filter(l => typeof l.date === 'string' && l.date.toLowerCase() === 'yesterday');
      return [];
    };

    const timelinePanel = el('div','daily-timeline-panel');
    timelinePanel.setAttribute('style','pointer-events:none;user-select:none');
    timelinePanel.innerHTML = `
      <div class="player-panel-title" style="margin-bottom:14px;pointer-events:none;user-select:none">
        <span class="panel-accent teal">📅</span> Daily Progress Timeline
        <span style="font-size:10px;color:var(--text3);font-weight:400;text-transform:none;margin-left:6px">Last 7 days · Read-only</span>
      </div>
      ${days.map(day => {
        let dayTasks = [];
        if (day.isToday) {
          // Use authoritative taskCompletions for today
          dayTasks = myTasks.map(t => {
            const c = getPlayerCompletion(t.id, p.id);
            return { name: t.name, status: c.status };
          });
        } else {
          const dayLogs = getLogsForDayLabel(day.label, day.isToday);
          const doneIds = new Set(dayLogs.filter(l=>l.status==='done'||l.status==='late').map(l=>l.taskId));
          const missedIds = new Set(dayLogs.filter(l=>l.status==='missed').map(l=>l.taskId));
          if (dayLogs.length > 0) {
            dayTasks = myTasks.map(t => ({
              name: t.name,
              status: doneIds.has(t.id) ? 'done' : missedIds.has(t.id) ? 'missed' : 'pending'
            }));
          } else {
            dayTasks = myTasks.map(t => ({ name: t.name, status: 'pending' }));
          }
        }

        const doneCount = dayTasks.filter(t=>t.status==='done').length;
        const pct = dayTasks.length > 0 ? Math.round((doneCount/dayTasks.length)*100) : 0;

        return `<div class="daily-day-row${day.isToday?' expanded':''}" style="pointer-events:none;user-select:none">
          <div class="daily-day-label${day.isToday?' today-label':''}">
            ${day.isToday?'<span style="width:6px;height:6px;border-radius:50%;background:var(--teal);box-shadow:0 0 6px var(--teal);flex-shrink:0;display:inline-block"></span>':'<span style="width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,0.08);flex-shrink:0;display:inline-block"></span>'}
            ${day.label}${day.isToday?' <span style="font-size:9px;opacity:.6">(today)</span>':''}
          </div>
          <div class="daily-day-tasks">
            ${dayTasks.map(t=>`<span class="daily-task-chip chip-${t.status}" title="${t.name}">
              ${t.status==='done'?'✅':t.status==='missed'?'❌':'⏳'}
              ${t.name.length>22?t.name.slice(0,20)+'…':t.name}
            </span>`).join('')}
            ${dayTasks.length===0?'<span style="font-size:11px;color:var(--text3)">No tasks</span>':''}
          </div>
          <div class="daily-day-progress">
            <div class="daily-progress-mini">
              <div class="daily-progress-mini-fill" style="width:${pct}%"></div>
            </div>
            <span style="font-size:10px;color:${pct===100?'var(--green)':pct>0?'var(--text3)':'rgba(255,77,106,0.5)'};font-weight:700;min-width:28px;text-align:right">${pct}%</span>
          </div>
        </div>`;
      }).join('')}`;
    wrap.appendChild(timelinePanel);
  }

  // ── TASK 3: ENVIRONMENT INFO — merged Rules + Links ──
  // Replaces the former separate "Environment Roles" and "Important Links" sections.
  // Each rule is rendered as a card; if links exist they appear directly under rules (contextually connected).
  // Links are NEVER rendered without rules above them (per spec).
  const envRules = catObj?.roles || [];           // roles array used as "rules" in this env
  const envLinks = catObj?.importantLinks || [];  // links paired contextually with rules
  // Renamed to avoid duplicate const with the unauthenticated branch above (same function scope)
  const envGlobalRules = state.environment?.rules || [];
  const envGlobalLinks = state.environment?.links || [];

  const hasEnvRules = envRules.length > 0;
  const hasGlobalRules = envGlobalRules.length > 0;
  const hasAnyLinks = envLinks.length > 0 || envGlobalLinks.length > 0;

  if (hasEnvRules || hasGlobalRules || (hasAnyLinks && (hasEnvRules || hasGlobalRules))) {
    const infoPanel = el('div', 'player-panel');
    infoPanel.style.marginBottom = '14px';

    // Build environment info rows: each rule gets its own row; links follow contextually
    let infoRows = '';

    // Global rules + global links (contextually connected)
    if (hasGlobalRules) {
      envGlobalRules.forEach((rule, idx) => {
        // Pair each rule with a link if available (contextual connection)
        const pairedLink = envGlobalLinks[idx] || null;
        infoRows += `
          <div style="padding:10px 12px;background:rgba(0,212,170,0.04);border:1px solid rgba(0,212,170,0.15);border-radius:10px;margin-bottom:8px">
            <div style="font-size:13px;color:var(--text);margin-bottom:${pairedLink?'10px':'0'}">${rule.text.replace(/</g,'&lt;')}</div>
            ${pairedLink ? `
              <div style="display:flex;align-items:center;justify-content:space-between;gap:10px;padding-top:8px;border-top:1px solid rgba(0,212,170,0.1)">
                <span style="font-size:12px;color:var(--text3)">${(pairedLink.icon||'🔗')} ${pairedLink.label.replace(/</g,'&lt;')}</span>
                <a class="btn sm" href="${pairedLink.url.replace(/"/g,'&quot;')}" target="_blank" rel="noopener noreferrer"
                   style="font-size:11px;padding:3px 10px;background:rgba(0,212,170,0.08);border-color:rgba(0,212,170,0.3);color:var(--teal);text-decoration:none;display:inline-flex;align-items:center;gap:4px;border-radius:6px;border:1px solid">
                  Click Link ↗
                </a>
              </div>` : ''}
          </div>`;
      });
      // Any extra global links beyond paired ones — not rendered without a rule (spec: no links without rule)
    }

    // Environment-level roles (shown as rules) + env links contextually
    if (hasEnvRules) {
      envRules.forEach((rule, idx) => {
        const pairedLink = envLinks[idx] || null;
        infoRows += `
          <div style="padding:10px 12px;background:rgba(124,111,255,0.05);border:1px solid rgba(124,111,255,0.18);border-radius:10px;margin-bottom:8px">
            <div style="font-size:13px;color:var(--text);font-weight:600;margin-bottom:${pairedLink?'10px':'0'}">${(rule.label||'').replace(/</g,'&lt;')}${rule.desc?`<span style="font-weight:400;color:var(--text3);font-size:12px;display:block;margin-top:2px">${rule.desc.replace(/</g,'&lt;')}</span>`:''}
            </div>
            ${pairedLink ? `
              <div style="display:flex;align-items:center;justify-content:space-between;gap:10px;padding-top:8px;border-top:1px solid rgba(124,111,255,0.1)">
                <span style="font-size:12px;color:var(--text3)">${(pairedLink.icon||'🔗')} ${pairedLink.label.replace(/</g,'&lt;')}</span>
                <a class="btn sm" href="${pairedLink.url.replace(/"/g,'&quot;')}" target="_blank" rel="noopener noreferrer"
                   style="font-size:11px;padding:3px 10px;background:rgba(124,111,255,0.08);border-color:rgba(124,111,255,0.3);color:var(--purple);text-decoration:none;display:inline-flex;align-items:center;gap:4px;border-radius:6px;border:1px solid">
                  Click Link ↗
                </a>
              </div>` : ''}
          </div>`;
      });
    }

    infoPanel.innerHTML = `
      <div class="player-panel-title"><span class="panel-accent teal">◈</span> Environment Info</div>
      ${infoRows}`;
    wrap.appendChild(infoPanel);
  }

  // ── PRIVATE NOTES ACCESS (Read-Only Display) ──
  const notesUnlocked = notesAccess.isUnlocked(p.id);
  const hasPw = p.playerPassword && p.playerPassword.trim() !== '';
  const notesPanel = el('div','player-panel player-panel-readonly-wrap');
  notesPanel.setAttribute('style','pointer-events:none;user-select:none');
  const notes = Array.isArray(p.privateNotes) ? p.privateNotes : [];
  notesPanel.innerHTML = `
    <div class="player-panel-title" style="pointer-events:none;user-select:none"><span class="panel-accent">🔐</span> Private Notes <span style="font-size:10px;font-weight:400;color:var(--text3);text-transform:none;margin-left:4px">· view only</span></div>
    ${notesUnlocked
      ? (notes.length
          ? notes.map(n=>`<div class="note-item" style="pointer-events:none;user-select:none"><span class="note-text">${n.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</span></div>`).join('')
          : `<div style="color:var(--text3);font-size:12px">No notes recorded yet.</div>`)
      : hasPw
        ? `<div style="background:rgba(124,111,255,0.08);border:1px solid rgba(124,111,255,0.2);border-radius:var(--r);padding:12px;font-size:12px;color:var(--text3);display:flex;align-items:center;gap:10px">
            <span>🔒 Password protected</span>
          </div>`
        : `<div style="color:var(--text3);font-size:12px">No notes recorded.</div>`}`;
  wrap.appendChild(notesPanel);

  // ── MINI LEADERBOARD ──
  if(catId) {
    const ranked = rankedPlayers(catId).slice(0,5);
    const lbPanel = el('div','player-panel');
    lbPanel.innerHTML = `
      <div class="player-panel-title"><span class="panel-accent amber">🏆</span> Leaderboard — ${catObj?.name||''}</div>
      ${ranked.map((px,i)=>{
        const pxInfo=getLevelInfo(px.xp);
        const medals=['🥇','🥈','🥉'];
        const isMe = px.id===p.id;
        return `<div style="display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--border);${isMe?'background:rgba(124,111,255,0.05);border-radius:8px;padding:7px 8px;margin:2px -8px;border-color:rgba(124,111,255,0.15)':''}">
          <span style="font-size:16px;min-width:22px;text-align:center">${medals[i]||'#'+(i+1)}</span>
          ${renderAvatarHtml(px,28,'font-size:10px!important')}
          <div style="flex:1">
            <div style="font-size:12px;font-weight:${isMe?700:500};color:${isMe?'var(--purple)':'var(--text)'}">${px.name}${isMe?' <span style="font-size:10px;color:var(--purple);opacity:.7">(you)</span>':''}</div>
            <span class="level-badge ${pxInfo.cls}" style="font-size:9px;padding:1px 5px">Lv${pxInfo.level}</span>
          </div>
          <span style="font-size:13px;font-weight:800;color:${isMe?'var(--purple)':'var(--text2)'}">${px.xp.toLocaleString()}</span>
        </div>`;
      }).join('')}`;
    wrap.appendChild(lbPanel);
  }

  content.appendChild(wrap);
}

function renderTeamsTab(content, teams, cat) {
  if(!teams.length) { content.appendChild(html('','<div style="color:var(--text3);padding:20px;text-align:center">No teams yet.</div>')); return; }
  const grid=el('div','grid2');
  teams.forEach(team=>{
    const players=teamPlayers(team.id);
    const avgComp=players.length?Math.round(players.reduce((s,p)=>s+p.completionRate,0)/players.length):0;
    const teamLv=getTeamLevel(team.totalXP);
    const card=el('div','team-card');
    card.innerHTML=`
      <div class="team-header">
        <div class="team-icon" style="background:${team.color}22;color:${team.color}">${team.icon}</div>
        <div style="flex:1">
          <div class="team-name">${team.name}</div>
          <div class="team-xp">${team.totalXP.toLocaleString()} XP · ${players.length} players</div>
        </div>
        <div style="text-align:right;margin-right:8px">
          <div style="font-size:11px;color:var(--text3)">Team Lv.</div>
          <div style="font-size:16px;font-weight:800;color:${team.color}">${teamLv}</div>
        </div>
        ${auth.isOwner()?`<div class="icon-actions">
          <button class="icon-btn edit" title="Edit team" onclick="editTeam(${team.id})">✏️</button>
          <button class="icon-btn del" title="Delete team" onclick="deleteTeam(${team.id})">🗑️</button>
        </div>`:''}
      </div>
      <div class="xp-bar-wrap"><div class="xp-bar" style="width:${Math.min(100,avgComp)}%;background:${team.color}"></div></div>
      <div style="margin-top:12px">
        ${players.map(p=>{
          const info=getLevelInfo(p.xp);
          return `<div style="display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--border)">
            ${renderAvatarHtml(p, 26, 'font-size:10px!important')}
            <span style="flex:1;font-size:12px;color:var(--text)">${p.name}</span>
            <span class="level-badge ${info.cls}" style="font-size:10px;padding:1px 6px">Lv${info.level}</span>
            <span style="font-size:12px;font-weight:700;color:var(--purple)">${p.xp} XP</span>
            ${p.streak>0?`<span class="streak" style="padding:2px 6px;font-size:10px">🔥${p.streak}</span>`:''}
          </div>`;
        }).join('')}
      </div>
      <div class="team-card-actions">
        ${auth.isLeader()?`<button class="btn sm" onclick="openModal('addPlayer',${team.id})">+ Player</button>`:`<span class="lock-wrap"><button class="btn sm locked">+ Player</button><span class="lock-tip">Requires Owner Access</span></span>`}
        ${auth.isOwner()
          ? `<button class="btn sm team-bonus" onclick="awardTeamBonus(${team.id},event)">🏆 Bonus</button>`
          : `<button class="btn sm team-bonus-disabled" disabled title="Owner only">🏆 Bonus</button>`}
      </div>`;
    grid.appendChild(card);
  });
  content.appendChild(grid);
}

function renderPlayersTab(content, players) {
  // Data safety: ensure we always have an array
  if (!Array.isArray(players)) players = [];
  if (!players.length) {
    content.appendChild(html('','<div style="color:var(--text3);padding:20px;text-align:center">No players in this environment yet.</div>'));
    return;
  }
  const sorted=[...players].sort((a,b)=>(b.xp||0)-(a.xp||0));
  const grid=el('div','grid3');
  sorted.forEach((p,i)=>{
    // Per-player try-catch: one broken player never crashes the whole list
    try {
    const team=playerTeam(p.id);
    const card=el('div','player-card');
    const maxXP=sorted[0]?.xp||1;
    const pct=Math.round(((p.xp||0)/maxXP)*100);
    const rankClass=i===0?'rank-1':i===1?'rank-2':i===2?'rank-3':'';
    const info=getLevelInfo(p.xp||0);
    card.innerHTML=`
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
        ${renderAvatarHtml(p, 40)}
        <div style="flex:1">
          <div class="player-name">${p.name||'Unknown'}</div>
          <div class="player-team">${team?.name||'No team'}</div>
        </div>
        <div class="rank-badge ${rankClass}">#${i+1}</div>
        ${auth.isOwner()?`<div class="icon-actions" style="margin-left:4px">
          <button class="icon-btn edit" title="Edit" onclick="event.stopPropagation();editPlayer(${p.id})">✏️</button>
          <button class="icon-btn del" title="Delete" onclick="event.stopPropagation();deletePlayer(${p.id})">🗑️</button>
        </div>`:''}
      </div>
      <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px">
        <div class="player-xp">${p.xp||0} XP</div>
        <span class="level-badge ${info.cls}">Lv${info.level} · ${info.name}</span>
      </div>
      <div class="xp-bar-wrap" style="margin-bottom:2px"><div class="xp-bar" style="width:${pct}%"></div></div>
      ${info.nextXP?`<div style="font-size:10px;color:var(--text3);margin-bottom:6px">${info.progress}% to Lv${info.level+1} · ${info.nextXP-(p.xp||0)} XP needed</div>`:'<div style="font-size:10px;color:var(--amber);margin-bottom:6px">MAX LEVEL</div>'}
      <div style="display:flex;gap:8px;font-size:11px;color:var(--text3)">
        <span>${p.completionRate||0}% done</span><span>·</span>
        <span>${p.missedTasks||0} missed</span>
        ${(p.streak||0)>0?`<span>· <b style="color:var(--amber)">🔥${p.streak}d</b></span>`:''}
        ${p.achievements?.length?`<span>· 🏅${p.achievements.length}</span>`:''}
      </div>
      <div class="player-card-footer">
        <button class="btn sm" style="flex:1;justify-content:center;font-size:11px" onclick="openModal('playerDetail',${p.id})">👤 Profile</button>
        <button class="btn sm" style="flex:1;justify-content:center;font-size:11px;background:rgba(124,111,255,0.08);border-color:rgba(124,111,255,0.3);color:var(--purple)" onclick="openPlayerDashboard(${p.id})">🎮 Dashboard</button>
      </div>`;
    grid.appendChild(card);
    } catch(playerErr) {
      console.error(`[renderPlayersTab] Error rendering player id=${p?.id}:`, playerErr);
      const errCard = el('div','player-card');
      errCard.innerHTML = `<div style="color:var(--text3);font-size:12px;padding:10px;text-align:center">⚠️ Could not display "${p?.name||'player'}"</div>`;
      grid.appendChild(errCard);
    }
  });
  content.appendChild(grid);
}

function renderTasksTab(content, tasks) {
  if(!tasks.length) { content.appendChild(html('','<div style="color:var(--text3);padding:20px;text-align:center">No tasks yet.</div>')); return; }

  // Add CSS for per-player status rows if not already present
  if (!document.getElementById('per-player-task-css')) {
    const s = document.createElement('style');
    s.id = 'per-player-task-css';
    s.textContent = `
      .task-player-status-grid{display:flex;flex-direction:column;gap:4px;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
      .task-player-status-row{display:flex;align-items:center;gap:8px;padding:5px 8px;border-radius:6px;background:rgba(255,255,255,0.02);transition:.15s}
      .task-player-status-row:hover{background:rgba(255,255,255,0.05)}
      .task-progress-bar{height:4px;border-radius:2px;background:rgba(255,255,255,0.06);overflow:hidden;flex:1;min-width:60px}
      .task-progress-fill{height:100%;border-radius:2px;transition:width .4s ease}
      .per-player-btn{padding:2px 8px;border-radius:6px;border:1px solid;font-size:10px;font-weight:700;cursor:pointer;transition:.15s;letter-spacing:.03em;background:none}
      .per-player-btn.done{border-color:rgba(34,204,102,0.4);color:var(--green)}
      .per-player-btn.done:hover{background:rgba(34,204,102,0.12)}
      .per-player-btn.missed{border-color:rgba(204,42,69,0.4);color:var(--red)}
      .per-player-btn.missed:hover{background:rgba(255,77,106,0.12)}
      .per-player-btn.reset{border-color:var(--border2);color:var(--text3)}
      .per-player-btn.reset:hover{background:rgba(255,255,255,0.05)}
      .task-summary-pill{display:inline-flex;align-items:center;gap:5px;padding:2px 10px;border-radius:20px;font-size:11px;font-weight:700}
      .task-summary-pill.all-done{background:rgba(0,53,26,0.5);color:var(--green);border:1px solid rgba(34,204,102,0.3)}
      .task-summary-pill.partial{background:rgba(26,18,0,0.5);color:var(--amber);border:1px solid rgba(255,184,48,0.3)}
      .task-summary-pill.none-done{background:rgba(13,17,32,0.5);color:var(--text3);border:1px solid var(--border)}
      .task-summary-pill.has-missed{background:rgba(53,0,16,0.5);color:var(--red);border:1px solid rgba(204,42,69,0.3)}
    `;
    document.head.appendChild(s);
  }

  const groups={general:[],special:[],team:[]};
  tasks.forEach(t=>groups[t.type]?.push(t));
  ['general','special','team'].forEach(type=>{
    if(!groups[type].length) return;
    const section=el('div','card'); section.style.marginBottom='12px';
    const typeColors={general:['General','general'],special:['Special','special'],team:['Team','team']};
    const [label,badgeClass]=typeColors[type];
    section.innerHTML=`<div class="card-title">${label} Tasks</div>`;
    groups[type].forEach((task,ti)=>{
      const summary = getTaskCompletionSummary(task);
      const pct = summary.total > 0 ? Math.round((summary.done / summary.total) * 100) : 0;
      const summaryClass = summary.total === 0 ? 'none-done'
        : summary.missed > 0 && summary.done === 0 ? 'has-missed'
        : summary.done === summary.total ? 'all-done'
        : summary.done > 0 ? 'partial'
        : summary.missed > 0 ? 'has-missed'
        : 'none-done';
      const summaryLabel = summary.total === 0 ? 'No players'
        : `${summary.done}/${summary.total} done`;

      const row=el('div',`task-row${task.status==='done'?' task-done':''}${task.locked?' task-locked':''}`);
      row.style.animationDelay=(ti*0.05)+'s';
      row.style.flexWrap = 'wrap';
      row.style.alignItems = 'flex-start';

      const assignLabel = (() => {
        if (task.targetScope === 'all') return 'All Players';
        if (task.targetScope === 'team') return state.teams.find(t => t.id === task.targetTeamId)?.name || 'Team ?';
        if (task.targetScope === 'player') return state.players.find(p => p.id === task.targetPlayerId)?.name || 'Player ?';
        if (task.assignedTo === 'all') return 'All';
        if (task.assignedTo === 'all-teams') return 'All Teams';
        return state.players.find(p => p.id === task.assignedTo)?.name || state.teams.find(t => t.id === task.assignedTo)?.name || '?';
      })();

      const DAY_SHORT = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
      const recurBadge = (task.recurring && Array.isArray(task.recurringDays) && task.recurringDays.length > 0)
        ? `<span style="display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:600;background:rgba(124,111,255,0.12);color:var(--purple);border:1px solid rgba(124,111,255,0.3)" title="Repeats on: ${task.recurringDays.map(d=>DAY_SHORT[d]).join(', ')}">🔁 ${task.recurringDays.map(d=>DAY_SHORT[d]).join(' • ')}</span>`
        : '';
      const today = new Date().toISOString().split('T')[0];
      const dateBadge = task.taskDate
        ? `<span style="display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:600;background:${task.taskDate===today?'rgba(0,212,170,0.12)':'rgba(255,184,48,0.1)'};color:${task.taskDate===today?'var(--teal)':'var(--amber)'};border:1px solid ${task.taskDate===today?'rgba(0,212,170,0.3)':'rgba(255,184,48,0.3)'}">📅 ${task.taskDate}</span>`
        : '';
      const linkBadgeOwner = task.taskLink
        ? `<a href="${task.taskLink.replace(/"/g,'&quot;')}" target="_blank" rel="noopener noreferrer" style="display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:600;background:rgba(0,212,170,0.08);color:var(--teal);border:1px solid rgba(0,212,170,0.25);text-decoration:none" title="${task.taskLink}">🔗 Link ↗</a>`
        : '';

      row.innerHTML=`
        <span class="badge ${badgeClass}">${label}</span>
        <span class="task-name">${task.name}</span>
        <span style="font-size:11px;color:var(--text3);margin:0 4px">→ ${assignLabel}</span>
        <span class="task-xp">+${task.xpValue} XP</span>
        ${dateBadge}
        ${linkBadgeOwner}
        ${task.repeatDaily?'<span class="badge active" style="font-size:10px">↻</span>':''}
        ${recurBadge}
        ${task.locked?'<span class="badge locked-task">🔒 Locked</span>':''}

        <!-- ── PROGRESS SUMMARY PILL ── -->
        <span class="task-summary-pill ${summaryClass}">${summaryLabel}</span>

        <!-- ── PROGRESS BAR ── -->
        ${summary.total > 0 ? `
        <div style="width:100%;margin-top:6px;display:flex;align-items:center;gap:8px">
          <div class="task-progress-bar">
            <div class="task-progress-fill" style="width:${pct}%;background:${pct===100?'var(--green2)':pct>0?'var(--amber2)':'var(--red2)'}"></div>
          </div>
          <span style="font-size:10px;color:var(--text3);white-space:nowrap">${pct}%</span>
        </div>` : ''}

        <!-- ── PER-PLAYER STATUS GRID ── -->
        ${summary.total > 0 ? `
        <div class="task-player-status-grid" style="width:100%">
          ${summary.players.map(({player, status, completedAt}) => {
            const statusIcon = status === 'done' ? '✅' : status === 'missed' ? '❌' : '⏳';
            const statusColor = status === 'done' ? 'var(--green)' : status === 'missed' ? 'var(--red)' : 'var(--text3)';
            const canMark = !task.locked && !state.tasksLocked && auth.isOwner();
            return `<div class="task-player-status-row">
              ${renderAvatarHtml(player, 22, 'font-size:9px!important;flex-shrink:0')}
              <span style="flex:1;font-size:12px;color:var(--text);font-weight:500">${player.name}</span>
              <span style="font-size:11px;color:${statusColor};font-weight:700;min-width:56px;text-align:right">${statusIcon} ${status}</span>
              ${completedAt ? `<span style="font-size:10px;color:var(--text3)">${completedAt}</span>` : ''}
              ${canMark ? `
                <div style="display:flex;gap:4px;margin-left:6px">
                  ${status !== 'done' ? `<button class="per-player-btn done" onclick="markTask(${task.id},'done',null,${player.id})">✓ Done</button>` : ''}
                  ${status !== 'missed' ? `<button class="per-player-btn missed" onclick="markTask(${task.id},'missed',null,${player.id})">✗ Miss</button>` : ''}
                  ${status !== 'pending' ? `<button class="per-player-btn reset" onclick="markTask(${task.id},'pending',null,${player.id})">↺</button>` : ''}
                </div>` : ''}
            </div>`;
          }).join('')}
        </div>` : '<div style="width:100%;font-size:11px;color:var(--text3);margin-top:6px">No players assigned.</div>'}

        <!-- ── OWNER CONTROLS ── -->
        <div class="task-actions" style="width:100%;margin-top:8px;border-top:1px solid var(--border);padding-top:8px">
          ${!task.locked && !state.tasksLocked && auth.isOwner() && summary.total > 1 ? `
            <button class="btn sm success" onclick="markTask(${task.id},'done',this.closest('.task-row'))">
              <svg class="check-svg" viewBox="0 0 16 16" fill="none"><path d="M3 8l4 4 6-7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg> All Done
            </button>
            <button class="btn sm danger" onclick="markTask(${task.id},'missed',this.closest('.task-row'))">✗ All Missed</button>
          ` : ''}
          ${!task.locked && !state.tasksLocked && auth.isOwner() && summary.total === 1 ? `
            <button class="btn sm success" onclick="markTask(${task.id},'done',this.closest('.task-row'))">
              <svg class="check-svg" viewBox="0 0 16 16" fill="none"><path d="M3 8l4 4 6-7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg> Done
            </button>
            <button class="btn sm danger" onclick="markTask(${task.id},'missed',this.closest('.task-row'))">✗ Missed</button>
          ` : task.locked || state.tasksLocked ? '<span style="font-size:11px;color:var(--text3)">🔒 Locked</span>' : ''}
          ${auth.isLeader()?`
            <button class="btn sm" onclick="toggleTaskLock(${task.id})" style="font-size:11px;padding:3px 8px">${task.locked?'🔓':'🔒'}</button>
            <button class="btn sm warn" onclick="forceCompleteTask(${task.id})" style="font-size:10px">Force All ✓</button>
            <div class="icon-actions">
              <button class="icon-btn edit" title="Edit task" onclick="editTask(${task.id})">✏️</button>
              <button class="icon-btn del" title="Delete task" onclick="deleteTask(${task.id})">🗑️</button>
            </div>
          `:''}
        </div>`;
      section.appendChild(row);
    });
    content.appendChild(section);
  });
}

function renderLeaderboard(content) {
  const cat=state.categories[state.currentCat];
  if(!cat) return;
  const ranked=rankedPlayers(cat.id);
  const maxXP=ranked[0]?.xp||1;

  const indiv=el('div','card'); indiv.style.marginBottom='16px';
  indiv.innerHTML=`<div class="card-title"><span style="color:var(--purple)">◈</span> Individual Ranking — ${cat.name}</div>`;
  ranked.forEach((p,i)=>{
    const team=playerTeam(p.id);
    const pct=Math.round((p.xp/maxXP)*100);
    const medals=['🥇','🥈','🥉'];
    const info=getLevelInfo(p.xp);
    const row=el('div',i===0?'lb-row first-place':'lb-row');
    row.style.animationDelay=(i*0.06)+'s';
    row.innerHTML=`
      <span class="lb-rank">${medals[i]||'#'+(i+1)}</span>
      ${p.avatarUrl ? `<div class="lb-avatar" style="overflow:hidden;padding:0"><img src="${p.avatarUrl}" style="width:100%;height:100%;object-fit:cover;border-radius:50%"></div>` : `<div class="lb-avatar" style="background:${getAvatarColor(p.id)}22;color:${getAvatarColor(p.id)}">${getPlayerInitials(p.name)}</div>`}
      <div style="flex:1">
        <div class="lb-name">${p.name} <span class="level-badge ${info.cls}" style="font-size:10px;padding:1px 6px">Lv${info.level}</span></div>
        <div class="lb-team">${team?.name||''} · ${p.completionRate}% rate ${p.achievements?.length?`· 🏅${p.achievements.length}`:''}</div>
      </div>
      ${p.streak>0?`<span class="streak" style="margin-right:8px">🔥${p.streak}</span>`:''}
      <div class="lb-bar-wrap"><div class="lb-bar" style="width:${pct}%"></div></div>
      <span class="lb-xp" style="margin-left:10px">${p.xp}</span>`;
    indiv.appendChild(row);
  });
  content.appendChild(indiv);

  const teams=catTeams(cat.id);
  const teamRanked=[...teams].sort((a,b)=>b.totalXP-a.totalXP);
  const maxTXP=teamRanked[0]?.totalXP||1;
  const teamCard=el('div','card'); teamCard.style.marginBottom='16px';
  teamCard.innerHTML=`<div class="card-title"><span style="color:var(--teal)">⚡</span> Team Ranking</div>`;
  teamRanked.forEach((t,i)=>{
    const pct=Math.round((t.totalXP/maxTXP)*100);
    const medals=['🥇','🥈','🥉'];
    const teamLv=getTeamLevel(t.totalXP);
    const row=el('div','lb-row');
    row.innerHTML=`
      <span class="lb-rank">${medals[i]||'#'+(i+1)}</span>
      <div class="lb-avatar" style="background:${t.color}22;color:${t.color};border-radius:8px">${t.icon}</div>
      <div style="flex:1">
        <div class="lb-name">${t.name} <span style="font-size:10px;color:${t.color};font-weight:700">Team Lv.${teamLv}</span></div>
        <div class="lb-team">${teamPlayers(t.id).length} players · ${t.avgPerf||0}% avg</div>
      </div>
      <div class="lb-bar-wrap"><div class="lb-bar" style="width:${pct}%;background:${t.color}"></div></div>
      <span class="lb-xp" style="margin-left:10px">${t.totalXP.toLocaleString()}</span>`;
    teamCard.appendChild(row);
  });
  content.appendChild(teamCard);
}

function renderActivity(content) {
  content.appendChild(html('section-header','<div class="section-title">Activity Log</div>'));
  const card=el('div','card');
  card.innerHTML=`<div class="card-title"><span class="live-dot"></span> Live Feed</div>`;
  const logs=[...state.activityLog].reverse();
  logs.forEach((log,li)=>{
    const player=state.players.find(p=>p.id===log.playerId);
    const task=state.tasks.find(t=>t.id===log.taskId);
    const row=el('div','log-row');
    row.style.cssText='animation:pageIn .2s ease both;animation-delay:'+(li*0.04)+'s';
    const statusColors={done:'var(--teal)',missed:'var(--red)',late:'var(--amber)'};
    const icons={done:'✓',missed:'✗',late:'~'};
    row.innerHTML=`
      <span class="log-time">${log.date}</span>
      <span class="badge ${log.status}" style="min-width:50px;justify-content:center">${icons[log.status]||''} ${log.status}</span>
      <span class="log-msg"><b style="color:var(--text)">${player?.name||'?'}</b> — ${task?.name||'?'}</span>
      <span class="log-xp" style="color:${statusColors[log.status]};font-weight:700">${log.xpEarned>0?'+'+log.xpEarned+' XP':'—'}</span>`;
    card.appendChild(row);
  });
  if(!logs.length) card.innerHTML+='<div style="color:var(--text3);padding:20px;text-align:center;font-size:13px">No activity yet.</div>';
  content.appendChild(card);
}

        </div>

          <div style="font-size:16px;font-weight:800;color:#fff">${p.name}</div>

          </div>
        </div>
        <div style="text-align:right">
          <div style="font-size:24px;font-weight:800;color:var(--purple)">${p.xp}</div>
          <div style="font-size:10px;color:var(--text3)">XP</div>

      </div>
      <div style="margin-bottom:10px">
        <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--text3);margin-bottom:4px">
          <span>Level Progress</span><span>${info.progress}%${info.nextXP?' · '+( info.nextXP-p.xp)+' to next':''}</span>
        </div>
        <div class="xp-bar-wrap" style="height:6px"><div class="xp-bar" style="width:${info.progress}%"></div></div>

        <div class="stat amber" style="padding:8px"><div class="stat-label">Streak</div><div class="stat-val" style="font-size:16px">${p.streak>0?'🔥'+p.streak+'d':'—'}</div></div>
        <div class="stat" style="padding:8px"><div class="stat-label">Achievements</div><div class="stat-val" style="font-size:16px">🏅${achCount}</div></div>
      </div>

      <div style="display:flex;flex-wrap:wrap;gap:4px">
        ${p.achievements.map(id=>{const a=ACHIEVEMENTS.find(x=>x.id===id);return a?`<span title="${a.name}: ${a.desc}" style="font-size:16px;cursor:default">${a.icon}</span>`:''}).join('')}

      <div class="ach-icon ${earned?'':'locked'}">${ach.icon}</div>

  // ── SECURITY / SYSTEM CONTROLS (Owner only) ──

        <span>Security &amp; System Controls</span>

      </div>
      <div style="font-size:12px;color:var(--text2);margin-bottom:16px;line-height:1.6">
        Manage system-level credentials. All changes are applied globally and logged for audit purposes.
      </div>
      <div style="background:rgba(255,184,48,0.04);border:1px solid rgba(255,184,48,0.15);border-radius:10px;padding:14px 16px">

    card.innerHTML=`
      <div class="card-title">Mission Environments</div>
      ${state.categories.map((c,i)=>`

    content.appendChild(card);
  }
}

    m.innerHTML=`<div class="modal-title">🔐 Environment Password — ${cat.name}</div><button class="modal-close" onclick="closeModal()">×</button>

        ${cat.environmentPassword ? '🔒 This environment currently has a password set.' : '🔓 This environment is currently open (no password).'}

      <div class="modal-title" style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
        <span>🔑</span><span>Change System Password</span>
        <span style="margin-left:auto;font-size:10px;color:var(--amber);background:rgba(255,184,48,0.1);border:1px solid rgba(255,184,48,0.3);border-radius:20px;padding:2px 8px;font-weight:700;white-space:nowrap">OWNER ONLY</span>

      <div style="background:rgba(255,184,48,0.05);border:1px solid rgba(255,184,48,0.2);border-radius:var(--r);padding:11px 14px;margin-bottom:16px;font-size:12px;color:var(--text2);line-height:1.6">
        ⚠️ Changing the password will <b style="color:var(--amber)">immediately end your session</b> and require re-authentication.
      </div>
      <div class="form-row">
        <label>Current Password</label>
        <div style="position:relative">
          <input type="password" id="sp-current" class="login-input" style="width:100%;padding-right:40px;box-sizing:border-box" placeholder="Enter current password..." autocomplete="current-password"
            oninput="_spValidate()">
          <button type="button" tabindex="-1" onclick="const i=document.getElementById('sp-current');i.type=i.type==='password'?'text':'password'" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text3);cursor:pointer;font-size:15px">👁</button>
        </div>
      </div>
      <div class="form-row">
        <label>New Password <span style="color:var(--text3);font-size:11px;font-weight:400">— min 8 chars, letters &amp; numbers</span></label>
        <div style="position:relative">
          <input type="password" id="sp-new" class="login-input" style="width:100%;padding-right:40px;box-sizing:border-box" placeholder="Enter new password..." autocomplete="new-password"
            oninput="_spValidate()">
          <button type="button" tabindex="-1" onclick="const i=document.getElementById('sp-new');i.type=i.type==='password'?'text':'password'" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text3);cursor:pointer;font-size:15px">👁</button>
        </div>
      </div>
      <div class="form-row">
        <label>Confirm New Password</label>
        <div style="position:relative">
          <input type="password" id="sp-confirm" class="login-input" style="width:100%;padding-right:40px;box-sizing:border-box" placeholder="Repeat new password..." autocomplete="new-password"
            oninput="_spValidate()"
            onkeydown="if(event.key==='Enter' && !document.getElementById('sp-submit').disabled) submitChangeSystemPassword()">
          <button type="button" tabindex="-1" onclick="const i=document.getElementById('sp-confirm');i.type=i.type==='password'?'text':'password'" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text3);cursor:pointer;font-size:15px">👁</button>

      <div id="sp-msg" style="min-height:20px;font-size:12px;margin-bottom:10px;color:var(--red)"></div>
      <div class="form-actions" style="flex-wrap:wrap;gap:8px">
        <button class="btn" onclick="closeModal()" type="button">Cancel</button>
        <button id="sp-submit" class="btn primary" style="border-color:rgba(255,184,48,0.5);color:var(--amber);background:rgba(255,184,48,0.1);opacity:0.45;cursor:not-allowed" disabled onclick="submitChangeSystemPassword()" type="button">Update Password</button>
      </div>`;
    // Inline real-time validation helper (scoped to this modal instance)
    window._spValidate = function() {
      const cur  = document.getElementById('sp-current')?.value || '';
      const nw   = document.getElementById('sp-new')?.value    || '';
      const conf = document.getElementById('sp-confirm')?.value|| '';
      const msg  = document.getElementById('sp-msg');
      const btn  = document.getElementById('sp-submit');
      if (!msg || !btn) return;
      // All fields must be filled
      if (!cur || !nw || !conf) {
        msg.textContent = cur || nw || conf ? 'Please fill in all fields.' : '';
        btn.disabled = true; btn.style.opacity='0.45'; btn.style.cursor='not-allowed';
        return;
      }
      // New password strength
      if (nw.length < 8 || !/[a-zA-Z]/.test(nw) || !/[0-9]/.test(nw)) {
        msg.textContent = 'New password must be at least 8 characters and include letters & numbers.';
        btn.disabled = true; btn.style.opacity='0.45'; btn.style.cursor='not-allowed';
        return;
      }
      // Confirm must match
      if (nw !== conf) {
        msg.textContent = 'New passwords do not match.';
        btn.disabled = true; btn.style.opacity='0.45'; btn.style.cursor='not-allowed';
        return;
      }
      // New must not be same as current (basic UX guard, not a security boundary)
      if (nw === cur) {
        msg.textContent = 'New password must be different from the current password.';
        btn.disabled = true; btn.style.opacity='0.45'; btn.style.cursor='not-allowed';
        return;
      }
      // All good — enable submit
      msg.textContent = '';
      btn.disabled = false; btn.style.opacity='1'; btn.style.cursor='pointer';

  }
